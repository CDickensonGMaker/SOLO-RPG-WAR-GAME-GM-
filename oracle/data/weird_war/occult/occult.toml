# Weird War Occult Elements
# Nazi occult programs, Allied counter-occult, artifacts, and rituals witnessed

[nazi_occult]
description = "Ahnenerbe expeditions, Thule Society operations, and SS occult programs"
entries = [
    { text = "Ahnenerbe expedition returns from Tibet - the monks they brought back don't blink and speak languages that died with Babylon", weight = 2 },
    { text = "Thule Society ritual site discovered in the Black Forest - the runes carved into the stones still glow at midnight, and the trees grow wrong", weight = 2 },
    { text = "SS-Ahnenerbe Division 'Sonderkommando H' - they hunt witches, but not to burn them", weight = 2 },
    { text = "Himmler's occult library at Wewelsburg Castle - books bound in materials that weren't leather, written in inks that weren't ink", weight = 2 },
    { text = "The Black Sun ceremony performed at the winter solstice - twelve SS officers in a circle, and something answered", weight = 3 },
    { text = "Operation Werwolf isn't just guerrilla warfare - the name was chosen for a reason", weight = 2 },
    { text = "Ahnenerbe archaeologists in the Carpathians found what they were looking for - it found them too", weight = 2 },
    { text = "The Thule Gesellschaft's original Munich basement still exists - they've never stopped meeting there", weight = 2 },
    { text = "SS Totenkopfverbande guards at the camps report hearing chanting at night - from the crematoriums, after the fires go cold", weight = 3 },
    { text = "Karl Maria Wiligut's rune work proved more effective than anyone expected - the symbols do things now", weight = 2 },
    { text = "The Ahnenerbe's Scandinavian division found something beneath the ice - older than the Vikings, older than the ice itself", weight = 2 },
    { text = "Operation Wotan - SS mages attempting to summon the Allfather. They got something that called itself Wotan", weight = 3 },
    { text = "Himmler's 'Hexenkartothek' - the witch files aren't just historical records, they're instruction manuals", weight = 2 },
    { text = "The Vril Society went silent in 1943, but their research into 'living lightning' continued at Peenemunde", weight = 2 },
    { text = "Ahnenerbe teams in Iraq found cuneiform tablets that screamed when exposed to sunlight", weight = 2 },
    { text = "The Thule mediums who channeled 'higher beings' are kept in a sanatorium now - their predictions were too accurate", weight = 2 },
    { text = "SS-Sonderkommando Tibet brought back mandala patterns that, when drawn correctly, open doorways", weight = 3 },
    { text = "Wewelsburg Castle's north tower contains a crypt - something has been sealed in there since 1935", weight = 2 },
    { text = "The Ahnenerbe's biological division crossed zoology with runic magic - the results don't appear in any bestiary", weight = 2 },
    { text = "Heinrich I's bones were reinterred at Quedlinburg Abbey by the SS - the abbey's priests haven't slept soundly since", weight = 2 },
    { text = "Nazi occultists beneath the Reichstag conduct blood rituals during major offensives - casualty reports spike on both sides", weight = 3 },
    { text = "The Thule Society's inner circle achieved 'communion' with something in 1919 - Hitler was there, though he never speaks of it", weight = 2 },
    { text = "Ahnenerbe cryptographers decoded the Voynich Manuscript - three translators committed suicide, two vanished", weight = 2 },
    { text = "SS-Abteilung Hexen ('Witch Division') operates behind the Eastern Front - Soviet soldiers have learned to fear full moons", weight = 2 },
    { text = "The Ordensburg schools teach more than ideology - advanced students learn to see beyond the veil", weight = 2 },
    { text = "Himmler believes he's the reincarnation of Heinrich the Fowler - archaeological evidence suggests he might be right", weight = 2 },
    { text = "A dig beneath Externsteine revealed pre-human construction - and something that woke when the stones were moved", weight = 3 },
    { text = "The Ahnenerbe's ethnographic division studied Sami shamans until three researchers went mad - now they employ the shamans", weight = 2 },
    { text = "Operation Ragnarok's true purpose isn't military victory - it's opening the gates for the Old Ones' return", weight = 3 },
    { text = "Nazi officers stationed near ancient burial mounds report dreams - always the same dream, always in a language they shouldn't understand", weight = 2 },
]

[allied_occult]
description = "MI6 Department XIII, OSS X-Section, and Allied supernatural operations"
entries = [
    { text = "MI6 Department XIII - the ones who deal with things Churchill won't speak of in Parliament", weight = 2 },
    { text = "SOE's Section M trains agents in 'unconventional countermeasures' - the syllabus includes Latin exorcism rites", weight = 2 },
    { text = "The Double Cross System turned more than Nazi spies - some of the turned agents aren't entirely human anymore", weight = 2 },
    { text = "Aleister Crowley's work for British Intelligence involved more than propaganda - his rituals over the Channel kept something at bay", weight = 2 },
    { text = "OSS X-Section operates from a converted monastery in Scotland - the monks who remain know why it was chosen", weight = 2 },
    { text = "The Monuments Men have a classified subsection - they're not recovering art, they're containing it", weight = 2 },
    { text = "British warlocks in the Tower of London work shifts maintaining wards that have held since the Tudors", weight = 2 },
    { text = "America's first psychic warfare division operates from a sanitarium in New England - the patients are the weapons", weight = 2 },
    { text = "Free French occultists maintain the Maginot Line's magical defenses - the physical fortifications were just the visible part", weight = 2 },
    { text = "The Ghost Club's war work remains classified - their 'ghost' hunts targeted Nazi astral projectors", weight = 2 },
    { text = "SOE dropped more than supplies to the Resistance - certain packages contained silver ammunition and iron stakes", weight = 2 },
    { text = "British mediums hold seances in the War Rooms - Churchill attends when the bombing is particularly heavy", weight = 2 },
    { text = "The Admiralty's Room 39 has a subbasement - naval intelligence into things that predate humanity's time on the seas", weight = 2 },
    { text = "American OSS occultists uncovered a German plot to weaponize the Necronomicon - the counter-operation remains ongoing", weight = 3 },
    { text = "Polish cryptographers who broke Enigma also broke other codes - some ciphers were never meant to be read by human eyes", weight = 2 },
    { text = "The 'Weird Sisters' of Bletchley Park don't crack codes - they crack curses sent through the ether", weight = 2 },
    { text = "Soviet NKVD has an occult division predating the revolution - they've been fighting supernatural threats since the Czars", weight = 2 },
    { text = "Canadian forces guard something in the Arctic - a location that appears on no maps, from before the last ice age", weight = 2 },
    { text = "Australian Aboriginal elders work with Allied intelligence - the Dreamtime touches realms the Nazis seek to open", weight = 2 },
    { text = "Vatican Intelligence coordinates with the Allies through ancient orders - the Inquisition never truly ended", weight = 2 },
    { text = "The SHAEF Paranormal Containment Division classifies captured German artifacts by 'threat category'", weight = 2 },
    { text = "British Intelligence maintains a list of 'protected sites' - bombing them would release things worse than the Nazis", weight = 2 },
    { text = "The Ghost Army's sound and visual deceptions were cover for more esoteric misdirections", weight = 2 },
    { text = "Free French mages guard the catacombs beneath Paris - the bones of six million dead provide considerable power", weight = 2 },
    { text = "American cemetery registration units have secondary orders - some bodies must never be allowed to rise", weight = 2 },
]

[artifacts]
description = "Occult artifacts sought, found, or wielded in the war"
entries = [
    { text = "The Spear of Destiny - currently in a vault beneath the Reichstag, surrounded by guards who age visibly during their shifts", weight = 1 },
    { text = "The Holy Grail - Hitler believes it's in Montsegur. Something is there, but it might not be what the legends describe", weight = 1 },
    { text = "The Ark of the Covenant - Nazi archaeologists found its resting place. The expedition's fate is classified above Top Secret", weight = 1 },
    { text = "The Black Madonna of Czestochowa - its presence has protected the monastery from three Nazi assaults", weight = 2 },
    { text = "Charlemagne's Talisman - Himmler wears it during major rituals. Those who oppose him report terrible dreams", weight = 2 },
    { text = "The Hand of Glory - a single candle that, when lit, freezes all who look upon it. Gestapo officers carry them during raids", weight = 2 },
    { text = "Die Blutzunge ('The Blood Tongue') - a Nazi ritual knife that drinks what it spills and grants visions", weight = 2 },
    { text = "The Seal of Solomon - discovered in a synagogue raid. The SS-Ahnenerbe officers who opened it haven't been seen since", weight = 2 },
    { text = "Gilles de Rais' grimoire - recovered from a French chateau. Its pages turned red during the battle for Saint-Nazaire", weight = 2 },
    { text = "The Vril Generator - a device that supposedly draws power from the earth itself. The operators age decades in days", weight = 3 },
    { text = "Byzantine war icons from Ravenna - they weep blood when the Axis advances and tears when the Allies push forward", weight = 2 },
    { text = "The Amber Room's panels - they're not just decorative. The patterns work like a cage for something that walks between worlds", weight = 2 },
    { text = "A Roman legionary standard found in the Rhine - the eagle atop it screams at dawn and dusk in a language like no other", weight = 2 },
    { text = "The Baphomet Head - Templar artifact seized from a French museum. It speaks prophecy in return for blood sacrifice", weight = 2 },
    { text = "A golden mask from Mycenae - whoever wears it sees the dead as clearly as the living", weight = 2 },
    { text = "Celtic torcs from a British museum - they confer berserker rage but extract a terrible price in sanity", weight = 2 },
    { text = "The Liber Ivonis - copy recovered from the Miskatonic University library. Several SS scholars have read it. None are the same", weight = 3 },
    { text = "Johann Faust's mirror - showing not reflections but what might be or might have been", weight = 2 },
    { text = "The Thuringian Stone - a prehistoric altar that still accepts offerings, whether given willingly or not", weight = 2 },
    { text = "Nazi copies of the Tablets of Destiny - incomplete, but powerful enough to alter the fortunes of battle", weight = 2 },
    { text = "The Emerald Tablet - alchemical artifact said to transmute not just lead to gold, but flesh to something else", weight = 2 },
    { text = "Vlad Tepes' original battle standard - the fabric drinks blood and the bearer neither ages nor dies easily", weight = 2 },
    { text = "A cylinder seal from Ur - when rolled across clay, it doesn't just leave impressions, it opens gates", weight = 2 },
    { text = "The Crystal Skull of Lubeck - it answers questions, but its answers drive men mad", weight = 2 },
    { text = "An Assyrian relief panel - the winged figure depicted sometimes moves when no one watches", weight = 2 },
]

[rituals_witnessed]
description = "Occult ceremonies and supernatural events witnessed by troops"
entries = [
    { text = "Thirteen SS officers in a stone circle at midnight, chanting in a language that hurt to hear. The sky changed color", weight = 3 },
    { text = "Nazi scientists drawing symbols in blood around a crashed V-2 rocket. Something crawled out of the crater", weight = 3 },
    { text = "A mass grave that refused to stay still - the earth heaving, the dirt moving aside for what rose beneath", weight = 3 },
    { text = "German troops feeding prisoners to a pit - not for cruelty, but as offering. Something in the pit fed back", weight = 3 },
    { text = "An SS officer reading aloud from a book of human skin. With each word, the shadows grew darker and moved wrong", weight = 3 },
    { text = "Soviet soldiers attempting to burn a German occult text. The flames turned black and cold, the book laughed", weight = 2 },
    { text = "A bonfire of confiscated Jewish relics - the flames formed faces, the screaming lasted hours after the fire died", weight = 3 },
    { text = "Nazi 'weather workers' calling down lightning that struck with precision and purpose against Allied positions", weight = 2 },
    { text = "Prisoners forced to walk a labyrinth pattern while chanting - those who completed it vanished. Those who faltered dissolved", weight = 3 },
    { text = "German soldiers performing a blood brotherhood rite before battle. Those who participated showed no fear. Or humanity", weight = 2 },
    { text = "An SS ceremony at a prehistoric mound. The dead buried there rose - still in Bronze Age garb, carrying Bronze Age weapons", weight = 3 },
    { text = "A communion service where the bread bled and the wine moved in the chalice. The congregation changed after drinking", weight = 3 },
    { text = "Nazi archaeologists breaking into a sealed tomb. The screaming from inside lasted three days. No bodies were found", weight = 3 },
    { text = "Allied troops interrupting a ritual sacrifice. The victim thanked them - then explained what would happen now that the ritual was incomplete", weight = 2 },
    { text = "A full moon rite where participants transformed, not into wolves, but into things older, things wolves evolved from", weight = 3 },
    { text = "Nazi officers drinking from a skull cup. Each drinker spoke with the knowledge of the skull's original owner", weight = 2 },
    { text = "A séance to contact fallen German soldiers. They answered - and gave coordinates for Allied positions they couldn't possibly know", weight = 2 },
    { text = "The consecration of an SS dagger - not with holy water, but with fluids that science cannot identify", weight = 2 },
    { text = "A Thule Society medium channeling something that claimed to be from Atlantis. Her body moved wrong afterward", weight = 2 },
    { text = "German troops carving runes into their flesh before battle. Their wounds healed instantly. Their eyes never did", weight = 2 },
    { text = "A Nazi officer reading names from a list. Each name spoken, a prisoner collapsed dead. No marks, no cause", weight = 2 },
    { text = "The burial of a fallen SS occultist - buried standing, facing east, with silver coins on his eyes. He still moves sometimes", weight = 3 },
    { text = "Captured Allied airmen forced to witness something in a castle basement. They wouldn't speak of it. They still can't", weight = 2 },
    { text = "German clergy conducting an 'unconsecration' ceremony at a captured church. The building burned from within for days", weight = 2 },
    { text = "A mass hypnosis event where thousands chanted in unison. The sound opened something in the sky that wasn't stars", weight = 3 },
]
