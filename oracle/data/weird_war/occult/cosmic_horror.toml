# Weird War Cosmic Horror Elements
# Lovecraftian entities, madness, forbidden knowledge, and things from beyond

[elder_things]
description = "Ancient entities awakened or drawn by the war's devastation"
entries = [
    { text = "Something stirs beneath the trenches - older than humanity, awakened by the shelling. It dreams, and soldiers share its nightmares", weight = 2 },
    { text = "The bombardment at Verdun cracked more than earth - seismographs detect movement at depths where nothing should live", weight = 2 },
    { text = "Divers report structures in the North Sea that appear on no charts. The architecture suggests non-human geometry", weight = 2 },
    { text = "Something vast moves through the Atlantic shipping lanes. U-boats have stopped hunting there. So have Allied convoys", weight = 2 },
    { text = "The shelling uncovered a cavern system beneath the Somme. The caves go down farther than light reaches. Something looks back", weight = 3 },
    { text = "Pilots report a shape in the clouds over the Channel - massive, tentacular, visible only in moonlight. Radar shows nothing", weight = 2 },
    { text = "The entity in the Arctic ice is waking. Both sides have sent expeditions. Neither speaks of what they found", weight = 3 },
    { text = "Fishermen off Innsmouth have offered their services to naval intelligence. Their price was a cessation of depth charging in certain waters", weight = 2 },
    { text = "Something follows the refugee columns - never seen clearly, but felt. A presence that feeds on despair", weight = 2 },
    { text = "The thing beneath Berlin has been worshipped since before the city existed. Nazi occultists believe they can control it", weight = 3 },
    { text = "Sonar contacts in the Pacific defy classification. They're too large for whales, and they sing in frequencies that cause bleeding ears", weight = 2 },
    { text = "The monastery atop Mont Saint-Michel guards more than religious treasures. What sleeps beneath the tidal flats must never wake", weight = 2 },
    { text = "Antarctic expeditions from both sides have found the same thing - and both sides have agreed, wordlessly, to bury it again", weight = 3 },
    { text = "The mass graves of the Eastern Front have attracted something that walks between the bodies, feeding on lingering terror", weight = 2 },
    { text = "Tunnelers beneath the Western Front broke into a space that shouldn't exist. The geometry was wrong. Time moved differently there", weight = 3 },
    { text = "What the Nazis woke in the Harz Mountains isn't dead. It can't be killed. It's been contained before - the caves were its prison", weight = 3 },
    { text = "The Deep Ones have chosen a side - not from ideology, but from the promise of what will be given to the seas after", weight = 2 },
    { text = "Mi-Go activity has increased since 1939. They're harvesting something from the battlefields - brains, but only certain ones", weight = 2 },
    { text = "Shoggoths were spotted in the ruins of Stalingrad. Both armies withdrew from that sector without acknowledgment", weight = 3 },
    { text = "The Great Race of Yith has sent observers to this war. They're particularly interested in the nuclear research at Los Alamos", weight = 2 },
    { text = "Something has awakened in the Carpathians that remembers when men were prey. The local villagers knew better than to dig there", weight = 2 },
    { text = "The Black Goat of the Woods has answered Nazi summoners. What they promised in return will doom more than Germany", weight = 3 },
    { text = "Nyarlathotep walks among the combatants, wearing many faces, stirring conflict, whispering secrets that shouldn't be known", weight = 3 },
    { text = "The star-spawn in the Pacific have noticed the naval warfare. They're curious. This is not a good thing", weight = 2 },
    { text = "R'lyeh's coordinates have appeared in Nazi communications. Their submarines are searching. If they find it, the war becomes irrelevant", weight = 3 },
]

[madness]
description = "Shell shock meets cosmic horror - minds broken by what they've witnessed"
entries = [
    { text = "The soldier speaks in a language that predates Sanskrit - his eyes have changed color and he knows things about his captors' pasts", weight = 2 },
    { text = "Shell shock victims in the asylum share the same nightmare - a city beneath the waves, angles that can't exist, a name they dare not speak", weight = 2 },
    { text = "The medic has performed thousands of surgeries. Lately, his hands move with knowledge he never learned. The sutures form patterns", weight = 2 },
    { text = "Battle fatigue turned to something else - the soldier now sees the threads connecting all living things. He can pull them", weight = 3 },
    { text = "The screaming started after the bombardment. It hasn't stopped, even when his throat was destroyed. The sound comes from elsewhere now", weight = 2 },
    { text = "Thousand-yard stare gone wrong - he doesn't just see the distance, he sees through to what lies beyond distance itself", weight = 2 },
    { text = "The cryptographer who broke the German cipher went mad. The message within the message was for her, personally, from something that knew her true name", weight = 3 },
    { text = "Combat trauma expressed as obsessive drawing - the same symbol, over and over, in blood when ink isn't available. The symbol has power", weight = 2 },
    { text = "He survived the sinking, but what pulled him from the water wasn't the rescue ship. He belongs to the sea now, though he still breathes air", weight = 2 },
    { text = "The night terrors spread through the barracks. Thirty men dreaming the same dream. Waking with the same marks on their flesh", weight = 3 },
    { text = "War psychosis with mathematical obsession - calculating pi to digits that reveal messages, coordinates to places that don't exist on Earth", weight = 2 },
    { text = "The soldier found peace after the massacre - too much peace. His eyes are empty and his smile never fades. Something else looks out now", weight = 3 },
    { text = "Fugue states where he speaks as others - not the dead, but beings that were never alive, that exist in spaces between moments", weight = 2 },
    { text = "The nurse sees the dead walk the wards. She's stopped reporting it because the dead sometimes have useful information", weight = 2 },
    { text = "Combat stress manifesting as impossible memory - remembering battles he wasn't in, wars that haven't happened, the fall of civilizations to come", weight = 2 },
    { text = "Glossolalia after the gas attack, speaking truths in the tongue of the outer spheres. His predictions are always correct, and always terrible", weight = 2 },
    { text = "The pilot's thousand-yard stare looks up, not out. He saw something at high altitude. Now he can't stop looking for it", weight = 2 },
    { text = "Post-combat dissociation - he doesn't feel connected to his body anymore because something else has moved in alongside him", weight = 2 },
    { text = "The interrogator who broke Nazi occultists absorbed too much of their knowledge. He knows how to summon things now. He can't forget", weight = 3 },
    { text = "Survivor's guilt transformed into certainty - he's alive because something chose him, needs him, has plans for him", weight = 2 },
    { text = "Battle shock expressed through prophecy - his ravings are recorded and studied. They're too accurate to ignore, too horrible to believe", weight = 2 },
    { text = "The bombardment didn't just shell-shock him - it knocked something loose, a previous self from a previous cycle of existence", weight = 2 },
    { text = "He hasn't slept since D-Day. He can't. When he closes his eyes, they see him, and what they show him is worse than exhaustion", weight = 2 },
    { text = "Combat-induced savant syndrome - suddenly able to read ancient languages, but only those that describe entities that should not be named", weight = 2 },
    { text = "The medic's hands know healing no school taught. The wounds he treats heal too well, the flesh remembers forms it never had", weight = 2 },
]

[forbidden_knowledge]
description = "Secrets man was not meant to know, uncovered by war's destruction"
entries = [
    { text = "The decoded transmission contained instructions for a ritual. Several intelligence officers performed it before anyone could stop them", weight = 2 },
    { text = "Archaeological finds from the Alamein dig included texts that predate human writing by millions of years - and they're in German", weight = 3 },
    { text = "The formula for the new explosive came from a dead language manuscript. It works, but so do the other instructions in the text", weight = 2 },
    { text = "Captured Nazi research notes on 'temporal mechanics' are written in a script that changes while you read it", weight = 2 },
    { text = "The coordinates to the hidden U-boat base were encoded in a cipher that required reading the Pnakotic Manuscripts to break", weight = 2 },
    { text = "Bletchley decrypted something that wasn't German - a broadcast from somewhere else, warning us to stop before we attract attention", weight = 3 },
    { text = "Maps recovered from a crashed Luftwaffe plane show Europe as it was before the last ice age - and as it will be after the next", weight = 2 },
    { text = "The physicist's calculations for the bomb included variables that don't exist in normal mathematics. The results were too accurate to question", weight = 2 },
    { text = "Nazi star charts mark locations in space where stars shouldn't be. Astronomers have confirmed the positions. The stars aren't natural", weight = 2 },
    { text = "Translation of captured cuneiform tablets reveals Hitler's war plans predate him by four thousand years", weight = 3 },
    { text = "The medical experiments discovered something about human anatomy that isn't in any textbook - a vestigial organ that responds to specific frequencies", weight = 2 },
    { text = "Archaeological evidence from a bombed cathedral suggests the building was constructed to contain something, not celebrate something", weight = 2 },
    { text = "The code book recovered from the U-boat wasn't for naval communications. It was for summoning things from the deep", weight = 2 },
    { text = "Aerial reconnaissance photographs of German occult sites reveal patterns visible only from altitude - patterns that match ancient cave paintings", weight = 2 },
    { text = "The intelligence officer who decoded the final Nazi transmission was found drawing the message, writing it, speaking it. It's a location. Something wants to be found", weight = 3 },
    { text = "Scientific papers from a captured research facility describe experiments on the nature of death itself. They succeeded. That's the problem", weight = 3 },
    { text = "The Voynich Manuscript's true purpose was revealed - it's not a coded message, it's an instruction manual. The Nazis have started building", weight = 2 },
    { text = "Mathematical proofs from a German university demonstrate that certain numbers, when spoken correctly, change reality", weight = 2 },
    { text = "Captured film reels show what Nazi cameras recorded in another dimension - they found a way through, and filmed what lives there", weight = 3 },
    { text = "The biological samples from the German laboratory aren't from any species on Earth. They're labeled with dates from the future", weight = 2 },
    { text = "Radio intercepts include broadcasts in German from 1962, describing the aftermath of a war that was lost - and what rose in the ashes", weight = 3 },
    { text = "Interrogation of Nazi scientists revealed they received instructions from 'advisors' who exist in mathematical dimensions", weight = 2 },
    { text = "The chemical formula for the experimental weapon can't be reproduced by Allied scientists. The ingredients include concepts, not just substances", weight = 2 },
    { text = "Translated runic inscriptions from German occult sites predict this war - and the one that comes after, and the end of everything", weight = 2 },
    { text = "The captured German rocket contained a passenger - something that didn't burn up on re-entry, something that's been looking for a way here", weight = 3 },
]

[wrongness]
description = "Cosmic wrongness infecting the battlefield"
entries = [
    { text = "The angles of the ruined church don't add up to what they should. Stepping through the doorway leads somewhere else", weight = 2 },
    { text = "Shadows fall in the wrong direction at this outpost. They've been doing it since the massacre. No one wants to know what casts them", weight = 2 },
    { text = "The forest here grows too fast. Trees that were saplings at dawn are ancient by dusk. Time is wounded here", weight = 2 },
    { text = "Water runs uphill in this sector. Rivers flow backward. Maps redraw themselves overnight. The land remembers a different shape", weight = 2 },
    { text = "Stars in the night sky are wrong above this battlefield - constellations that haven't been seen since before the dinosaurs", weight = 3 },
    { text = "The corpses decompose wrong here - not rotting, but transforming into something that will stand up again wearing a different geometry", weight = 3 },
    { text = "Sound doesn't carry right across No Man's Land. Screams from yesterday still echo. Tomorrow's gunfire can already be heard", weight = 2 },
    { text = "Colors bleed into each other near the impact crater - red into sounds, screams into textures. Synaesthesia is contagious here", weight = 2 },
    { text = "The battlefield's magnetic north shifts to point toward the mass grave. Compasses spin when the dead are restless", weight = 2 },
    { text = "Temperature drops near the ritual site, regardless of weather. Frost forms patterns that are almost words", weight = 2 },
    { text = "Reflections in the bunker's flooded floor don't match reality. They show what this place looked like - or will look like - in another time", weight = 2 },
    { text = "The crater's edge curves wrong - it looks deeper from inside than outside, and distance to the rim is measured in more than meters", weight = 3 },
    { text = "Echoes in the tunnel arrive before the sounds that cause them. Soldiers have learned to listen to their future screams", weight = 2 },
    { text = "The mud here doesn't behave like mud - it's too warm, too yielding, almost welcoming. Men who fall in don't always come out the same", weight = 2 },
    { text = "Weather in this sector follows no meteorological logic. Storms gather when blood is spilled. The sky mourns or celebrates the violence below", weight = 2 },
    { text = "Photographs taken here show extra figures - never the living, always the same face, watching from different positions in each shot", weight = 2 },
    { text = "Radio static in this area forms words in languages that died before radio was invented", weight = 2 },
    { text = "The trench walls aren't earth anymore - the texture is wrong, organic, like being inside something that breathes", weight = 3 },
    { text = "Light sources cast shadows that don't match their shape. A lantern's shadow might be a reaching hand, a fire's shadow a crouching form", weight = 2 },
    { text = "Gravity fluctuates near the occult dig site - soldiers report weighing more or less without explanation, bullets curving impossibly", weight = 2 },
    { text = "The smell of the battlefield changes with the wind, cycling through stenches from different eras - rotting dinosaurs, burning cities not yet built", weight = 2 },
    { text = "Wounds heal wrong in this sector - flesh knits together in patterns that weren't there before, scars that form symbols", weight = 2 },
    { text = "The mud preserves things it shouldn't - ancient bones rise to the surface, bodies from wars not yet fought", weight = 2 },
    { text = "Reality thins here. Soldiers glimpse through to other versions of the battlefield where different sides won, where different things fight", weight = 3 },
    { text = "The dead don't stay dead, but they don't come back as what they were - they return as drafts of what humanity could have been", weight = 3 },
]
