# Bug War Combat Encounters
# The many ways the Arachnids try to kill you

[warrior_swarms]
description = "Standard bug infantry attacks"
entries = [
  { text = "Warriors boiling up from a previously undetected tunnel, mandibles scything through the first troopers before anyone can react", weight = 2 },
  { text = "A coordinated bug wave, hundreds of warriors advancing in perfect sync, the hive mind directing every pincer", weight = 2 },
  { text = "Lone warrior ambush from a hidden crevice, gets one trooper before the squad cuts it down, but there's never just one", weight = 2 },
