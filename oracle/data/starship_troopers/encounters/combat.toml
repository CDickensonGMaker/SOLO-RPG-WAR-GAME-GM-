  { text = "Night assault, warriors coating themselves in bioluminescent suppressor, invisible until they're in melee range", weight = 1 },
  { text = "Feigned retreat drawing the squad into a tunnel entrance where three more warriors wait in ambush", weight = 2 },
  { text = "Warriors breaching the firebase perimeter in three places simultaneously, too coordinated to be coincidence", weight = 2 },
  { text = "A single warrior playing dead, waiting until a trooper gets close enough to identify, then the strike", weight = 1 },
  { text = "Warriors emerging from the ground directly under the squad's position, the earth opening like a wound", weight = 2 },
  { text = "Relentless wave assault, bugs dying by the dozen but more always coming, ammunition becoming a concern", weight = 2 },
  { text = "Warriors attacking during a sandstorm, using the visibility reduction, approaching to close range before detection", weight = 1 },
