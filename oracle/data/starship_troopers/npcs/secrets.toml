# Dark Secrets of the Bug War
# What troopers carry that they'll never put in an after-action report

[friendly_fire]
description = "Accidents and not-accidents that haunt"
entries = [
  { text = "Called in an airstrike on a position that still had MI in it - 'acceptable losses' they said", weight = 2 },
  { text = "Shot a panicking trooper who was about to give away their position to a swarm", weight = 1 },
  { text = "Let a wounded squadmate die because they couldn't carry them and outrun the bugs", weight = 2 },
  { text = "Fragged an incompetent lieutenant - saved the platoon, murdered an officer", weight = 1 },
  { text = "Accidentally triggered a tanker bug's death spasm that killed three of their own", weight = 1 },
  { text = "Knows the 'training accident' that killed a rival was no accident", weight = 1 },
  { text = "Mercy-killed soldiers too wounded to save - not always with their consent", weight = 2 },
  { text = "Their navigation error put the drop pod in a kill zone - sixteen dead", weight = 1 },
]

[bug_related]
description = "Secrets involving the Arachnids"
entries = [
  { text = "Was captured by bugs and released - no one knows why, including them", weight = 1 },
  { text = "Had direct mental contact with a brain bug - something was left behind", weight = 1 },
  { text = "Sometimes feels the hive's pull - a whisper at the edge of consciousness", weight = 1 },
  { text = "Believes bugs might be intelligent, not just cunning - heresy in the Federation", weight = 1 },
  { text = "Witnessed bugs showing what looked like mercy - cannot explain it", weight = 1 },
  { text = "Has recurring dreams from a bug's perspective - wakes understanding mandible-speak", weight = 1 },
  { text = "Found evidence that bugs were provoked first - buried it for the good of morale", weight = 1 },
  { text = "Saved by a bug that killed other bugs attacking them - impossible, but true", weight = 1 },
]

[intelligence_failures]
description = "What command doesn't want you to know"
entries = [
  { text = "Knows Klendathu was a set-up - command knew the casualties in advance", weight = 1 },
  { text = "Has proof that intelligence ignored warnings about the Buenos Aires asteroid", weight = 1 },
  { text = "Saw a report classifying bugs as potential allies before it was destroyed", weight = 1 },
  { text = "Knows about the failed peace negotiation - bugs communicated, we refused", weight = 1 },
  { text = "Participated in a black op that made the war worse to justify escalation", weight = 1 },
  { text = "Has evidence that Sky Marshal Command gambles with unit deployments", weight = 1 },
  { text = "Witnessed Federation forces destroy a surrendering bug formation", weight = 1 },
  { text = "Knows the casualty numbers are falsified - real losses are triple reported", weight = 2 },
]

[desertion_and_cowardice]
description = "Failures of courage that no one knows about"
entries = [
  { text = "Hid during a bug assault while their squad was slaughtered - emerged as 'sole survivor'", weight = 1 },
  { text = "Ran from their position, forcing others to cover the gap - they died, you didn't", weight = 1 },
  { text = "Planning to desert at the next opportunity - just needs the right moment", weight = 1 },
  { text = "Already deserted once and was caught - the 'volunteer' assignment is punishment", weight = 1 },
  { text = "Froze in combat and someone else died covering for them", weight = 2 },
  { text = "Has a stash of civilian clothes and fake papers ready", weight = 1 },
  { text = "Self-inflicted wound to avoid a drop - no one noticed in the chaos", weight = 1 },
  { text = "Let a squadmate take a fatal mission they were assigned to", weight = 1 },
]

[black_ops]
description = "The Federation's dirty work"
entries = [
  { text = "Participated in the execution of 'bug sympathizers' - some were just scientists", weight = 1 },
  { text = "Was part of a team that seeded bugs on a neutral colony to justify invasion", weight = 1 },
  { text = "Helped dispose of failed psychic experiments - they were still human", weight = 1 },
  { text = "Knows about the breeding program using captured brain bug DNA", weight = 1 },
  { text = "Eliminated Federation citizens who learned too much about the war's origins", weight = 1 },
  { text = "Transported cargo that screamed - orders were not to look", weight = 1 },
  { text = "Knows about the 'Omega Protocol' - what happens when a world can't be held", weight = 1 },
  { text = "Was part of a false flag operation that killed Federation civilians", weight = 1 },
]

[personal_betrayals]
description = "Individual sins and failures"
entries = [
  { text = "Stole from dead comrades - their families never got the effects", weight = 2 },
  { text = "Used squad members as bait to save themselves", weight = 1 },
  { text = "Falsified records to get a deceased trooper's hazard pay", weight = 1 },
  { text = "Having an affair with a superior officer - favors flow both ways", weight = 1 },
  { text = "Sold military equipment on the black market - bugs got Federation weapons", weight = 1 },
  { text = "Knows who really shot the company commander - it wasn't bugs", weight = 1 },
  { text = "Blackmailing a fellow trooper with knowledge of their past", weight = 1 },
  { text = "Got their citizenship through falsified service records", weight = 1 },
  { text = "Turned in a friend for sedition to avoid investigation of their own comments", weight = 1 },
  { text = "Abandoned their family to enlist - they think they're dead", weight = 2 },
]
