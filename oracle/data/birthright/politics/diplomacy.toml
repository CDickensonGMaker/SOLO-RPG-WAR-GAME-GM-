]
oracle_questions = [
    "Do other powers support your denunciation?",
    "How does the target respond?",
    "Is your own record clean enough to criticize?",
    "Does this escalate the conflict?",
    "Do the facts support your accusations?"
]

[[diplomatic_actions]]
name = "Host Summit"
type = "domain_action"
cost = "2-5 GB"
time = "1 domain turn"
description = "Organize major diplomatic gathering in your domain"
requirements = [
    "Suitable venue",
    "Invitations accepted",
    "Security arrangements",
    "Hospitality expenses"
]
effects = [
    "Central role in regional diplomacy",
    "Opportunity for multiple negotiations",
    "Prestige from hosting",
    "Intelligence gathering opportunity"
]
risks = [
    "Security breach could be disastrous",
    "Summit failure reflects on host",
    "Expensive if prolonged",
    "May be drawn into disputes you wanted to avoid"
]
oracle_questions = [
    "Who accepts the invitation?",
