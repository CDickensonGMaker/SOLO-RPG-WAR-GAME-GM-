    "Does the losing party accept the judgment?",
    "Are there appeals or further challenges?",
    "Does the arbitration actually end the dispute?"
]

# ============================================================================
# REPUTATION SYSTEM
# ============================================================================
# How a regent's standing affects diplomatic relations

[reputation]
description = "A regent's reputation affects all diplomatic interactions"

[[reputation.traits]]
name = "Honorable"
description = "Known for keeping promises and fair dealing"
effects = [
    "+2 to treaty negotiations",
    "Others more willing to trust agreements",
    "Easier to form alliances"
]
how_to_gain = [
    "Keep all treaty obligations",
    "Deal fairly even when advantageous not to",
    "Honor agreements even after circumstances change"
]
how_to_lose = [
    "Break any sworn agreement",
    "Act treacherously in any context",
    "Lie in official diplomatic communications"
]

[[reputation.traits]]
name = "Oath-Breaker"
description = "Known for violating agreements when convenient"
effects = [
    "-4 to treaty negotiations",
    "Others demand extreme guarantees",
    "Difficult to form genuine alliances"
]
how_to_gain = [
    "Break a sworn treaty or oath",
    "Betray an ally",
    "Lie in official diplomatic communications"
]
how_to_lose = [
    "Years of honorable behavior",
    "Major sacrifice to uphold an inconvenient agreement",
    "Public penance and restitution"
]

[[reputation.traits]]
name = "Aggressor"
description = "Known for military expansion and starting wars"
effects = [
    "-2 to defensive alliances (others fear being drawn into your wars)",
    "Neighbors maintain larger militaries",
    "Coalitions may form against you"
]
how_to_gain = [
    "Start multiple wars",
    "Conquer neighbors without casus belli",
    "Reject peaceful solutions repeatedly"
]
how_to_lose = [
    "Long period of peace",
    "Accept mediated settlements",
    "Return conquered territories"
]

[[reputation.traits]]
name = "Defender of the Realm"
description = "Known for protecting others and maintaining peace"
effects = [
    "+2 to defensive alliance formation",
    "Weaker powers seek your protection",
    "Good standing with temples of lawful gods"
]
how_to_gain = [
    "Defend allies when attacked",
    "Protect weaker realms from aggression",
    "Maintain regional peace"
]
how_to_lose = [
    "Fail to honor defensive commitments",
    "Attack weaker neighbors",
    "Start aggressive wars"
]

[[reputation.traits]]
name = "Reliable Ally"
description = "Known for supporting allies consistently"
effects = [
    "+3 to alliance formation and maintenance",
    "Allies share information freely",
    "Attracts potential allies"
]
how_to_gain = [
    "Support allies in their conflicts",
    "Provide assistance when asked",
    "Never abandon an ally in need"
]
how_to_lose = [
    "Fail to support ally when tested",
    "Prioritize self-interest over alliance",
    "Make separate peace abandoning allies"
]

[[reputation.traits]]
name = "Fair Dealer"
description = "Known for equitable trade and honest commerce"
effects = [
    "+2 to trade agreements",
    "Merchants prefer your markets",
    "Guild holdings prosper"
]
how_to_gain = [
    "Honor trade agreements fully",
    "Resolve commercial disputes fairly",
    "Avoid exploitative practices"
]
how_to_lose = [
    "Cheat trade partners",
    "Impose unfair tariffs",
    "Support piracy or smuggling"
]

[[reputation.traits]]
name = "Patron of Faith"
description = "Known for supporting religious institutions"
effects = [
    "+2 to dealings with temple regents",
    "Temple support more forthcoming",
    "Religious leaders advocate for you"
]
how_to_gain = [
    "Build and support temples",
    "Defend religious rights",
    "Act in accordance with religious principles"
]
how_to_lose = [
    "Persecute religious institutions",
    "Violate religious law flagrantly",
    "Support enemies of the faith"
]

[reputation.tracking]
description = "How to track reputation"
method = "Track notable actions by season. Major actions establish or change traits."
persistence = "Reputation traits persist until contradicted by significant actions"
regional_variation = "Reputation may vary by region based on local knowledge and propaganda"
oracle_questions = [
    "What is the general perception of this regent?",
    "Has recent news changed anyone's opinion?",
    "Do different groups have different views?",
    "Is someone spreading propaganda about this regent?",
    "What would it take to change this reputation?"
]

# ============================================================================
# CASUS BELLI
# ============================================================================
# Valid justifications for war that affect legitimacy and alliances

[casus_belli]
description = "Recognized legitimate reasons for war that affect how other powers view the conflict"

[[casus_belli.types]]
name = "Defensive War"
legitimacy = "universally recognized"
description = "War in response to direct attack on your domain"
effects = [
    "Full legitimacy, no reputation penalty",
    "Allies obligated to assist",
    "Neutral powers sympathetic",
    "May call for coalition against aggressor"
]
requirements = [
    "Actually attacked first",
    "Not provoked attack through aggression"
]
oracle_questions = [
    "Was the attack unprovoked?",
    "Did you do anything that could be seen as provocation?",
    "Do neutral powers accept your defensive framing?"
]

[[casus_belli.types]]
name = "Treaty Violation"
legitimacy = "generally recognized"
description = "War due to other party breaking sworn agreement"
effects = [
    "Strong legitimacy if violation clear",
    "Treaty guarantors may support you",
    "Violator loses reputation",
    "Neutral powers may accept your position"
]
requirements = [
    "Clear, documented violation",
    "Attempted peaceful resolution first",
    "Proportional response"
]
oracle_questions = [
    "Is the violation clear-cut or debatable?",
    "Did you attempt diplomatic resolution?",
    "Do others agree the violation occurred?",
    "Is your response proportional?"
]

[[casus_belli.types]]
name = "Dynastic Claim"
legitimacy = "contested"
description = "War to press inheritance or succession claim"
effects = [
    "Legitimacy depends on claim strength",
    "Some powers may support, others oppose",
    "Long wars common as claims disputed",
    "May need to defeat all rival claimants"
]
requirements = [
    "Plausible legal claim through blood or marriage",
    "Claim not previously renounced",
    "Current ruler's legitimacy questionable"
]
oracle_questions = [
    "How strong is your claim legally?",
    "Who supports your claim?",
    "Are there rival claimants?",
    "Will the population accept you as ruler?"
]

[[casus_belli.types]]
name = "Holy War"
legitimacy = "varies by faith"
description = "War declared for religious purposes"
effects = [
    "Co-religionists may support or join",
    "Other faiths may ally against you",
    "Temples provide support",
    "May become existential conflict"
]
requirements = [
    "Religious authority supports the war",
    "Clear religious objective",
    "Temple backing"
]
oracle_questions = [
    "Do religious authorities truly support this war?",
    "Does the faith community rally to the cause?",
    "Do other faiths unite in opposition?",
    "Is this genuinely religious or using religion as excuse?"
]

[[casus_belli.types]]
name = "Punitive War"
legitimacy = "situational"
description = "War to punish specific offenses (raids, insults, crimes)"
effects = [
    "Legitimacy depends on offense severity",
    "Limited war objectives expected",
    "Exceeding stated aims damages legitimacy",
    "May be seen as excuse for expansion"
]
requirements = [
    "Documented offense",
    "Peaceful redress refused",
    "Proportional objectives"
]
oracle_questions = [
    "Was the offense genuine and serious?",
    "Did you actually seek peaceful resolution?",
    "Are your war aims proportional?",
    "Do others see this as legitimate or pretext?"
]

[[casus_belli.types]]
name = "Liberation"
legitimacy = "contested"
description = "War to free oppressed population or overthrow tyrant"
effects = [
    "Legitimacy depends on target ruler's reputation",
    "Liberated population's response crucial",
    "May be seen as interference or genuine aid",
