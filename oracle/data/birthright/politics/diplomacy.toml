# ============================================================================
# DIPLOMACY SYSTEM - Birthright Solo Oracle
# ============================================================================
# Political relationships between regents drive Cerilian history.
# This system provides mechanics for alliances, treaties, and negotiations.
# ============================================================================

[meta]
title = "Diplomatic Relations"
description = "Alliance types, treaty mechanics, and international relations for regent play"
version = "1.0.0"
author = "Birthright Oracle System"

# ============================================================================
# ALLIANCE TYPES
# ============================================================================
# The fundamental forms of political cooperation between regents

[[alliance_types]]
name = "Military Alliance"
description = "Mutual defense pact between regents sworn to protect each other"
formality = "high"
typical_duration = "Permanent until broken"
benefits = [
    "Allied units may be mustered in allied territory",
    "Coordinated military actions without diplomacy checks",
    "+2 to domain actions against common enemies",
    "Share military intelligence freely",
    "May garrison allied provinces with permission"
]
obligations = [
    "Must declare war if ally is attacked",
    "Cannot attack ally or ally's allies",
    "Must contribute to mutual defense efforts",
    "Share warning of known threats",
    "Cannot negotiate separately with common enemies"
]
formation_requirements = [
    "Both parties must have positive relations",
    "No active conflicts between signatories",
    "Treaty ratification costs 1 RP each",
    "Often sealed with hostage exchange or marriage"
]
breaking_cost = "Lose 1d6 RP, severe reputation penalty, possible casus belli for former ally"
oracle_questions = [
    "Does the ally honor their commitment when tested?",
    "Are there secret clauses to the alliance?",
    "Does a third party try to break the alliance?",
    "Is the ally's commitment genuine or are they using you?",
    "What concession does your ally demand in crisis?"
]

[[alliance_types]]
name = "Trade Agreement"
description = "Economic cooperation ensuring favorable commerce between domains"
formality = "medium"
typical_duration = "5-10 years, renewable"
benefits = [
    "+1 GB per trade route between domains",
    "Reduced tariffs on goods",
    "Merchants may operate freely in allied territory",
    "Shared market information",
    "Preferential treatment for guild holdings"
]
obligations = [
    "Cannot impose trade sanctions on partner",
    "Must allow partner merchants safe passage",
    "Cannot support piracy against partner's shipping",
    "Must negotiate before changing tariffs"
]
formation_requirements = [
    "At least one guild holding in each domain",
    "No active trade wars",
    "Costs 1 GB to formalize"
]
breaking_cost = "Lose 1d4 GB immediately, trade disruption, reputation penalty with merchants"
oracle_questions = [
    "Is smuggling undermining the agreement?",
    "Does a guild secretly favor one party?",
    "Are the terms actually equitable?",
    "What goods become contentious?",
    "Does a third party offer a better deal?"
]

[[alliance_types]]
name = "Marriage Alliance"
description = "Dynastic union binding two houses through blood"
formality = "very high"
typical_duration = "Permanent (until death or annulment)"
benefits = [
    "Bloodline potential merger in heirs",
    "Strong political bond difficult to break",
    "Shared claim to both domains' succession",
    "Family connections provide +2 to diplomacy",
    "Hostage situation resolved naturally"
]
obligations = [
    "Must treat spouse's family as kin",
    "Cannot attack spouse's natal domain",
    "Must support spouse's family in succession disputes",
    "Children's marriages become joint decisions"
]
formation_requirements = [
    "Eligible parties of appropriate status",
    "Dowry negotiation (typically 2-10 GB)",
    "No blood feud between families",
    "Temple blessing (variable requirements)"
]
breaking_cost = "Annulment requires temple and church approval, causes blood feud, RP and GB losses, possible war"
oracle_questions = [
    "Is the marriage happy or purely political?",
    "Does the spouse have their own agenda?",
    "Are there fertility concerns?",
    "Does the spouse's family meddle?",
    "What secrets does the new spouse bring?"
]

[[alliance_types]]
name = "Vassalage"
description = "Feudal subordination where one regent swears fealty to another"
formality = "very high"
typical_duration = "Permanent (hereditary)"
benefits_for_lord = [
    "Vassal provides military service when called",
    "Vassal pays tribute (typically 10-20% of domain income)",
    "Vassal cannot conduct independent foreign policy",
    "Lord may mediate vassal's disputes",
    "Lord gains prestige and RP from vassal's holdings"
]
benefits_for_vassal = [
    "Lord provides military protection",
    "Lord cannot interfere in internal domain affairs",
    "Vassal retains autonomy in domestic matters",
    "Access to lord's court and resources",
    "Legitimacy through association with powerful lord"
]
obligations = [
    "Vassal must answer military summons",
    "Vassal must attend lord's court when summoned",
    "Lord must protect vassal from external threats",
    "Lord must not demand impossible service"
]
formation_requirements = [
    "Significant power imbalance or defeat in war",
    "Formal oath of fealty ceremony",
    "Often follows conquest or protection agreement"
]
breaking_cost = "Rebellion is casus belli, oath-breaker status, loss of all RP, potential excommunication"
oracle_questions = [
    "Is the vassal plotting independence?",
    "Does the lord demand too much?",
    "Are other vassals jealous?",
    "Is the oath genuinely binding?",
    "What happens when interests diverge?"
]

[[alliance_types]]
name = "Federation"
description = "League of equals united for common purpose while retaining sovereignty"
formality = "high"
typical_duration = "Indefinite with withdrawal provisions"
benefits = [
    "Collective security against external threats",
    "Shared resources for major projects",
    "Common foreign policy on key issues",
    "Internal free trade and movement",
    "Combined weight in international negotiations"
]
obligations = [
    "Contribute to common defense fund",
    "Abide by federation council decisions",
    "Cannot make separate peace with federation enemies",
    "Must submit internal disputes to federation arbitration"
]
formation_requirements = [
    "Multiple willing participants",
    "Common threat or interest",
    "Agreement on governance structure",
    "Foundation treaty negotiation"
]
breaking_cost = "Loss of federation benefits, possible sanctions, reputation penalty"
oracle_questions = [
    "Which member is seeking dominance?",
    "Does the federation have a free-rider problem?",
    "Are the voting rules fair?",
    "What happens when members disagree fundamentally?",
    "Is there a secret inner council?"
]

[[alliance_types]]
name = "Non-Aggression Pact"
description = "Simple agreement not to attack each other, often between rivals"
formality = "low"
typical_duration = "1-5 years, renewable"
benefits = [
    "Freedom from immediate threat",
    "May reduce border garrison costs",
    "Opens door to further negotiations",
    "Stabilizes one front during other conflicts"
]
obligations = [
    "Cannot attack signatory",
    "Cannot support signatory's enemies",
    "Must warn of known third-party threats"
]
formation_requirements = [
    "Willingness to pause hostilities",
    "No active war (or armistice first)",
    "Minimal cost to establish"
]
breaking_cost = "Loss of 1d4 RP, reputation as oath-breaker, possible coalition against you"
oracle_questions = [
    "Is this just buying time to prepare for war?",
    "Are both parties sincere?",
    "What triggers the agreement's end?",
    "Does a third party try to provoke violation?",
    "What happens at the borders despite the pact?"
]

[[alliance_types]]
name = "Temple Concordat"
description = "Religious agreement governing church relations and spheres of influence"
formality = "high"
typical_duration = "Permanent unless circumstances change"
benefits = [
    "Peaceful coexistence between faiths or church branches",
    "Defined temple holding territories",
    "Joint action against heresy or common religious foes",
    "Shared pilgrimage rights"
]
obligations = [
    "Respect other church's holdings",
    "No aggressive conversion in agreed territories",
    "Mutual support against persecution",
    "Joint holy day observances where appropriate"
]
formation_requirements = [
    "Compatible or tolerant theologies",
    "Approval from highest religious authorities",
    "Clear territorial demarcation"
]
breaking_cost = "Religious scandal, loss of temple support, possible excommunication, holy war risk"
oracle_questions = [
    "Do the congregations accept the concordat?",
    "Are there zealots who reject compromise?",
    "What theological disputes remain?",
    "Does a third religion threaten both?",
    "Are there secret missionary efforts despite the pact?"
]

# ============================================================================
# TREATY MECHANICS
# ============================================================================
# How treaties are negotiated, maintained, and broken

[treaty_mechanics]
description = "Rules for creating and maintaining formal agreements between regents"

[treaty_mechanics.negotiation]
description = "The process of reaching agreement"
steps = [
    "1. Initial contact - establish willingness to negotiate",
    "2. Preconditions - resolve any barriers to talks",
    "3. Draft terms - propose initial agreement",
    "4. Bargaining - negotiate final terms",
    "5. Ratification - formal acceptance by all parties",
    "6. Implementation - put treaty into effect"
]
modifiers = [
    { condition = "Common enemy", modifier = "+4 to negotiation" },
    { condition = "Recent conflict", modifier = "-4 to negotiation" },
    { condition = "Blood feud exists", modifier = "-8 to negotiation" },
    { condition = "Marriage ties exist", modifier = "+2 to negotiation" },
    { condition = "Same religion", modifier = "+1 to negotiation" },
    { condition = "Different religions", modifier = "-1 to negotiation" },
    { condition = "Shared cultural heritage", modifier = "+2 to negotiation" },
    { condition = "Historic enmity", modifier = "-2 to negotiation" },
    { condition = "Major power imbalance", modifier = "+2 for stronger party" },
    { condition = "Neutral mediator present", modifier = "+2 to both parties" }
]
oracle_questions = [
    "What does the other party secretly want?",
    "Is there a dealbreaker neither side will compromise on?",
    "Does a third party try to sabotage negotiations?",
    "Are the negotiators authorized to make final decisions?",
    "What unexpected complication arises?"
]

[treaty_mechanics.enforcement]
description = "How treaties are maintained"
mechanisms = [
    "Hostage exchange - noble children or heirs held as guarantee",
    "Temple guarantees - religious authority backs agreement",
    "Third-party enforcement - powerful neutral ensures compliance",
    "Reputation stakes - breaking treaty damages standing",
    "Mutual interest - both parties benefit from compliance"
]
violation_detection = [
    "Spy networks report violations",
    "Merchant complaints reveal trade violations",
    "Military movements observed",
    "Defectors reveal secret breaches",
    "Third parties report observed violations"
]
oracle_questions = [
    "Is either party secretly violating the treaty?",
    "Do accusations of violation have merit?",
    "Is the treaty being followed to the letter but violated in spirit?",
    "Are third parties spreading false violation rumors?",
    "Has the situation changed enough to justify renegotiation?"
]

[treaty_mechanics.modification]
description = "Changing existing treaties"
reasons = [
    "Changed circumstances",
    "One party gained/lost significant power",
    "Original terms proved unworkable",
    "New threats require adjustment",
    "Succession changed one party's government"
]
process = [
    "Request modification formally",
    "Demonstrate changed circumstances",
    "Negotiate new terms",
    "Ratify modifications",
    "Update all records"
]
oracle_questions = [
    "Is the modification request in good faith?",
    "Does the other party see this as a betrayal?",
    "Are modified terms actually better for both parties?",
    "Does modification open the door to further demands?",
    "Should the treaty be replaced entirely?"
]

# ============================================================================
# DIPLOMATIC ACTIONS
# ============================================================================
# Specific actions regents can take in international relations

[[diplomatic_actions]]
name = "Establish Embassy"
type = "domain_action"
cost = "1 GB, 1 RP"
time = "1 domain turn"
description = "Create permanent diplomatic presence in another regent's domain"
requirements = [
    "Permission from host regent",
    "Suitable location in capital",
    "Diplomatic staff"
]
effects = [
    "+2 to all diplomatic actions with that regent",
    "Early warning of political developments",
    "Easier espionage operations (if desired)",
    "Facilitates trade negotiations"
]
risks = [
    "Embassy staff may be taken hostage in crisis",
    "Diplomats may be expelled",
    "Espionage discovery damages relations severely"
]
oracle_questions = [
    "What is the ambassador's hidden agenda?",
    "Does the host regent trust the embassy?",
    "Are rival powers jealous of the relationship?",
    "What local customs cause friction?",
    "Is the embassy being watched?"
]

[[diplomatic_actions]]
name = "Send Envoy"
type = "domain_action"
cost = "1 GB"
time = "Variable"
description = "Dispatch representative with specific diplomatic mission"
requirements = [
    "Suitable envoy available",
    "Clear mandate and authority",
    "Safe passage (or risk)"
]
effects = [
    "Can propose treaties, deliver ultimatums, gather information",
    "Success depends on envoy skill and situation",
    "May require multiple turns for distant realms"
]
risks = [
    "Envoy may be killed or captured",
    "Mission may fail",
    "Envoy may exceed authority",
    "Envoy may be turned by enemy"
]
oracle_questions = [
    "Does the envoy arrive safely?",
    "How is the envoy received?",
    "Does the envoy have their own agenda?",
    "What obstacles delay the mission?",
    "Does the envoy bring back unexpected information?"
]

[[diplomatic_actions]]
name = "Issue Ultimatum"
type = "domain_action"
cost = "None"
time = "Immediate"
description = "Demand specific action with threat of consequences"
requirements = [
    "Credible threat capability",
    "Clear demand",
    "Defined deadline"
]
effects = [
    "May force compliance without conflict",
    "Establishes casus belli if refused",
    "Demonstrates resolve to other powers",
    "May escalate to war"
]
risks = [
    "May provoke immediate war",
    "Bluff may be called",
    "May appear unreasonable to neutral parties",
    "Damages relationship permanently"
]
oracle_questions = [
    "Does the target comply?",
    "Does the target counter with their own demands?",
    "Do third parties intervene?",
    "Is the threat credible?",
    "What happens when the deadline passes?"
]

[[diplomatic_actions]]
name = "Offer Tribute"
type = "domain_action"
cost = "Variable (tribute amount)"
time = "1 domain turn"
description = "Give gifts or payments to secure favor or avoid conflict"
requirements = [
    "Resources to offer",
    "Willingness to accept subordinate position"
]
effects = [
    "May prevent war or invasion",
    "May secure alliance or favor",
    "Demonstrates submission",
    "Buys time"
]
risks = [
    "Appears weak to other powers",
    "Recipient may demand more",
    "Never satisfies aggressive neighbor permanently",
    "Internal opposition to 'paying off' enemies"
]
oracle_questions = [
    "Is the tribute accepted?",
    "Does the recipient demand more?",
    "How do other powers view this?",
    "How do your own nobles react?",
    "Does tribute become expected regular payment?"
]

[[diplomatic_actions]]
name = "Recognize Legitimacy"
type = "domain_action"
cost = "1 RP"
time = "Immediate"
description = "Formally acknowledge another regent's right to rule"
requirements = [
    "Regent to recognize",
    "No competing claims you support"
]
effects = [
    "+1 to relations with recognized regent",
    "May gain favor or alliance opportunity",
    "Affects regional power dynamics",
    "May anger competing claimants"
]
risks = [
    "Backing wrong claimant if they lose",
    "Alienating other claimants",
    "Being seen as meddling in internal affairs"
]
oracle_questions = [
    "Is the recognized regent grateful?",
    "Do other claimants become hostile?",
    "Does recognition actually help their position?",
    "Are there strings attached?",
    "Does this draw you into their conflicts?"
]

[[diplomatic_actions]]
name = "Mediate Dispute"
