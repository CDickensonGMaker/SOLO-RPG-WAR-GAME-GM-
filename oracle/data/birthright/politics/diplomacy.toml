    "One party may see you as favoring the other"
]
oracle_questions = [
    "Are both parties negotiating in good faith?",
    "What does each party really want?",
    "Is there actually a solution that satisfies both?",
    "Does a third party sabotage the talks?",
    "What compromise can you propose?"
]

[[diplomatic_actions]]
name = "Denounce"
