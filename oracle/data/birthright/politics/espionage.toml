# ============================================================================
# Things that can go wrong or add drama to espionage operations

[[espionage_complications]]
name = "Agent Goes Rogue"
description = "An agent develops their own agenda"
trigger = "Agent in deep cover or with significant autonomy"
effects = [
    "Agent pursues personal goals",
    "May sell information to multiple parties",
    "May become obstacle rather than asset"
]
resolution_options = [
    "Recall and control",
    "Eliminate agent",
    "Negotiate new arrangement",
    "Accept new situation"
]
oracle_questions = [
    "What does the rogue agent want?",
    "Have they betrayed you yet?",
    "Can they be brought back under control?",
    "Are they now an enemy?"
]

[[espionage_complications]]
name = "Honey Trap"
description = "Agent becomes romantically involved with target or mark"
trigger = "Close contact over time"
effects = [
    "Agent's loyalty divided",
    "Intelligence may be compromised",
    "Agent may protect target"
]
resolution_options = [
    "Extract agent",
    "Use relationship as additional leverage",
    "Accept complications",
    "Terminate agent's involvement"
]
oracle_questions = [
    "Are the feelings genuine?",
    "Does the target know the agent's true role?",
    "Will the agent choose mission or love?",
    "Can this be exploited further?"
]

[[espionage_complications]]
name = "False Flag Discovery"
description = "Evidence of espionage points to wrong party"
trigger = "Failed operation with misleading evidence"
effects = [
    "Innocent party blamed",
    "Real perpetrator hidden",
    "Diplomatic incident with wrong target"
]
resolution_options = [
    "Let false attribution stand",
    "Correct the record",
    "Exploit the confusion"
]
oracle_questions = [
    "Who is falsely blamed?",
    "Do they protest innocence?",
    "Does anyone believe them?",
    "What are the consequences of false attribution?"
]

[[espionage_complications]]
name = "Compromised Network"
description = "Enemy has penetrated your intelligence operations"
trigger = "Counter-espionage success by enemy"
effects = [
    "Information flows to enemy",
    "Operations compromised",
    "Agents at risk"
]
resolution_options = [
    "Purge and rebuild network",
    "Feed disinformation",
    "Identify and turn double agent",
    "Accept loss and start over"
]
oracle_questions = [
    "How deep is the compromise?",
    "Which operations are affected?",
    "Can the mole be identified?",
    "What damage has already been done?"
]

[[espionage_complications]]
name = "Blown Operation Escalates"
description = "Failed operation creates international incident"
trigger = "Botched high-profile operation"
effects = [
    "Public accusation",
    "Diplomatic crisis",
    "Possible war"
]
resolution_options = [
    "Deny everything",
    "Sacrifice scapegoat",
    "Admit and apologize",
    "Escalate further"
]
oracle_questions = [
    "What evidence exists?",
    "Is denial credible?",
    "Who can be sacrificed?",
    "What does the target demand?"
]

[[espionage_complications]]
name = "Competing Spy Services"
description = "Another power's spies interfere with your operations"
trigger = "Multiple powers operating in same area"
effects = [
    "Operations conflict",
    "Confusion over intelligence",
    "Possible cooperation or competition"
]
resolution_options = [
    "Coordinate with other spies",
    "Sabotage their operations",
    "Maintain separation",
    "Share targets"
]
oracle_questions = [
    "Whose spies are these?",
    "Are they working with or against you?",
    "Can you cooperate?",
    "Do they know about you?"
]

[[espionage_complications]]
name = "Magical Detection"
description = "Divination magic reveals espionage operations"
trigger = "Target employs magical security"
effects = [
    "Operations detected supernaturally",
    "Agents identified",
    "Plans revealed"
]
countermeasures = [
    "Anti-divination protections (expensive)",
    "Compartmentalized knowledge",
    "Mundane-only operations",
    "Counter-magical support"
]
oracle_questions = [
    "What does divination reveal?",
    "Can counter-magic protect operations?",
    "Does the target have a court wizard?",
    "Are magical countermeasures available?"
]

[[espionage_complications]]
name = "Innocent Casualties"
description = "Espionage operation causes unintended harm"
trigger = "Collateral damage from operation"
effects = [
    "Moral complications",
    "Possible investigation",
    "Reputation risk if revealed",
    "Agent may have crisis of conscience"
]
resolution_options = [
    "Cover up",
    "Compensate victims secretly",
    "Accept consequences",
    "Blame others"
]
oracle_questions = [
    "Who was harmed?",
    "Is the harm discovered?",
    "How do agents react?",
    "Can this be traced back?"
]

