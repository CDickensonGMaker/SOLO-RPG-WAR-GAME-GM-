# ============================================================================
# ESPIONAGE SYSTEM - Birthright Solo Oracle
# ============================================================================
# The shadow war between regents - spies, assassins, and intrigue.
# Every court has its secrets; espionage is how those secrets are found,
# exploited, or protected.
# ============================================================================

[meta]
title = "Espionage Operations"
description = "Covert actions, spy networks, and shadow warfare for regent play"
version = "1.0.0"
author = "Birthright Oracle System"

# ============================================================================
# ESPIONAGE INFRASTRUCTURE
# ============================================================================
# Building and maintaining intelligence capabilities

[spy_networks]
description = "Establishing covert intelligence operations"

[spy_networks.creation]
name = "Create Spy Network"
type = "domain_action"
cost = "2 GB, 1 RP"
time = "1 domain turn to establish, ongoing maintenance"
dc = "DC 15"
description = "Establish network of informants, agents, and safe houses in target domain"
requirements = [
    "Access to target domain (trade, diplomacy, or covert entry)",
    "Initial contacts to recruit",
    "Funding for bribes and expenses"
]
success_effects = [
    "Gain intelligence on target domain's actions",
    "Enables espionage operations in that domain",
    "+2 to all espionage actions in target domain",
    "Early warning of actions against you"
]
failure_effects = [
    "Agents exposed",
    "Diplomatic incident possible",
    "Target aware of your interest",
    "Investment lost"
]
maintenance = "1 GB per turn to maintain, or network degrades"
discovery_risk = "Each turn, 10% base chance of partial exposure"
oracle_questions = [
    "Is the network compromised from the start?",
    "Who is the key agent running the network?",
    "What unexpected intelligence comes first?",
    "Is there a double agent in the network?",
    "What does the network cost beyond gold?"
]

[spy_networks.levels]
description = "Quality levels of spy networks"

[[spy_networks.levels.tiers]]
level = 1
name = "Informant Network"
description = "Basic contacts and observers"
capabilities = [
    "General political news",
    "Public troop movements",
    "Court rumors"
]
cost = "1 GB/turn"
discovery_risk = "5%/turn"

[[spy_networks.levels.tiers]]
level = 2
name = "Agent Network"
description = "Trained operatives and recruited insiders"
capabilities = [
    "Private council discussions",
    "Economic intelligence",
    "Military disposition details",
    "Enables basic operations"
]
cost = "2 GB/turn"
discovery_risk = "10%/turn"

[[spy_networks.levels.tiers]]
level = 3
name = "Intelligence Service"
description = "Professional organization with deep penetration"
capabilities = [
    "Access to secret documents",
    "Highly placed sources",
    "Counterintelligence capability",
    "Enables all operations"
]
cost = "4 GB/turn"
discovery_risk = "15%/turn"

