# ============================================================================
# POLITICAL INTRIGUE EVENTS - Birthright Solo Oracle
# ============================================================================
# A massive table of political complications, crises, and dramatic events
# that drive Cerilian politics. Use these to generate endless drama.
# ============================================================================

[meta]
title = "Political Intrigue Events"
description = "Random and triggered political events for solo regent play"
version = "1.0.0"
author = "Birthright Oracle System"

# ============================================================================
# SUCCESSION CRISES
# ============================================================================
# When the question of who rules becomes contested

[[succession_crises]]
name = "Unexpected Death"
description = "Regent dies suddenly without clear succession plan"
trigger = "Random event, assassination, accident, or illness"
immediate_effects = [
    "Power vacuum created",
    "Multiple claimants emerge",
    "Domain actions suspended until resolved"
]
claimant_generation = [
    "Eldest child (if any)",
    "Younger siblings",
    "Distant relatives with bloodline",
    "Powerful nobles with weak claims",
    "Temple-backed candidates",
    "Foreign claimants through marriage"
]
resolution_paths = [
    "Clear succession accepted",
    "Council of nobles decides",
    "Civil war between claimants",
    "Foreign intervention",
    "Temple arbitration",
    "Marriage unites claims"
]
oracle_questions = [
    "How sudden was the death?",
    "Were there signs of foul play?",
    "Who benefits most from the death?",
    "Is the bloodline passed to anyone?",
    "Do any claimants have foreign backing?"
]

[[succession_crises]]
name = "Disputed Heir"
description = "Legitimacy of designated heir questioned"
trigger = "Rumors, new evidence, or rival claims"
immediate_effects = [
    "Heir's position weakened",
    "Alternative candidates emerge",
    "Investigation or trial possible"
]
dispute_reasons = [
    "Illegitimacy claimed (bastard accusations)",
    "Wrong bloodline (switched at birth, adoption hidden)",
    "Previous marriage invalidated",
    "Better claim by another exists",
    "Heir declared unfit (mental, physical, moral)",
    "Heir renounced claim (forced or voluntary)"
]
oracle_questions = [
    "Is the accusation true?",
    "Who benefits from the dispute?",
    "What evidence exists?",
    "Will the heir fight for position?",
    "Can the dispute be resolved peacefully?"
]

[[succession_crises]]
name = "Regency Conflict"
description = "Control over minor heir becomes contested"
trigger = "Young heir with regent/protector needed"
immediate_effects = [
    "Power behind throne contested",
    "Young heir used as pawn",
    "Factions form around different regents"
]
regent_candidates = [
    "Queen mother/dowager",
    "Powerful uncle",
    "Council of nobles",
    "Temple authority",
    "Foreign ally (through treaty)",
    "Ambitious chancellor"
]
oracle_questions = [
    "Who controls the young heir?",
    "Is the regent loyal or ambitious?",
    "Will the heir survive to majority?",
    "Do factions plan coup at majority?",
    "Is the heir being educated or manipulated?"
]

[[succession_crises]]
name = "Abdication Crisis"
description = "Regent abdicates or is forced to step down"
trigger = "Defeat, scandal, religious conversion, or exhaustion"
immediate_effects = [
    "Sudden transfer of power",
    "May not follow normal succession",
    "Bloodline transfer considerations"
]
abdication_reasons = [
    "Military defeat and disgrace",
    "Scandal too great to survive",
    "Religious calling (joins temple)",
    "Physical or mental decline",
    "Forced by nobles or foreign power",
    "Voluntary retirement"
]
oracle_questions = [
    "Is the abdication voluntary?",
    "Who gains from this?",
    "Does the former regent retain any power?",
    "Is there a designated successor?",
    "Will the former regent stay in the domain?"
]

[[succession_crises]]
name = "Bloodline Extinction"
description = "Ruling bloodline has no heirs"
trigger = "Last member of bloodline dies without heirs"
immediate_effects = [
    "Domain loses bloodline benefits",
    "Major power vacuum",
    "Multiple factions claim legitimacy"
]
resolution_paths = [
    "Bloodline passes through investiture to new regent",
    "Unrelated dynasty takes over (no bloodline)",
    "Foreign blooded regent claims domain",
    "Temple assumes control",
    "Domain fragments"
]
oracle_questions = [
    "Are there any hidden heirs?",
    "Does anyone have a claim through ancient marriage?",
    "Will a foreign power seize the opportunity?",
    "Can the bloodline be recreated through bloodtheft?",
    "What happens to the domain's regency?"
]

