# ============================================================================
# COURT INTRIGUE SYSTEM - Birthright Solo Oracle
# ============================================================================
# The regent's court is where power is wielded, alliances forged, and
# reputations made or destroyed. This system provides NPCs, events, and
# mechanics for generating endless courtly drama.
# ============================================================================

[meta]
title = "Court Intrigue"
description = "Courtier NPCs, favor economy, scandals, and court events for regent play"
version = "1.0.0"
author = "Birthright Oracle System"

# ============================================================================
# COURTIER ARCHETYPES
# ============================================================================
# Templates for generating court NPCs

[[courtier_archetypes]]
name = "The Ambitious Newcomer"
description = "Recently arrived at court, eager to rise quickly"
typical_background = [
    "Minor noble seeking advancement",
    "Wealthy merchant buying respectability",
    "Military hero rewarded with position",
    "Skilled professional (lawyer, administrator)",
    "Foreign noble seeking new opportunities"
]
motivations = [
    "Gain title and lands",
    "Accumulate wealth",
    "Marry into better family",
    "Gain regent's ear",
    "Establish dynasty"
]
typical_methods = [
    "Flattery and sycophancy",
    "Exceptional competence",
    "Strategic marriage",
    "Bribes and gifts",
    "Undermining rivals"
]
secrets = [
    "Humble origins hidden",
    "Debts to dangerous parties",
    "Previous disgrace elsewhere",
    "Hidden patron pulling strings",
    "Spy for foreign power"
]
oracle_questions = [
    "How talented is this newcomer actually?",
    "Who is backing their rise?",
    "What do they want most?",
    "Who do they threaten?",
    "What are they willing to do to succeed?"
]

