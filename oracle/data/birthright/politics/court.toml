# ============================================================================
# FAVOR ECONOMY
# ============================================================================
# How influence and social capital work at court

[favor_economy]
description = "The currency of courtly influence"

[favor_economy.mechanics]
explanation = """
Favor represents social capital at court - the ability to call upon
relationships, owed debts, and accumulated goodwill. Courtiers
accumulate, spend, and trade favor constantly.
"""

[[favor_economy.gaining_favor]]
method = "Service to regent"
description = "Completing tasks, providing good advice, or solving problems"
favor_gain = "+1 to +3 depending on importance"
oracle_questions = [
    "Was the service publicly recognized?",
    "Did it make enemies?",
    "Does the regent remember?"
]

[[favor_economy.gaining_favor]]
method = "Service to powerful courtier"
description = "Helping someone with influence at court"
favor_gain = "+1 with that person, may spread"
oracle_questions = [
    "Is the favor reciprocal?",
    "Do others know about it?",
    "Are there strings attached?"
]

[[favor_economy.gaining_favor]]
method = "Social success"
description = "Hosting successful event, making good marriage, winning tournament"
favor_gain = "+1 general favor"
oracle_questions = [
    "Who was impressed?",
    "Did anyone feel shown up?",
    "Is this sustainable?"
]

[[favor_economy.gaining_favor]]
method = "Gifts and bribes"
description = "Material generosity to the right people"
favor_gain = "Variable, depends on gift and recipient"
oracle_questions = [
    "Is it seen as generosity or bribery?",
    "Can you afford to continue?",
    "Does it create obligation?"
]

[[favor_economy.gaining_favor]]
method = "Information sharing"
description = "Providing valuable intelligence or gossip"
favor_gain = "+1 to +2 with recipient"
oracle_questions = [
    "Is the information valuable?",
    "Does sharing create enemies?",
    "Are you becoming known as informant?"
]

[[favor_economy.spending_favor]]
use = "Request appointment or position"
cost = "2-4 favor points"
risk = "Request may still be denied"

[[favor_economy.spending_favor]]
use = "Gain audience with regent"
cost = "1-2 favor points"
risk = "Must have something worthwhile to say"

[[favor_economy.spending_favor]]
use = "Suppress scandal"
cost = "2-5 favor points"
risk = "May not stay suppressed"

[[favor_economy.spending_favor]]
use = "Get someone else in trouble"
cost = "2-3 favor points"
risk = "May backfire, create enemies"

[[favor_economy.spending_favor]]
use = "Obtain commercial privilege"
cost = "3-4 favor points"
risk = "Creates resentment in competitors"

[[favor_economy.spending_favor]]
use = "Arrange marriage"
cost = "2-5 favor points"
risk = "Both families must agree"

[[favor_economy.spending_favor]]
use = "Avoid punishment"
cost = "3-6 favor points"
risk = "May be noted and resented"

[[favor_economy.losing_favor]]
cause = "Public failure"
description = "Military defeat, scandal, incompetence exposed"
favor_loss = "-1 to -4 depending on severity"

[[favor_economy.losing_favor]]
cause = "Offending powerful person"
description = "Insult, competition, or accidental slight"
favor_loss = "-1 to -3 with that person and allies"

[[favor_economy.losing_favor]]
cause = "Backing wrong side"
description = "Supporting losing faction or unpopular cause"
favor_loss = "-1 to -3 generally"

[[favor_economy.losing_favor]]
cause = "Absence from court"
description = "Out of sight, out of mind"
favor_loss = "-1 per extended period away"

[[favor_economy.losing_favor]]
cause = "Association with disgraced person"
description = "Friend, family, or ally falls from favor"
favor_loss = "-1 to -2 by association"

# ============================================================================
# SCANDAL GENERATION
# ============================================================================
# Creating and managing court scandals

[scandal_system]
description = "How scandals arise, spread, and affect court life"

[[scandal_types]]
name = "Sexual Scandal"
description = "Adultery, inappropriate relationships, or impropriety"
severity_range = "Minor to Major"
affected_parties = [
    "Direct participants",
    "Their spouses",
    "Their families",
    "Their patrons"
]
potential_consequences = [
    "Social ostracism",
    "Divorce proceedings",
    "Duel challenges",
    "Loss of position",
    "Exile from court",
    "Disinheritance"
]
oracle_questions = [
    "How public is the scandal?",
    "Who actually cares?",
    "Can it be hushed up?",
    "Is there sympathy for the participants?",
    "What do the spouses want?"
]

