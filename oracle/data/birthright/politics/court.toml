# ============================================================================
# MARRIAGE PROSPECTS
# ============================================================================
# Strategic marriage options and complications

[marriage_system]
description = "Marriage as political tool in Cerilian courts"

[marriage_system.considerations]
factors = [
    "Bloodline - does the match strengthen or dilute bloodlines?",
    "Political alliance - what domains or powers are connected?",
    "Wealth - what resources come with the match?",
    "Heirs - can the match produce acceptable heirs?",
    "Religion - are the families of compatible faiths?",
    "Age - is the match appropriate in years?",
    "Existing obligations - are there prior betrothals?",
    "Personal compatibility - can they tolerate each other?"
]

[[marriage_system.prospect_types]]
type = "Political Alliance"
description = "Marriage to cement treaty or alliance"
benefits = [
    "Binds domains together",
    "Creates heir with claims to both",
    "Hostage situation resolved naturally"
]
risks = [
    "May not love each other",
    "If alliance breaks, marriage awkward",
    "Foreign spouse seen as outsider"
]
oracle_questions = [
    "Is the alliance genuine?",
    "Will the foreign spouse adapt?",
    "How do the court view the match?",
    "What happens if relations sour?"
]

[[marriage_system.prospect_types]]
type = "Bloodline Match"
description = "Marriage to combine or strengthen bloodlines"
benefits = [
    "Children may have stronger bloodline",
    "Specific abilities might combine",
    "Preserves bloodline in family"
]
risks = [
    "Bloodline strength unpredictable",
    "May produce competition for inheritance",
    "Blood of Azrai marriages especially risky"
]
oracle_questions = [
    "What bloodlines are being combined?",
    "What abilities might manifest?",
    "Are there bloodline conflicts?",
    "What do the bloodlines' histories suggest?"
]

[[marriage_system.prospect_types]]
type = "Wealth Match"
description = "Marriage for economic benefit"
benefits = [
    "Substantial dowry",
    "Trade connections",
    "Land or holdings",
    "Ongoing economic support"
]
risks = [
    "May be seen as mercenary",
    "Spouse may be unappealing",
    "Wealth may come with obligations"
]
oracle_questions = [
    "What wealth is involved?",
    "Are there strings attached?",
    "Does the wealthy family demand too much?",
    "Is the wealth real or exaggerated?"
]

[[marriage_system.prospect_types]]
type = "Love Match"
description = "Marriage for genuine affection"
benefits = [
    "Happy couple",
    "Stable family",
    "Genuine partnership",
    "Good for heirs' upbringing"
]
risks = [
    "May sacrifice political advantage",
    "Family opposition",
    "Love may not last",
    "May be inappropriate match"
]
oracle_questions = [
    "Is the love genuine and lasting?",
    "What political costs result?",
    "Do families accept the match?",
    "Will love survive marriage's realities?"
]

[[marriage_system.prospect_types]]
type = "Healing Match"
description = "Marriage to end feud or heal division"
benefits = [
    "Ends conflict",
    "Unites former enemies",
    "Creates peace"
]
risks = [
    "Old wounds may not heal",
    "Spouse may be hated for family's sins",
    "Children caught between families"
]
oracle_questions = [
    "Can the families truly reconcile?",
    "Will the spouses overcome history?",
    "Do hardliners accept the match?",
    "Is peace genuine or temporary?"
]

[[marriage_system.complications]]
complication = "Prior Betrothal"
description = "One party already promised to another"
