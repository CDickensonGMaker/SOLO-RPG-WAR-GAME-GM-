# =============================================================================
# CERILIAN ENCOUNTER TABLES
# =============================================================================
# Random encounter tables specific to the Birthright setting, organized by
# region and terrain type. These tables reflect the unique dangers of Cerilia.
# =============================================================================

[metadata]
title = "Cerilian Encounter Tables"
description = "Random encounters by region and terrain for Birthright"
version = "1.0.0"
setting = "Birthright"

# =============================================================================
# ENCOUNTER FREQUENCY
# =============================================================================

[encounter_frequency]
description = "How often to check for random encounters"

[encounter_frequency.by_terrain]
settled_road = { check_interval = "8 hours", chance = 10 }
wilderness_road = { check_interval = "4 hours", chance = 15 }
light_forest = { check_interval = "4 hours", chance = 20 }
dense_forest = { check_interval = "2 hours", chance = 25 }
mountains = { check_interval = "4 hours", chance = 25 }
swamp = { check_interval = "2 hours", chance = 30 }
desert = { check_interval = "4 hours", chance = 20 }
plains = { check_interval = "4 hours", chance = 15 }
coast = { check_interval = "4 hours", chance = 20 }
underground = { check_interval = "1 hour", chance = 25 }
sea_voyage = { check_interval = "12 hours", chance = 20 }

[encounter_frequency.modifiers]
night = 10
bad_weather = 5
domain_at_war = 15
awnsheghlien_territory = 20
cursed_land = 25
near_shadow_crossing = 15
province_level_0 = 30
province_level_1_2 = 20
province_level_3_4 = 10
province_level_5_plus = 5

