# =============================================================================
# AWNSHEGHLIEN - THE BLOOD ABOMINATIONS OF CERILIA
# =============================================================================
# Those who bear the tainted blood of Azrai, corrupted by their divine essence
# into monstrous forms. They are the great terrors that plague the land.
# =============================================================================

[metadata]
title = "Awnsheghlien of Cerilia"
description = "The blood abominations - those corrupted by Azrai's tainted bloodline"
version = "1.0.0"
setting = "Birthright"

# =============================================================================
# THE GREAT AWNSHEGHLIEN
# =============================================================================
# The most powerful and infamous of the blood abominations. Each commands
# territory, armies, or influence that threatens entire regions.
# =============================================================================

# -----------------------------------------------------------------------------
# THE GORGON - The Black Prince, Most Powerful Awnsheghlien
# -----------------------------------------------------------------------------
[[awnsheghlien]]
name = "The Gorgon"
true_name = "Raesene the Black Prince"
origin = "Half-brother to Roele and Haelyn, champion of Azrai at Deismaar. The divine blood transformed him into the most powerful awnsheghlien."
current_age = "Nearly 1,500 years"
bloodline_derivation = "azrai"
bloodline_strength = "true"
blood_abilities = [
    "Battlewise (Great)",
    "Blood History (Great)",
    "Bloodform (Great)",
    "Death Touch (Great)",
    "Divine Aura (Great)",
    "Fear (Great)",
    "Invulnerability (Great)",
    "Regeneration (Great)",
    "Touch of Decay (Great)",
    "Wither Touch (Great)",
    "All Azrai abilities at maximum power"
]
physical_description = "A massive humanoid figure covered in iron-hard scales, with burning red eyes and a gaze that turns living creatures to stone. He stands over eight feet tall and radiates palpable malevolence."

[awnsheghlien.domain]
name = "Kal-Saitharak"
other_names = ["The Crown of the Gorgon", "The Gorgon's Crown"]
description = "A blighted mountainous realm of perpetual gloom, ruled absolutely by the Gorgon. The land itself seems to reflect his corruption - twisted trees, poisoned waters, and an ever-present miasma of dread."
region = "Anuire (Northern)"
provinces = 12
holdings = "All law, most temples (to Azrai), significant source holdings"
military_strength = "overwhelming"
army_composition = [
    "Orog legions - disciplined and fanatically loyal",
    "Human thralls - broken slaves and willing servants",
    "Undead formations - tireless soldiers of the damned",
    "Stone guardians - victims of the Gorgon's gaze given unholy animation",
    "Awnshegh lieutenants - lesser abominations bound to his service"
]
notable_locations = [
    "Kal-Saitharak (Capital) - The fortress-city carved from a mountain",
    "The Petrified Legion - A field of his enemies turned to stone",
    "The Blood Pits - Where new abominations are created",
    "The Iron Mines - Worked by endless slave labor"
]

[awnsheghlien.personality]
intelligence = "genius"
patience = "infinite"
cruelty = "absolute"
goals = [
    "Conquer all of Cerilia",
    "Exterminate all other bloodlines",
    "Become a god in Azrai's place",
    "Destroy the legacy of his half-brothers",
    "Corrupt or absorb all divine bloodlines"
]
methods = [
    "Patient military conquest",
    "Corruption of nobles and regents",
    "Terror campaigns to weaken enemies",
    "Assassination of blooded heirs",
    "Alliance with other awnsheghlien when expedient",
    "Economic strangulation of neighboring realms",
    "Infiltration through human agents"
]
weaknesses = [
    "Overconfidence born of centuries of power",
    "Cannot truly trust any lieutenant",
    "Obsessive hatred of Roele's heirs",
    "Impatience with failure among servants",
    "Ancient pride that can be manipulated",
    "The memory of his mortal family haunts him"
]
relationships = [
    { name = "The Spider", status = "wary alliance", notes = "Respects her cunning but would destroy her if convenient" },
    { name = "The Magian", status = "contemptuous tolerance", notes = "Useful but ultimately beneath him" },
    { name = "Anuirean Regents", status = "enemies", notes = "All are obstacles to be crushed" },
    { name = "The Iron Throne", status = "primary target", notes = "The symbol of what his brothers built must be destroyed" }
]

[awnsheghlien.as_enemy]
threat_level = "catastrophic"
challenge_rating = "30+"
typical_actions = [
    "Border raids by orog warbands to test defenses",
    "Corruption of borderland nobles through agents",
    "Assassination of blooded heirs by elite killers",
    "Full military invasion with overwhelming force",
    "Economic warfare through banditry and trade disruption",
    "Placement of spies in enemy courts",
    "Subversion of religious institutions",
    "Terrorizing peasant populations to create refugees"
]
signs_of_attention = [
    "Orog scouts spotted in remote provinces",
    "Nobles begin acting strangely or cruelly",
    "Livestock found drained of blood or turned to stone",
    "Nightmares plague the regent and advisors",
    "Trade caravans vanish without trace",
    "Stone statues appear in wilderness areas",
    "Local priests report dark omens",
    "Refugees arrive with tales of border atrocities"
]
combat_tactics = [
    "Never fights fair - brings overwhelming force",
    "Uses gaze attack to petrify key enemies",
    "Lieutenants engage first to assess enemy strength",
    "Retreats if genuinely threatened (rare)",
    "Pursues vendettas across generations"
]
legendary_actions = [
    "Petrifying Gaze - Turn creatures to stone",
    "Call Orog Warband - Summon loyal soldiers",
    "Bloodline Drain - Absorb enemy bloodline power",
    "Terrifying Presence - Force morale checks in armies"
