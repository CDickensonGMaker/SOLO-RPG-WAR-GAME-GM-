# =============================================================================
# CERILIAN MONSTERS AND CREATURES
# =============================================================================
# Creatures unique to the Birthright setting, born from the catastrophe of
# Deismaar and the unique magical nature of Cerilia.
# =============================================================================

[metadata]
title = "Monsters of Cerilia"
description = "Creatures unique to the Birthright setting"
version = "1.0.0"
setting = "Birthright"

# =============================================================================
# BLOOD CREATURES
# =============================================================================
# Beings created or transformed by the spilled divine blood at Deismaar.
# They are touched by the gods' essence but twisted by the chaos of that day.
# =============================================================================

[[blood_creatures]]
name = "Blood Elemental"
origin = "Pools of divine blood that achieved sentience"
description = "A churning mass of crimson liquid that moves with terrible purpose. It seeks to absorb mortal blood to sustain itself and can sense bloodline power from miles away."
alignment = "chaotic evil"
habitat = ["Ancient battlefields", "Sites of mass bloodshed", "Near bloodline fonts"]
challenge_rating = "8"

[blood_creatures.stat_block]
size = "Large"
type = "Elemental"
armor_class = 14
hit_points = "114 (12d10 + 48)"
speed = "30 ft., swim 60 ft."
abilities = { STR = 18, DEX = 14, CON = 18, INT = 6, WIS = 12, CHA = 8 }
damage_resistances = "bludgeoning, piercing, slashing from nonmagical attacks"
damage_immunities = "poison"
condition_immunities = "exhaustion, grappled, paralyzed, petrified, poisoned, prone, restrained, unconscious"
senses = "blindsight 60 ft., passive Perception 11"
languages = "understands Primordial but cannot speak"

[[blood_creatures.stat_block.special_abilities]]
name = "Blood Sense"
description = "The elemental can sense any creature with a bloodline within 1 mile."

[[blood_creatures.stat_block.special_abilities]]
name = "Blood Absorption"
description = "When the elemental deals damage to a creature with blood, it regains hit points equal to half the damage dealt."

[[blood_creatures.stat_block.actions]]
name = "Multiattack"
description = "The elemental makes two slam attacks."

[[blood_creatures.stat_block.actions]]
name = "Slam"
description = "Melee Weapon Attack: +7 to hit, reach 10 ft., one target. Hit: 14 (2d8 + 5) bludgeoning damage plus 7 (2d6) necrotic damage."

[[blood_creatures.stat_block.actions]]
name = "Blood Drain (Recharge 5-6)"
description = "Each creature within 10 feet must make a DC 15 Constitution saving throw, taking 21 (6d6) necrotic damage on a failed save, or half as much on a successful one. The elemental regains hit points equal to half the total damage dealt."

[blood_creatures.oracle_integration]
encounter_trigger = "Ancient battlefield or place of bloodshed"
adventure_seeds = [
    "A blood elemental awakens after a bloody battle",
    "One is hunting blooded individuals",
    "Containing it requires understanding its origin"
]

# -----------------------------------------------------------------------------

[[blood_creatures]]
name = "Bloodhound"
origin = "Hounds transformed by drinking divine blood at Deismaar"
description = "Gaunt, red-eyed hounds with an unnatural hunger for blood. They can track a bloodline for hundreds of miles and are sometimes bound as servants by the powerful."
alignment = "neutral evil"
habitat = ["Wild places", "Serving powerful masters", "Near awnsheghlien"]
challenge_rating = "3"

[blood_creatures.stat_block]
size = "Medium"
type = "Monstrosity"
armor_class = 13
hit_points = "45 (6d8 + 18)"
speed = "50 ft."
abilities = { STR = 16, DEX = 14, CON = 16, INT = 4, WIS = 14, CHA = 6 }
skills = "Perception +6, Survival +6"
senses = "darkvision 60 ft., passive Perception 16"

[[blood_creatures.stat_block.special_abilities]]
name = "Bloodline Tracking"
description = "The bloodhound can track any creature with a bloodline by scent, even across water or through teleportation, up to 100 miles away."

[[blood_creatures.stat_block.special_abilities]]
name = "Pack Tactics"
description = "The bloodhound has advantage on attack rolls against a creature if at least one of the bloodhound's allies is within 5 feet of the creature."

[[blood_creatures.stat_block.actions]]
name = "Bite"
description = "Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 10 (2d6 + 3) piercing damage. If the target has a bloodline, it deals an additional 3 (1d6) necrotic damage."

[blood_creatures.oracle_integration]
encounter_trigger = "Hunting party or tracking mission"
adventure_seeds = [
    "Bloodhounds are tracking the regent",
    "A pack has gone feral and hunts freely",
    "Someone offers tamed bloodhounds for sale"
]

