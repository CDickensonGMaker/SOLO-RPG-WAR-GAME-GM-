[[blood_creatures]]
name = "Blood Rose"
origin = "Roses that grew in pools of divine blood"
description = "Beautiful crimson roses with thorns that draw blood. They are semi-sentient, luring victims close with their intoxicating scent before draining them."
alignment = "neutral evil"
habitat = ["Gardens of the powerful", "Ancient battlefields", "Near bloodline fonts"]
challenge_rating = "1"

[blood_creatures.stat_block]
size = "Small"
type = "Plant"
armor_class = 10
hit_points = "22 (4d6 + 8)"
speed = "0 ft."
abilities = { STR = 6, DEX = 1, CON = 14, INT = 1, WIS = 6, CHA = 14 }
damage_vulnerabilities = "fire"
condition_immunities = "blinded, deafened, frightened"
senses = "blindsight 30 ft., passive Perception 8"

[[blood_creatures.stat_block.special_abilities]]
name = "Intoxicating Scent"
description = "Any creature that starts its turn within 30 feet of the rose must succeed on a DC 12 Wisdom saving throw or be charmed and move toward the rose."

[[blood_creatures.stat_block.special_abilities]]
name = "Blood Drain Thorns"
description = "A creature that touches the rose or is grappled by it takes 2 (1d4) piercing damage and 3 (1d6) necrotic damage at the start of each of its turns."

[[blood_creatures.stat_block.actions]]
name = "Constricting Vines"
description = "Melee Weapon Attack: +4 to hit, reach 10 ft., one target. Hit: 4 (1d4 + 2) piercing damage, and the target is grappled (escape DC 12)."

[blood_creatures.oracle_integration]
encounter_trigger = "Garden or overgrown ruin"
adventure_seeds = [
    "A noble cultivates blood roses - for what purpose?",
    "An infestation threatens a province",
    "Blood roses are a component in blood magic"
]

