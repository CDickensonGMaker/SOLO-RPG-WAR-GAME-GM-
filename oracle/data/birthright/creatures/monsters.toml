[[blood_creatures]]
name = "Crimson Ooze"
origin = "Coagulated divine blood that gained animation"
description = "A slow-moving mass of dark red gel that absorbs organic matter. It is mindless but drawn to sources of divine blood."
alignment = "unaligned"
habitat = ["Underground", "Ruins", "Near sources of bloodline power"]
challenge_rating = "4"

[blood_creatures.stat_block]
size = "Large"
type = "Ooze"
armor_class = 7
hit_points = "85 (9d10 + 36)"
speed = "20 ft., climb 20 ft."
abilities = { STR = 16, DEX = 5, CON = 18, INT = 1, WIS = 6, CHA = 1 }
damage_resistances = "acid, cold, fire"
condition_immunities = "blinded, charmed, deafened, exhaustion, frightened, prone"
