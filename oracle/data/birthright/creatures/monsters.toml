# CERILIAN UNDEAD
# =============================================================================
# Undead unique to Cerilia, often connected to bloodlines or the Shadow World.
# =============================================================================

[[cerilian_undead]]
name = "Bloodwight"
origin = "Blooded individuals who died violently and rose as undead"
description = "An undead creature that retains fragments of its bloodline. It hungers for the blood of the living, especially those who carry divine blood."
alignment = "lawful evil"
habitat = ["Tombs of the blooded", "Battlefields", "Haunted keeps"]
challenge_rating = "6"

[cerilian_undead.stat_block]
size = "Medium"
type = "Undead"
armor_class = 15
hit_points = "75 (10d8 + 30)"
speed = "30 ft."
abilities = { STR = 18, DEX = 14, CON = 16, INT = 12, WIS = 14, CHA = 16 }
saving_throws = "CON +6, WIS +5"
damage_resistances = "necrotic; bludgeoning, piercing, slashing from nonmagical attacks"
damage_immunities = "poison"
condition_immunities = "exhaustion, poisoned"
senses = "darkvision 60 ft., passive Perception 12"
languages = "the languages it knew in life"

[[cerilian_undead.stat_block.special_abilities]]
name = "Bloodline Echo"
description = "The bloodwight retains one minor blood ability from its life, chosen when it is created."

[[cerilian_undead.stat_block.special_abilities]]
name = "Sunlight Sensitivity"
description = "While in sunlight, the bloodwight has disadvantage on attack rolls and Wisdom (Perception) checks that rely on sight."

[[cerilian_undead.stat_block.actions]]
name = "Multiattack"
description = "The bloodwight makes two attacks."

[[cerilian_undead.stat_block.actions]]
name = "Life Drain"
description = "Melee Weapon Attack: +7 to hit, reach 5 ft., one target. Hit: 11 (2d6 + 4) necrotic damage. The target must succeed on a DC 14 Constitution saving throw or its hit point maximum is reduced by an amount equal to the damage taken. A humanoid slain by this attack rises as a zombie under the bloodwight's control."

[cerilian_undead.oracle_integration]
encounter_trigger = "Ancient tomb or bloodline-related location"
adventure_seeds = [
    "A bloodwight seeks to reclaim its living descendant's power",
    "One guards an ancestral treasure",
    "It remembers secrets from life"
]

