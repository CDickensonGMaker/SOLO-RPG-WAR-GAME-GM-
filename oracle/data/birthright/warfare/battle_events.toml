# =============================================================================
# EVENT TRIGGERS - Conditions that may trigger automatic events
# =============================================================================

[event_triggers]
bloodline_clash = { trigger = "Two blooded regents meet in battle", event = "Bloodline powers may manifest automatically" }
holy_ground = { trigger = "Battle on consecrated ground", event = "Divine intervention more likely" }
ancient_battlefield = { trigger = "Battle on site of historical significance", event = "Spirits of fallen warriors may appear" }
eclipse = { trigger = "Battle during eclipse or astronomical event", event = "Shadow World influence increases" }
dragon_territory = { trigger = "Battle in dragon's claimed territory", event = "Dragon may intervene" }
mebhaighl_node = { trigger = "Battle on source of magical power", event = "Wild magic effects possible" }
