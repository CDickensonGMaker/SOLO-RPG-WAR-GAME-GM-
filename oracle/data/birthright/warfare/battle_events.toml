# Birthright Domain-Level Warfare - Battle Events (d100)
# Compatible with Oracle WargameAI system
# Dramatic events that can shift the tide of battle
# Weight: higher = more common (1-3 typical range)

[events]
entries = [
    # ==========================================================================
    # HEROISM AND VALOR (01-10)
    # ==========================================================================
    { roll_min = 1, roll_max = 2, text = "A common soldier performs an act of extraordinary bravery, inspiring nearby units (+1 morale to one unit)", weight = 2 },
    { roll_min = 3, roll_max = 4, text = "A unit's sergeant rallies the men with a stirring speech - they fight with renewed vigor (+1 attack this round)", weight = 2 },
    { roll_min = 5, roll_max = 6, text = "The battle standard is held high despite wounds - no morale checks this round for units within sight", weight = 2 },
    { roll_min = 7, roll_max = 8, text = "A champion emerges from the ranks, challenging enemy heroes to single combat", weight = 2 },
    { roll_min = 9, roll_max = 10, text = "Veterans form a rear guard, sacrificing themselves to protect withdrawing comrades", weight = 1 },

    # ==========================================================================
    # COMMANDER EVENTS (11-20)
    # ==========================================================================
    { roll_min = 11, roll_max = 12, text = "Commander wounded! Leadership bonus lost until healed or replaced", weight = 2 },
    { roll_min = 13, roll_max = 14, text = "Enemy commander spotted in the open - assassination or capture opportunity", weight = 1 },
    { roll_min = 15, roll_max = 16, text = "Commander's bodyguard diverted to crisis elsewhere on the field", weight = 2 },
    { roll_min = 17, roll_max = 18, text = "Junior officer shows unexpected tactical brilliance - one unit gets +1 attack and defense", weight = 2 },
    { roll_min = 19, roll_max = 20, text = "Command dispute paralyzes decision-making - one unit cannot receive orders this round", weight = 1 },

    # ==========================================================================
    # TACTICAL OPPORTUNITIES (21-30)
    # ==========================================================================
    { roll_min = 21, roll_max = 22, text = "Flanking opportunity! Unguarded approach to enemy flank discovered by scouts", weight = 2 },
    { roll_min = 23, roll_max = 24, text = "Enemy formation has a gap - breakthrough possible with immediate action", weight = 2 },
    { roll_min = 25, roll_max = 26, text = "High ground becomes available - first unit to occupy gains +1 attack and defense", weight = 2 },
    { roll_min = 27, roll_max = 28, text = "Hidden path discovered - one unit may reposition without triggering reactions", weight = 2 },
    { roll_min = 29, roll_max = 30, text = "Enemy supply train spotted - raid could cripple their war effort", weight = 1 },

    # ==========================================================================
    # WEATHER AND ENVIRONMENT (31-40)
    # ==========================================================================
    { roll_min = 31, roll_max = 32, text = "Sudden fog rolls in - visibility reduced, ranged attacks suffer -2", weight = 2 },
    { roll_min = 33, roll_max = 34, text = "Rain begins to fall - ground becomes difficult terrain for cavalry", weight = 2 },
    { roll_min = 35, roll_max = 36, text = "Wind shifts dramatically - missile fire from one direction gains +1, opposite -1", weight = 2 },
    { roll_min = 37, roll_max = 38, text = "Thunderstorm approaching - battle may need to pause or fight through lightning", weight = 1 },
    { roll_min = 39, roll_max = 40, text = "Sun breaks through clouds - units facing the sun are -1 to hit", weight = 2 },

    # ==========================================================================
    # REINFORCEMENTS (41-50)
    # ==========================================================================
    { roll_min = 41, roll_max = 42, text = "Allied reinforcements arrive! Additional unit joins the battle", weight = 1 },
    { roll_min = 43, roll_max = 44, text = "Enemy reinforcements spotted approaching - they arrive in 2 rounds", weight = 2 },
    { roll_min = 45, roll_max = 46, text = "Expected reinforcements delayed - they will not arrive this battle", weight = 2 },
    { roll_min = 47, roll_max = 48, text = "Local militia rallies to your cause - irregular unit joins temporarily", weight = 1 },
    { roll_min = 49, roll_max = 50, text = "Mercenary company offers services mid-battle - 2 GB to hire immediately", weight = 1 },

    # ==========================================================================
    # MORALE AND PSYCHOLOGY (51-60)
    # ==========================================================================
    { roll_min = 51, roll_max = 52, text = "Enemy unit's morale collapses - they rout without being engaged!", weight = 1 },
    { roll_min = 53, roll_max = 54, text = "Fear spreads through your lines - one unit must take immediate morale check", weight = 2 },
    { roll_min = 55, roll_max = 56, text = "War cry echoes across the battlefield - charging units gain +1 morale", weight = 2 },
    { roll_min = 57, roll_max = 58, text = "Grim determination settles over your troops - no retreat possible, +1 defense", weight = 1 },
    { roll_min = 59, roll_max = 60, text = "Panic begins to spread - if one unit routs, adjacent units must check morale", weight = 2 },

    # ==========================================================================
    # BLOODLINE POWERS MANIFEST (61-70) - Birthright specific
    # ==========================================================================
    { roll_min = 61, roll_max = 62, text = "Bloodline power surges! Blooded regent may activate one bloodline ability without cost", weight = 1 },
    { roll_min = 63, roll_max = 64, text = "Enemy regent's bloodline manifests - terrible power displayed, your troops -1 morale", weight = 1 },
    { roll_min = 65, roll_max = 66, text = "The blood of Anduiras stirs - Anuirean units gain +1 attack this round", weight = 1 },
    { roll_min = 67, roll_max = 68, text = "Masela's blessing - naval units or units near water gain +1 defense", weight = 1 },
    { roll_min = 69, roll_max = 70, text = "Azrai's shadow falls - undead or awnsheghlien forces gain +1 attack, others -1 morale", weight = 1 },

    # ==========================================================================
    # MONSTER INTERVENTION (71-80) - Birthright specific
    # ==========================================================================
    { roll_min = 71, roll_max = 72, text = "Gnoll warband attracted by battle sounds - may attack either side or both!", weight = 1 },
    { roll_min = 73, roll_max = 74, text = "Giant spotted watching the battle - may be convinced to join (Diplomacy check)", weight = 1 },
    { roll_min = 75, roll_max = 76, text = "Troll emerges from nearby swamp - attacks nearest unit regardless of allegiance", weight = 1 },
    { roll_min = 77, roll_max = 78, text = "Goblin scouts report to unknown master - enemy gains intelligence about your forces", weight = 2 },
    { roll_min = 79, roll_max = 80, text = "Ancient creature disturbed by battle - dragon, hydra, or similar threatens all combatants", weight = 1 },

    # ==========================================================================
    # DIVINE INTERVENTION (81-85) - Birthright specific
    # ==========================================================================
    { roll_min = 81, roll_max = 82, text = "Haelyn's light shines upon the righteous - lawful units gain +1 to all rolls", weight = 1 },
    { roll_min = 83, roll_max = 84, text = "Erik's storm gathers - outdoor battle faces weather penalties, but Rjurik gain +1", weight = 1 },
    { roll_min = 85, roll_max = 85, text = "Dark portent from the Shadow World - all units -1 morale, undead gain +1 attack", weight = 1 },

    # ==========================================================================
    # TERRAIN EVENTS (86-90)
    # ==========================================================================
    { roll_min = 86, roll_max = 87, text = "Ground gives way - one unit repositioned involuntarily, possible casualties", weight = 2 },
    { roll_min = 88, roll_max = 89, text = "Bridge, ford, or pass compromised - movement restricted, defensive bonus available", weight = 2 },
    { roll_min = 90, roll_max = 90, text = "Fire breaks out on the battlefield - units in area take damage, must relocate", weight = 1 },

    # ==========================================================================
    # SUPPLY AND EQUIPMENT (91-95)
    # ==========================================================================
    { roll_min = 91, roll_max = 92, text = "Ammunition running low - ranged units -1 attack until resupplied", weight = 2 },
    { roll_min = 93, roll_max = 94, text = "Equipment failure - siege weapon or war machine disabled this round", weight = 2 },
    { roll_min = 95, roll_max = 95, text = "Supply cache discovered on battlefield - one unit fully resupplied", weight = 1 },

    # ==========================================================================
    # CRITICAL MOMENTS (96-100)
    # ==========================================================================
    { roll_min = 96, roll_max = 97, text = "The decisive moment! Next action determines battle outcome - all modifiers doubled", weight = 1 },
    { roll_min = 98, roll_max = 99, text = "Complete chaos on the battlefield - all units act simultaneously, GM determines order", weight = 1 },
    { roll_min = 100, roll_max = 100, text = "The impossible happens! Roll again and apply result to most dramatic possible target", weight = 1 }
]

# =============================================================================
# EXTENDED EVENTS BY CATEGORY - For themed battles or specific situations
# =============================================================================

[events_by_theme]

# Events specific to battles involving awnsheghlien
awnsheghlien_battle = [
    { text = "The awnsheghlien's presence warps reality - terrain shifts unnaturally", weight = 2 },
    { text = "Bloodline corruption spreads - blooded soldiers feel the pull of Azrai", weight = 1 },
    { text = "The abomination's true form revealed - all units must pass morale check or flee", weight = 1 },
    { text = "Ancient power awakens in response to the awnsheghlien - unexpected ally appears", weight = 1 },
    { text = "The awnsheghlien offers parley - is it a trick or genuine negotiation?", weight = 1 }
]

