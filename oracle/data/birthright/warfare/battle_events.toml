    { text = "Siege tower catches fire - attackers must abandon or burn with it", weight = 1 },
    { text = "Defenders running low on provisions - -1 morale, but fight desperately", weight = 2 },
    { text = "Sappers complete tunnel - explosion creates breach in walls", weight = 1 },
    { text = "Boiling oil prepared - next assault on walls takes massive casualties", weight = 2 },
    { text = "Treachery! Someone opens a gate from within", weight = 1 },
    { text = "Disease breaks out within the fortress - defenders weakened", weight = 1 }
]

