vos_battle = [
    { text = "Blood challenge! Vos warriors demand brutal single combat", weight = 2 },
    { text = "Kriesha's cold descends - non-Vos units suffer from bitter chill", weight = 1 },
    { text = "Belinik's fury invoked - Vos warriors enter killing frenzy", weight = 1 },
