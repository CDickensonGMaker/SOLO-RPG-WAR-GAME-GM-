    { keyword = "elite infantry", reason = "Veteran professional soldiers" },
    { keyword = "mercenaries", reason = "Experienced sellswords" },
    { keyword = "archers", reason = "Ranged attack capability" },
    { keyword = "fortified", reason = "Entrenched defensive position" },
    { keyword = "ogres", reason = "Monstrous shock troops" },
    { keyword = "gnolls", reason = "Savage pack hunters" },
    { keyword = "orogs", reason = "Disciplined orc warriors" }
]
