# =============================================================================
# DOCTRINE MAPPING - Connects Oracle WargameAI doctrines to Birthright
# =============================================================================

[doctrine_mapping]
horde = { birthright_name = "Levy Tactics", description = "Mass conscript armies overwhelming enemies through numbers", typical_users = ["Gorgon", "Five Peaks", "Markazor", "Vosgaard realms"] }
elite = { birthright_name = "Noble Cavalry", description = "Quality knightly forces relying on training and equipment", typical_users = ["Avanil", "Boeruine", "Ghoere", "Ilien"] }
defensive = { birthright_name = "Castle Doctrine", description = "Holding fortified positions and wearing down attackers", typical_users = ["Cariele", "Tuornen", "Elinie", "Medoere"] }
alpha_strike = { birthright_name = "Shock Assault", description = "Overwhelming first strike with elite forces", typical_users = ["Boeruine", "Rjurik jarls", "Chimaeron"] }
guerrilla = { birthright_name = "Raider Tactics", description = "Hit and run, avoid pitched battle", typical_users = ["Rjurik", "Vos tribes", "Orog bands", "Spider's forces"] }

# =============================================================================
# THREAT KEYWORDS - Birthright-specific for WargameAI threat analysis
# =============================================================================

[threat_keywords]
high = [
    { keyword = "knights", reason = "Heavy cavalry formation" },
    { keyword = "dragon", reason = "Devastating aerial threat" },
    { keyword = "awnsheghlien", reason = "Abomination of terrible power" },
    { keyword = "gorgon", reason = "The Iron Throne's master" },
    { keyword = "undead horde", reason = "Endless enemy that feels no fear" },
    { keyword = "bloodline power", reason = "Supernatural abilities in play" },
    { keyword = "siege weapons", reason = "Fortification-breaking artillery" },
    { keyword = "temple knights", reason = "Divinely empowered warriors" },
    { keyword = "sidhe", reason = "Ancient elven magic and skill" },
    { keyword = "trolls", reason = "Regenerating monstrosities" },
    { keyword = "giants", reason = "Massive siege-breaking creatures" }
]
