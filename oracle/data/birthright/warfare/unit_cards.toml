# Birthright Domain-Level Warfare - Unit Cards
# Compatible with Oracle WargameAI system
# Based on the Birthright campaign setting's domain-level warfare rules
# Attack/Defense are number of d10s rolled; 5+ hits for attack, 6+ saves for defense

# =============================================================================
# STANDARD UNITS - Available to most realms
# =============================================================================

[[units]]
name = "Infantry"
type = "regular"
attack = 2
defense = 1
morale = 4
move = 1
cost_gb = 2
cost_rp = 0
maintenance_gb = 1
requirements = ["Province level 1+"]
special = []
description = "Basic foot soldiers forming the backbone of most armies. Armed with spears, swords, or axes and light armor."

[[units]]
