[bloodline_mechanics.investiture]
description = """
A regent can willingly transfer bloodline power to another through formal \
investiture. This is how new regents are created and how bloodlines pass \
peacefully between generations."""

ceremony = """
Investiture requires a formal ceremony, usually involving witnesses, oaths, \
and symbolic transfer of authority. The donor can transfer any amount of their \
bloodline strength, up to all of it."""

