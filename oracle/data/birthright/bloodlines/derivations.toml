effects = """
Losing all bloodline power renders an individual commoner, unable to collect \
regency or use blood abilities. Many former scions find this loss devastating, \
having known divine power and lost it."""

# ============================================================================
# ROLEPLAYING BLOODLINES
# ============================================================================

[roleplay_guidance]

[roleplay_guidance.general]
description = """
Bloodlines are not just mechanical benefits - they are fundamental aspects of \
a character's identity. A scion of Anduiras doesn't just have combat bonuses; \
they feel the weight of noble responsibility. A scion of Azrai doesn't just \
have dark powers; they constantly struggle against corruption."""

[roleplay_guidance.social_implications]
noble_society = """
In Cerilia, blood is literally noble. Blooded individuals are recognized as \
having divine right to rule. Even a tainted scion of a lesser derivation \
outranks an unblooded noble in many social contexts."""

commoner_reaction = """
Commoners often instinctively recognize blooded individuals, showing deference \
or fear depending on the derivation and context. This recognition is not always \
conscious - it manifests as an inexplicable feeling that this person is somehow \
"more" than others."""

between_scions = """
Blooded individuals recognize each other. There is an unspoken kinship - and \
rivalry - among the blooded. They can sense each other's approximate strength \
and derivation with time and proximity."""

[roleplay_guidance.the_blood_speaks]
description = """
Each derivation has a "voice" - a way the blood influences its bearer's \
thoughts and impulses. This is not mind control but rather a subtle pressure, \
like instinct or intuition."""

anduiras_voice = "Urges toward leadership, protection, and confronting injustice"
basaia_voice = "Drives toward truth-seeking, understanding, and illumination"
reynir_voice = "Calls toward nature, patience, and ecological thinking"
brenna_voice = "Whispers of opportunity, advantage, and clever solutions"
masela_voice = "Pulls toward freedom, change, and the sea"
vorynn_voice = "Murmurs of secrets, hidden truths, and shadow paths"
azrai_voice = "Demands power, domination, and the embrace of darkness"
