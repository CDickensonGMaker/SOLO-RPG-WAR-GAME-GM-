# =============================================================================
# BIRTHRIGHT DOMAIN RANDOM EVENTS
# =============================================================================
# Comprehensive event tables for solo play campaign generation
# Roll on main table each domain turn, then use subtables for details
# =============================================================================

[metadata]
title = "Domain Random Events"
version = "1.0.0"
description = "Random events that drive solo Birthright campaigns forward"
usage = "Roll d100 on main_events table each domain turn"

# =============================================================================
# MAIN EVENT TABLE (d100)
# =============================================================================
# Determines event severity and general category
# Roll once per domain turn (typically 1 season/3 months)

[[main_events]]
roll_range = [1, 10]
severity = "none"
name = "Quiet Season"
description = "The realm enjoys a period of relative peace and stability."
oracle_questions = [
    "Does this calm feel suspicious to the regent?",
    "Are enemies using this time to prepare?",
    "Does the regent use this time productively?"
]

[[main_events]]
roll_range = [11, 15]
severity = "minor_positive"
name = "Minor Boon"
description = "A small piece of good fortune befalls the realm."
subtable = "minor_positive_events"

[[main_events]]
roll_range = [16, 35]
severity = "minor_negative"
name = "Minor Trouble"
description = "A small problem requires the regent's attention."
subtable = "minor_negative_events"

[[main_events]]
roll_range = [36, 45]
severity = "moderate_positive"
name = "Good Fortune"
description = "Significant good news arrives at the court."
subtable = "moderate_positive_events"

[[main_events]]
roll_range = [46, 70]
severity = "moderate_negative"
name = "Significant Problem"
description = "A serious matter demands the regent's intervention."
subtable = "moderate_negative_events"

[[main_events]]
roll_range = [71, 80]
severity = "major_positive"
name = "Great Bounty"
description = "Exceptional good fortune smiles upon the realm."
subtable = "major_positive_events"

[[main_events]]
roll_range = [81, 95]
severity = "major_negative"
name = "Crisis"
description = "A major crisis threatens the stability of the realm."
subtable = "major_negative_events"

[[main_events]]
roll_range = [96, 99]
severity = "catastrophic"
name = "Catastrophe"
description = "Disaster strikes! The realm faces an existential threat."
subtable = "catastrophic_events"

[[main_events]]
roll_range = [100, 100]
severity = "legendary"
name = "Legendary Event"
description = "Something unprecedented occurs - for good or ill."
subtable = "legendary_events"

