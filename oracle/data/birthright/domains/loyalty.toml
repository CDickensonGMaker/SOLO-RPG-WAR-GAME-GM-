# LOYALTY ORACLE QUESTIONS
# =============================================================================
# Questions to ask when determining loyalty-related outcomes

[[oracle_sections]]
section = "General Loyalty"
questions = [
    "Do the common people support the regent?",
    "Is the nobility loyal or plotting?",
    "Are there whispers of discontent?",
    "Would soldiers fight and die for this ruler?",
    "Do merchants trust the realm's stability?",
    "Is the clergy supportive of the regent?",
    "Are there rival factions forming?",
    "Has recent policy affected loyalty?",
    "Do neighboring realms try to undermine loyalty?",
    "Is loyalty based on love, fear, or custom?"
]

[[oracle_sections]]
section = "Loyalty Changes"
questions = [
    "Has a recent event improved or damaged loyalty?",
    "Are agitators stirring up trouble?",
