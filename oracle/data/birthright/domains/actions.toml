# =============================================================================
# BIRTHRIGHT DOMAIN ACTIONS
# Complete reference for all domain actions in the Birthright campaign setting
# For use with the Birthright Solo RPG Oracle
# =============================================================================

[metadata]
title = "Domain Actions Reference"
version = "1.0.0"
system = "Birthright"
description = """
Domain actions are the primary means by which regents manage their realms.
Each domain turn (typically one month), a regent may take a number of domain
actions equal to their bloodline modifier (minimum 1, typically 3-4 for most
blooded regents). Some actions are "free" and don't count against this limit.
"""

# =============================================================================
# STANDARD DOMAIN ACTIONS
# These actions each cost one domain action slot per turn
# =============================================================================

[[actions]]
name = "Agitate"
type = "domain"
category = "intrigue"
description = """
Stir up unrest in a province, decreasing its loyalty rating or inciting
rebellion against the current ruler. Often used before invasion or to
weaken rival regents.
"""
regency_cost = "1 RP per province level"
gold_cost = "1 GB"
time = "1 domain action"
requirements = [
    "Must have a holding in the province OR adjacent to it",
    "Must have agents or influence in the target province"
]
success_dc = "10 + province level + target regent's Law holding levels"
modifiers = [
    "+2 if you have a Temple holding in the province (religious dissent)",
    "+2 if you have a Guild holding (economic pressure)",
    "+2 if province loyalty is already Poor or Rebellious",
    "-2 if province loyalty is High",
    "-4 if target regent has Law holdings equal to province level",
    "+1 per level of your highest holding in province"
]
success_result = "Province loyalty decreases by one category"
failure_consequence = "Attempt detected; target regent gains +2 on Contest actions against your holdings"
critical_success = "Loyalty drops two categories; your involvement remains secret"
critical_failure = "Rebellion fails spectacularly; loyalty improves and you are exposed"
oracle_prompts = [
    "Is the population receptive to outside agitation?",
    "Does the ruling regent have informants who detect the attempt?",
    "Do local conditions (famine, taxes, war) aid or hinder the effort?",
    "Is there an existing resistance movement to ally with?"
]
solo_notes = """
When agitating, consider:
- WHY would the population be dissatisfied?
- WHO benefits from instability?
- WHAT form does the unrest take? (riots, strikes, religious fervor)
"""

[[actions]]
name = "Contest Holding"
type = "domain"
category = "conflict"
description = """
Attempt to reduce the level of a rival's holding in a province where you
also have holdings. Represents economic competition, religious conversion,
legal challenges, or magical suppression.
"""
regency_cost = "1 RP per level of target holding"
gold_cost = "1 GB per level of target holding"
time = "1 domain action"
requirements = [
    "Must have a holding of the SAME TYPE in the same province",
    "Your holding level + target holding level cannot exceed province level after success"
]
success_dc = "10 + target holding level + target regent's bloodline modifier"
modifiers = [
    "+2 if your holding level exceeds target's",
    "+1 per allied holding in province (any type)",
    "+2 if province loyalty favors you",
    "-2 if target has Law holding majority",
    "-2 per level of target's allied holdings",
    "+2 if you have more total RP than opponent"
]
success_result = "Target holding reduced by 1 level"
failure_consequence = "RP and GB spent; target may Contest your holding as free action next turn"
critical_success = "Target holding reduced by 2 levels"
critical_failure = "Your holding loses 1 level instead"
oracle_prompts = [
    "Does the target regent retaliate immediately?",
    "Do third parties intervene to protect the balance of power?",
    "Is collateral damage caused to the province?",
    "Does this contest escalate to open conflict?"
]
solo_notes = """
Contest actions are often the opening moves of a domain conflict.
Consider the political ramifications - other regents notice aggression.
"""

[[actions]]
name = "Contest Province"
type = "domain"
category = "conflict"
description = """
A drastic action to reduce the level of a province itself, typically through
warfare, plague, or deliberate devastation. Rarely used as it destroys wealth.
"""
regency_cost = "2 RP per province level"
gold_cost = "2 GB per province level"
time = "1 domain action"
requirements = [
    "Must militarily occupy the province OR",
    "Must use realm magic to devastate"
]
success_dc = "15 + province level"
modifiers = [
    "+4 if province is occupied by your armies",
    "+2 per army unit participating in devastation",
    "-4 if any defender units present",
    "-2 per level of fortifications",
    "+2 if using realm magic (Death Plague, etc.)"
]
success_result = "Province level reduced by 1; all holdings reduced proportionally"
failure_consequence = "Resources spent; province survives; massive reputation loss"
critical_success = "Province reduced by 2 levels"
critical_failure = "Your forces suffer attrition; morale collapses"
oracle_prompts = [
    "Is this scorched earth necessary or vindictive?",
    "How does the populace respond to devastation?",
    "Do other regents condemn or ignore the action?",
    "Will the land recover, or is it cursed?"
]
special_rules = [
    "Contesting a province to level 0 makes it wilderness",
    "Population displaced becomes refugees or casualties",
    "Other regents may view this as an atrocity"
]

[[actions]]
name = "Create Holding"
type = "domain"
category = "development"
description = """
Establish a new holding (level 0) in a province. This is the first step to
building influence in a new area. The holding can then be increased via
Rule actions.
"""
regency_cost = "1 RP"
gold_cost = "1 GB"
time = "1 domain action"
requirements = [
    "Province must have room for the holding type",
    "For Source holdings: sufficient magical potential must exist",
    "Must not be blocked by hostile regent with Law holding majority"
]
success_dc = "10 + province level"
modifiers = [
    "+2 if province regent approves or is allied",
    "+2 if you have other holdings in the province",
    "-2 per level of existing holdings of same type (competition)",
    "-4 if Law holder actively opposes (can block entirely)",
    "+2 if population is receptive (Temple: same religion, Guild: needs trade)"
]
success_result = "New holding established at level 0"
failure_consequence = "Resources spent; no holding created; may alert rivals"
critical_success = "Holding created at level 1 instead of 0"
critical_failure = "Attempt fails and is publicly exposed; -2 to future attempts here"
oracle_prompts = [
    "Does the provincial ruler notice and respond?",
    "Is there local support for this new holding?",
    "Do existing holding owners attempt to block?",
    "What form does this holding take? (specific temple, guild hall, etc.)"
]
holding_creation_details = """
Law Holding: Establish courts, sheriffs, tax collectors
Temple Holding: Build shrine, assign priests, begin services
Guild Holding: Open trade house, establish merchant contacts
Source Holding: Attune to magical potential, create sanctum
"""

[[actions]]
name = "Decree"
type = "domain"
category = "governance"
description = """
Issue a proclamation, law, or official declaration affecting your realm.
Decrees can adjust taxes, declare holidays, outlaw practices, recognize
titles, or make other official statements.
"""
regency_cost = "Variable (1-5 RP based on scope)"
gold_cost = "Variable (0-5 GB for enforcement)"
time = "1 domain action"
requirements = [
    "Must be the recognized ruler of affected territories",
    "Must have means to enforce the decree (Law holdings, military)"
]
success_dc = "Varies by decree type and scope"

[actions.decree_types]
minor = { dc = 10, description = "Local ordinances, minor appointments", rp = 1, gb = 0 }
standard = { dc = 15, description = "Tax adjustments, trade regulations", rp = 2, gb = 1 }
major = { dc = 20, description = "New laws, military levies, religious edicts", rp = 3, gb = 2 }
sweeping = { dc = 25, description = "Realm-wide changes, succession declarations", rp = 5, gb = 5 }

modifiers = [
    "+2 if decree aligns with population values",
    "+2 if Temple holdings support the decree",
    "-2 if decree is unpopular",
    "-4 if decree contradicts established tradition",
    "+1 per Law holding level enforcing"
]
success_result = "Decree takes effect; modifiers apply to relevant actions"
failure_consequence = "Decree is ignored or resisted; loyalty may decrease"
critical_success = "Decree becomes entrenched; difficult to reverse"
critical_failure = "Decree causes unrest; loyalty decreases one category"
oracle_prompts = [
    "Is this decree popular or resented?",
    "Who benefits and who suffers from this law?",
    "How is it enforced? By whom?",
    "Are there loopholes being exploited?"
]

[[actions]]
name = "Diplomacy"
type = "domain"
category = "politics"
description = """
Negotiate with another regent for treaties, alliances, marriages, trade
agreements, or other formal arrangements. Can also be used to make demands
or negotiate surrenders.
"""
regency_cost = "1 RP minimum (more for complex agreements)"
gold_cost = "Variable (gifts, bribes, hosting costs)"
time = "1 domain action"
requirements = [
    "Must have means to contact target regent",
    "Target must be willing to negotiate (or compelled by circumstances)"
]
success_dc = "10 + target regent's bloodline modifier + situational modifiers"

[actions.diplomacy_types]
non_aggression = { dc_mod = 0, description = "Agree not to attack each other" }
trade_agreement = { dc_mod = 2, description = "Favorable trade terms between realms" }
alliance_defensive = { dc_mod = 5, description = "Mutual defense pact" }
alliance_offensive = { dc_mod = 8, description = "Agreement to jointly attack a target" }
vassalage = { dc_mod = 10, description = "One party becomes vassal to the other" }
marriage = { dc_mod = "varies", description = "Political marriage to seal alliance" }
surrender = { dc_mod = "-5 to +10", description = "Negotiating terms of defeat" }

modifiers = [
    "+2 if offering valuable concessions",
    "+4 if you hold significant military advantage",
    "+2 if you share enemies",
    "+2 if cultural/religious alignment",
    "-2 if past conflicts or betrayals",
    "-4 if target views you as threat",
    "+1 per gift of 5 GB value"
]
success_result = "Agreement reached; terms binding (honor/reputation enforced)"
failure_consequence = "Negotiations fail; may not retry for 1d4 domain turns"
critical_success = "Exceptionally favorable terms; lasting goodwill"
critical_failure = "Diplomatic incident; relationship worsens significantly"
oracle_prompts = [
    "What does the other regent truly want?",
    "Are there hidden agendas in this negotiation?",
    "Will third parties interfere?",
    "What concessions might change the outcome?",
    "Is this agreement genuine or will it be betrayed?"
]

[[actions]]
name = "Espionage"
type = "domain"
category = "intrigue"
description = """
Conduct covert operations against a target regent. Espionage covers many
types of clandestine activities from information gathering to assassination.
"""
regency_cost = "1-5 RP depending on operation type"
gold_cost = "1-10 GB depending on operation type"
time = "1 domain action"
requirements = [
    "Must have spies or agents (usually via Guild or Temple holdings)",
    "More difficult operations require more established networks"
]

[actions.espionage_types]
intelligence = { rp = 1, gb = 1, dc = 12, description = "Gather information about target's holdings, armies, treasury" }
counterespionage = { rp = 1, gb = 1, dc = 10, description = "Detect and eliminate enemy spies" }
sabotage_holding = { rp = 2, gb = 3, dc = 15, description = "Damage target holding (-1 level temporarily)" }
sabotage_military = { rp = 2, gb = 3, dc = 15, description = "Damage target's military (reduce unit strength)" }
assassination = { rp = 5, gb = 10, dc = 20, description = "Attempt to kill target regent or lieutenant" }
theft = { rp = 2, gb = 2, dc = 14, description = "Steal gold, items, or information" }
corruption = { rp = 3, gb = 5, dc = 16, description = "Bribe officials to work against their lord" }

success_dc = "Variable by operation type (see above)"
modifiers = [
    "+2 if you have Guild holdings in target's realm",
    "+2 if target has Poor or Rebellious loyalty provinces",
    "-2 if target has strong Law holdings",
    "-4 if target has active counterespionage",
    "+1 per agent network level",
    "+2 if lieutenant specializes in intrigue"
]
success_result = "Operation succeeds; results per type"
failure_consequence = "Operation fails; agents may be captured or killed"
critical_success = "Operation succeeds with no trace; bonus intelligence gained"
critical_failure = "Agents captured; your involvement proven; diplomatic crisis"
oracle_prompts = [
    "Is the operation detected?",
    "Do agents survive regardless of outcome?",
    "Is false intelligence fed to your spies?",
    "Does target retaliate with their own espionage?",
    "Are there witnesses or evidence?"
]
special_rules = [
    "Assassination requires confirmation that target is present",
    "Captured spies can be interrogated for information",
    "Proven espionage can be casus belli for war"
]

[[actions]]
