vassalage = { rp = 5, description = "Create or confirm vassal relationship" }
bloodline_transfer = { rp = 10, description = "Transfer portion of bloodline strength" }
bloodtheft_cleansing = { rp = 20, description = "Legitimize bloodline gained through bloodtheft" }
coronation = { rp = 15, description = "Crown a new sovereign" }

success_dc = "10 (ceremonial) or 15 (contested/complex)"
