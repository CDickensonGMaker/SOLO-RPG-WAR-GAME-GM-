    "Maximum targets equal to source level used"
]
oracle_prompts = [
    "Does the illusion hold under scrutiny?",
    "Do concealed troops accidentally reveal themselves?",
    "Does an enemy wizard attempt to pierce the deception?",
    "Are there witnesses who might spread rumors?"
]
