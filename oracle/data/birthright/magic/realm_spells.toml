[[wizard_spells]]
name = "Dispel Realm Magic"
source_requirement = 1
gold_cost = "Variable (see effect)"
regency_cost = "Variable (see effect)"
casting_time = "1 domain action (or reaction during another's casting)"
duration = "Instantaneous"
range = "Province containing source or connected by ley line"
description = """
The wizard unravels the magical threads of another realm spell, either
preventing its casting or ending an ongoing effect.
"""
effect = """
To dispel, spend equal or greater resources than the original spell:
- Match or exceed the GB cost
- Match or exceed the RP cost
- Source level must equal or exceed the original caster's

Success is automatic if resources match. If spending less, roll:
Base 50% + 5% per RP above minimum + 5% per source level above minimum

Can be used as a reaction to counter a spell being cast (costs double).
"""
limitations = [
    "Must know a spell is being cast or is active to dispel it",
    "Cannot dispel Investiture",
    "Dispelling permanent effects requires triple cost"
]
oracle_prompts = [
    "Is the dispel successful if resources are close?",
    "Does the original caster sense the attempt?",
    "Are there unexpected side effects from the magical backlash?",
    "Does dispelling reveal hidden information about the original spell?"
]
contested_by = ["Another Dispel Realm Magic", "Ley Trap if cast through trapped line"]

