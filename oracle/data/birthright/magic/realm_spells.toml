# =============================================================================
# BIRTHRIGHT REALM MAGIC: REALM SPELLS
# =============================================================================
# Realm spells are powerful magics that affect entire provinces or domains.
# They require holdings (Sources for wizards, Temples for priests) and
# significant investments of Gold Bars (GB) and Regency Points (RP).
# =============================================================================

[metadata]
version = "1.0"
description = "Complete realm spell compendium for Birthright domain play"
setting = "Cerilia"

# -----------------------------------------------------------------------------
# REALM MAGIC FUNDAMENTALS
# -----------------------------------------------------------------------------

[fundamentals]
description = """
Realm magic taps the mebhaighl - the magical essence that flows through the
land of Cerilia. Only those with divine bloodlines can channel this power.
Wizards draw from Sources, priests from Temples. Both require regency and gold.
"""

casting_requirements = """
To cast a realm spell, a regent must:
1. Control a holding of sufficient level (Source or Temple)
2. Spend the required Gold Bars (GB)
3. Spend the required Regency Points (RP)
4. Use a domain action (usually a full action)
5. Meet any alignment or bloodline requirements
"""

contested_magic = """
Realm spells can be contested by:
- Dispel Realm Magic (direct counter)
- Protection from Realm Magic (preventive ward)
- Ley Traps (for spells cast through ley lines)
- Warding (blocks scrying and some intrusions)
"""

# =============================================================================
# WIZARD REALM SPELLS
# =============================================================================
# These spells require Source holdings. Source level determines what spells
# can be cast and their maximum power.
# =============================================================================

[[wizard_spells]]
name = "Alchemy"
source_requirement = 4
gold_cost = "2 GB"
regency_cost = "1 RP per GB created"
casting_time = "1 domain action"
duration = "Permanent"
range = "Source holding"
description = """
The wizard transmutes base materials into gold using the magical essence of
the land. This is one of the most sought-after realm spells, though its use
can have unforeseen consequences.
"""
effect = """
Create 1d6 GB worth of gold per source level invested in the casting.
The wizard may choose to invest multiple sources in a single province
if connected by ley lines.
"""
limitations = [
    "Cannot create more GB than the wizard's bloodline score",
    "Each use in the same province within a year reduces yield by 1 GB",
    "Excessive use may attract thieves guilds or dragons"
]
oracle_prompts = [
    "Does the transmutation attract unwanted attention? (Likely if 10+ GB created)",
    "Is there a side effect to the created gold?",
    "Do rival wizards sense the magical expenditure?",
    "Does the gold carry a magical taint that will be noticed?"
]
contested_by = ["Dispel Realm Magic", "Thieves guild interference"]

[[wizard_spells]]
name = "Battle Spell"
source_requirement = 3
gold_cost = "1 GB per unit affected"
regency_cost = "2 RP"
casting_time = "War move (during battle)"
duration = "One battle"
range = "Province containing source or connected by ley line"
description = """
The wizard unleashes destructive magic upon enemy forces during battle.
This can turn the tide of a conflict but marks the wizard as a military target.
"""
effect = """
Choose one effect per casting:
- Lightning Strike: Deal 1d6 hits to one enemy unit
- Fireball: Deal 1d4 hits to up to 3 adjacent enemy units
- Ice Storm: Reduce one enemy unit's movement to 0 for the battle
- Magic Missiles: Automatically deal 2 hits to one enemy unit (no save)
"""
limitations = [
    "Wizard must be present in the battle or have ley line connection",
    "Can only cast once per war move unless source level 7+",
    "Enemy wizards may counter with their own battle spells"
]
oracle_prompts = [
    "Do enemy wizards attempt to counter the spell?",
    "Does the battle spell cause collateral damage to the province?",
    "Are there unintended casualties among civilians or allies?",
    "Does using destructive magic affect your reputation?"
]
contested_by = ["Enemy Battle Spell", "Protection from Realm Magic", "Dispel Realm Magic"]

[[wizard_spells]]
