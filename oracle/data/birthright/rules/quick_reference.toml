# =============================================================================
# ORACLE QUESTION TEMPLATES
# =============================================================================

[oracle_templates]
description = "Common oracle questions for solo Birthright play"

[[oracle_templates.domain]]
situation = "Does another regent take action against me?"
likely_if = "Low diplomatic relations, contested border, rival blood"
question_format = "Does [Regent] [action] this domain turn?"

[[oracle_templates.domain]]
situation = "Is my domain action successful?"
likely_if = "High skill modifier, RP spent, favorable circumstances"
question_format = "Does [action] on [target] succeed? (DC [X])"

[[oracle_templates.domain]]
situation = "What is the domain event this turn?"
method = "Roll d100 on Domain Events table"
question_format = "What event occurs? (roll on table)"

[[oracle_templates.intrigue]]
situation = "Is this NPC blooded?"
likely_if = "Noble family, magical ability, ruling position"
question_format = "Is [NPC] a blooded scion?"

[[oracle_templates.intrigue]]
situation = "What is this scion's derivation?"
method = "Roll or choose based on culture"
question_format = "What bloodline does [NPC] carry? (roll on derivation table)"

[[oracle_templates.intrigue]]
situation = "Is assassination attempted?"
likely_if = "Political enemies, Azrai cultists, contested succession"
question_format = "Is there an assassination attempt this [period]?"

[[oracle_templates.adventure]]
situation = "Does the awnsheghlien appear?"
likely_if = "In its territory, threatening its interests"
question_format = "Does [Awnsheghlien] become involved?"

[[oracle_templates.adventure]]
situation = "Is the treasure significant?"
likely_if = "Ancient site, dragon hoard, royal tomb"
question_format = "Does the treasure include [bloodsilver/realm artifact/GB]?"

[[oracle_templates.adventure]]
situation = "Are there Shadow World complications?"
likely_if = "Near known portal, magical site, halfling present"
question_format = "Is the Shadow World bleeding through here?"

