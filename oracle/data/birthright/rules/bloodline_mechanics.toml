# =============================================================================
# BLOODLINE MECHANICS - 5E INTEGRATION
# =============================================================================
# Converts the Birthright bloodline system to 5th Edition D&D mechanics.
# Multiple implementation options provided for different campaign styles.
# =============================================================================

[meta]
title = "Cerilian Bloodline System"
version = "1.0"
system = "5e"
source = "Birthright Campaign Setting (adapted)"

# =============================================================================
# BLOODLINE OVERVIEW
# =============================================================================

[bloodline]
description = """
The bloodlines of Cerilia are the inheritance of divine power from the gods who
died at the Battle of Deismaar. When the gods perished, their essence scattered
across the battlefield, infusing the champions who fought there. These bloodlines
have been passed down through generations, though they can be stolen, lost, or
strengthened through various means.

Bloodline grants several benefits:
1. The ability to cast true arcane magic
2. The ability to rule domains and collect regency
3. Supernatural blood abilities unique to each derivation
4. Resistance to the blood abilities of others
"""

# =============================================================================
# IMPLEMENTATION OPTIONS
# =============================================================================
# Choose ONE of these systems for your campaign. Each has trade-offs.
# =============================================================================

[implementation.option_1_ability_score]
name = "Bloodline as Seventh Ability Score"
description = """
Treat Bloodline Score as a seventh ability, ranging from 1-100+. This is the
most faithful adaptation of the original 2e system but requires the most
bookkeeping.
"""
pros = ["Most faithful to original", "Granular progression", "Clear numerical tracking"]
cons = ["Extra stat to track", "More complex", "Doesn't use 5e advantage/proficiency systems"]

[implementation.option_1_ability_score.generation]
methods = [
    { name = "Roll", method = "2d20 + cultural modifier", average = 21 },
    { name = "Standard Array", values = [30, 25, 20, 15, 10] },
    { name = "Point Buy", points = "15 points, 1:1 ratio, range 1-40" }
]
cultural_modifiers = [
    { culture = "Anuirean Noble", modifier = "+10" },
    { culture = "Anuirean Common", modifier = "+0" },
    { culture = "Brecht Guild", modifier = "+5" },
    { culture = "Khinasi Noble", modifier = "+8" },
    { culture = "Rjurik Jarl", modifier = "+6" },
    { culture = "Vos Tsarevo", modifier = "+8" },
    { culture = "Sidhelien", modifier = "N/A (elves have no bloodline)" }
]

[implementation.option_1_ability_score.strength_categories]
tainted = { range = "1-10", abilities = 0, regency_modifier = -2 }
minor = { range = "11-20", abilities = 1, regency_modifier = 0 }
major = { range = "21-35", abilities = 2, regency_modifier = "+1" }
great = { range = "36-55", abilities = 3, regency_modifier = "+2" }
true = { range = "56-75", abilities = 4, regency_modifier = "+3" }
divine = { range = "76+", abilities = 5, regency_modifier = "+4" }

# ---

[implementation.option_2_feat_chain]
name = "Bloodline as Feat Chain"
description = """
Represent bloodline through a chain of feats. Characters sacrifice ASIs for
bloodline power. Works well with 5e's existing systems.
"""
pros = ["Uses existing 5e mechanics", "Player choice in progression", "No extra tracking"]
cons = ["Costs ASI opportunities", "Less granular", "Harder to represent bloodline theft"]

[[implementation.option_2_feat_chain.feats]]
name = "Blooded Scion"
prerequisite = "Character creation or DM approval"
description = """
You carry divine blood from an ancestor who fought at Deismaar.
- Choose a bloodline derivation (see Derivations section)
- You gain one minor blood ability from your derivation
- You count as blooded for all game purposes (true magic, regency, etc.)
- You can sense other blooded individuals within 30 feet
"""
cost = "Starting feat or 1 ASI"

[[implementation.option_2_feat_chain.feats]]
name = "Awakened Blood"
prerequisite = "Blooded Scion feat"
description = """
Your bloodline stirs with greater power.
- Your bloodline strength increases by one category
- You gain one additional blood ability (minor or major)
- Your regency collection increases by 1 per domain turn
"""
cost = "1 ASI"

[[implementation.option_2_feat_chain.feats]]
name = "True Bloodline"
prerequisite = "Awakened Blood feat, 8th level"
description = """
Your bloodline reaches its full potential.
- Your bloodline strength increases to Great or True
- You gain one additional blood ability (any rank)
- You have advantage on saves against blood abilities from weaker bloodlines
- Your regency collection increases by 2 per domain turn
"""
cost = "1 ASI"

[[implementation.option_2_feat_chain.feats]]
name = "Blood of Kings"
prerequisite = "True Bloodline feat, 12th level"
description = """
Your divine heritage marks you as destined to rule.
- You are immune to blood abilities from Minor or lesser bloodlines
- You gain one great blood ability
- Domain actions you take have advantage on their success rolls
- You can sense the bloodline strength of any scion within 60 feet
"""
cost = "1 ASI"

# ---

[implementation.option_3_background]
name = "Bloodline as Background Feature"
description = """
The simplest option: bloodline is part of your background, granting a
specific package of abilities that don't scale.
"""
pros = ["Simplest implementation", "No extra tracking", "Easy to understand"]
cons = ["No progression", "Less impactful", "Doesn't capture bloodline's importance"]

[[implementation.option_3_background.backgrounds]]
name = "Blooded Noble"
description = "You carry divine blood and may rule a domain"
proficiencies = ["Persuasion", "History"]
languages = ["One of choice"]
equipment = "Fine clothes, signet ring, proof of lineage, 25 gp"
feature_name = "Divine Heritage"
feature_description = """
You are blooded and can:
- Cast true arcane magic (if you have spellcasting)
- Collect regency from domain holdings
- Use one blood ability appropriate to your derivation
- Sense other blooded individuals within 30 feet
"""

# =============================================================================
# BLOODLINE DERIVATIONS
# =============================================================================
# Each derivation comes from a different god of Deismaar.
# =============================================================================

[[derivations]]
name = "Anduiras"
god = "Anduiras, God of Nobility and War"
description = """
Anduiras was the god of noble warfare, courage, and leadership. His bloodline
flows strongest in the royal families of Anuire. Scions of Anduiras are natural
leaders, inspiring courage in allies and fear in enemies.
"""
alignment_tendency = "Lawful"
domains = ["War", "Order", "Protection"]
common_among = ["Anuirean nobility", "Rjurik jarls"]

[[derivations.blood_abilities]]
name = "Battlewise"
rank = "Minor"
description = "You have advantage on Initiative rolls."

[[derivations.blood_abilities]]
name = "Courage"
rank = "Minor"
description = "You are immune to the frightened condition. As an action, you can grant this immunity to allies within 30 feet for 1 minute. Once used, you cannot use the aura again until you finish a long rest."

[[derivations.blood_abilities]]
name = "Detect Lie"
rank = "Major"
description = "You can cast Zone of Truth once per long rest without expending a spell slot. Additionally, you have advantage on Insight checks to detect deception."

[[derivations.blood_abilities]]
name = "Divine Aura"
rank = "Major"
description = "As an action, you can project an aura of authority in a 30-foot radius. For 1 minute, allies gain +2 to attack rolls and saving throws while enemies have -2. Once used, you cannot use this ability again until you finish a long rest."

[[derivations.blood_abilities]]
name = "Iron Will"
rank = "Great"
description = "You have advantage on all Wisdom saving throws. Once per long rest, you can automatically succeed on a Wisdom saving throw."

[[derivations.blood_abilities]]
name = "Invulnerability"
rank = "Great"
description = "Once per long rest, you can use your reaction when hit by an attack to reduce the damage to 0. You also gain resistance to nonmagical bludgeoning, piercing, and slashing damage."

# ---

[[derivations]]
name = "Basaia"
god = "Basaia, Goddess of the Sun"
description = """
Basaia was the goddess of the sun, light, and wisdom. Her bloodline burns
brightest in Khinasi lands. Scions of Basaia are often scholars, seers, and
wielders of fire magic.
"""
alignment_tendency = "Lawful Good"
domains = ["Light", "Knowledge", "Life"]
common_among = ["Khinasi royalty", "Temple hierarchies"]

[[derivations.blood_abilities]]
name = "Enhanced Sense"
rank = "Minor"
description = "Choose one sense (sight, hearing, smell, etc.). You have advantage on Perception checks using that sense, and magical darkness doesn't impede your chosen sense."

[[derivations.blood_abilities]]
name = "Resistance (Fire)"
rank = "Minor"
description = "You have resistance to fire damage."

[[derivations.blood_abilities]]
name = "Light of Reason"
rank = "Major"
description = "You can cast Daylight once per long rest without expending a spell slot. You also have advantage on saving throws against illusions."

[[derivations.blood_abilities]]
name = "Mebhaighl Sense"
rank = "Major"
description = "You can sense magical auras as if constantly under Detect Magic. You can also sense Sources within 1 mile and know their relative strength."

[[derivations.blood_abilities]]
name = "Touch of Decay (Inverted)"
rank = "Great"
description = "Your touch can restore rather than destroy. Once per long rest, you can touch a creature to heal 4d10 hit points and end one disease or condition."

[[derivations.blood_abilities]]
name = "Regeneration"
rank = "Great"
description = "At the start of each of your turns, you regain hit points equal to your Constitution modifier if you have at least 1 hit point. This doesn't function if you've taken fire or acid damage since your last turn."

# ---

[[derivations]]
name = "Brenna"
god = "Brenna, Goddess of Commerce and Fortune"
description = """
Brenna was the goddess of commerce, travel, and luck. Her bloodline runs
through the merchant princes of Brechttur. Scions of Brenna are lucky,
persuasive, and always seem to find opportunities.
"""
alignment_tendency = "Neutral"
domains = ["Trickery", "Travel", "Fortune"]
common_among = ["Brecht guilders", "Anuirean merchants"]

[[derivations.blood_abilities]]
name = "Alertness"
rank = "Minor"
description = "You cannot be surprised while conscious. You also have advantage on Initiative rolls."

[[derivations.blood_abilities]]
name = "Character Reading"
rank = "Minor"
