[[derivations.blood_abilities]]
name = "Storm Voice"
rank = "Major"
description = "You can cast Call Lightning once per long rest without expending a spell slot (requires stormy conditions or outdoor environment). You can also predict weather accurately for 24 hours."

[[derivations.blood_abilities]]
name = "Ocean's Embrace"
rank = "Great"
description = "While in contact with a body of water, you gain the following: AC +2, immunity to cold damage, and the ability to cast Control Weather once per long rest."

