[[derivations.blood_abilities]]
name = "Persuasion"
rank = "Major"
description = "You can cast Suggestion once per long rest without expending a spell slot. Your spell save DC equals 8 + proficiency bonus + Charisma modifier."

[[derivations.blood_abilities]]
name = "Divine Luck"
rank = "Major"
description = "You have 3 luck points. When you make an attack roll, ability check, or saving throw, you can spend one luck point to roll an additional d20 and choose which to use. You regain all luck points on a long rest."

[[derivations.blood_abilities]]
name = "Travel"
rank = "Great"
description = "Once per long rest, you can cast Teleport without expending a spell slot. You can only teleport to locations you have personally visited."

[[derivations.blood_abilities]]
name = "Home Hearkening"
rank = "Great"
description = "Once per long rest, you can teleport yourself and up to 8 willing creatures to your domain's capital or seat of power, regardless of distance."

# ---

[[derivations]]
name = "Masela"
god = "Masela, Goddess of the Sea"
description = """
Masela was the goddess of the sea, storms, and sailors. Her bloodline flows
