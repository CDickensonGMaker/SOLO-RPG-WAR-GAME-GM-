[[derivations]]
name = "Reynir"
god = "Reynir, God of the Forest"
description = """
Reynir was the god of forests, nature, and the hunt. His bloodline is strongest
among the Rjurik and those who dwell in the wild places. Scions of Reynir are
at home in nature and command its denizens.
"""
alignment_tendency = "Neutral"
domains = ["Nature", "Hunt", "Life"]
common_among = ["Rjurik jarls", "Forest dwellers", "Druids"]

[[derivations.blood_abilities]]
name = "Animal Affinity"
rank = "Minor"
description = "Beasts have a starting attitude of friendly toward you. You can communicate simple ideas with beasts, and they understand you."

[[derivations.blood_abilities]]
name = "Forest Walk"
rank = "Minor"
description = "Difficult terrain composed of plants doesn't cost you extra movement. You can pass through plants without being slowed or taking damage from thorns, spines, or similar hazards."

[[derivations.blood_abilities]]
name = "Nature's Ally"
rank = "Major"
description = "You can cast Conjure Animals once per long rest without expending a spell slot. The summoned creatures remain for up to 8 hours."

[[derivations.blood_abilities]]
name = "Healing"
rank = "Major"
description = "Once per long rest, you can touch a creature to restore hit points equal to 5 times your proficiency bonus and end one disease or condition affecting it."

[[derivations.blood_abilities]]
name = "Master of the Wild"
rank = "Great"
description = "You can cast Awaken once per week without expending a spell slot or material components. Awakened creatures serve you willingly."

# ---

[[derivations]]
name = "Vorynn"
god = "Vorynn, God of Magic"
description = """
Vorynn was the god of the moon, magic, and secrets. His bloodline grants
mastery over the arcane arts. Scions of Vorynn are powerful mages who see
beyond the veil of reality.
"""
alignment_tendency = "Neutral"
domains = ["Arcana", "Knowledge", "Moon"]
common_among = ["Wizard families", "Magical orders", "Seers"]

[[derivations.blood_abilities]]
name = "Detect Magic"
rank = "Minor"
description = "You can cast Detect Magic at will without expending a spell slot."

[[derivations.blood_abilities]]
name = "Spell Resistance"
rank = "Minor"
description = "You have advantage on saving throws against spells."

[[derivations.blood_abilities]]
name = "Arcane Sight"
rank = "Major"
description = "You can see magical auras automatically (no concentration required). You can identify spells being cast as a reaction."

[[derivations.blood_abilities]]
name = "Heightened Ability"
