[[derivations.blood_abilities]]
name = "True Sight"
rank = "Great"
description = "You have truesight out to 60 feet."

[[derivations.blood_abilities]]
name = "Magic Resistance"
rank = "Great"
description = "You have advantage on all saving throws against magical effects. Once per long rest, you can automatically succeed on a saving throw against a spell."

# ---

[[derivations]]
name = "Azrai"
god = "Azrai, God of Shadow"
description = """
Azrai was the god of shadow, corruption, and pride. He was the enemy of the
other gods and his bloodline carries his taint. Scions of Azrai often become
awnsheghlien - monsters twisted by their blood. Yet some resist the corruption
and use their dark gifts for their own purposes.
"""
alignment_tendency = "Evil (but not required)"
domains = ["Shadow", "Death", "Deception"]
common_among = ["Vos tsarevos", "Awnsheghlien", "Dark rulers"]
special_note = """
Azrai's bloodline is both powerful and dangerous. Each time a scion of Azrai
uses a blood ability or commits an evil act, they must make a Wisdom saving
throw (DC 10 + number of uses that day) or gain a point of corruption. At
10 corruption points, they begin transforming into an awnsheghlien.
"""

[[derivations.blood_abilities]]
name = "Detect Life"
rank = "Minor"
description = "You can sense living creatures within 60 feet, even through walls. You know their general size and number but not their exact location."

[[derivations.blood_abilities]]
name = "Fear"
rank = "Minor"
description = "As an action, you can force one creature within 30 feet to make a Wisdom saving throw (DC 8 + proficiency + Charisma) or become frightened of you for 1 minute. The creature can repeat the save at the end of each turn."

[[derivations.blood_abilities]]
name = "Shadow Form"
rank = "Major"
description = "As an action, you can become a shadow for up to 1 minute. While in shadow form, you have resistance to nonmagical damage, can move through spaces as small as 1 inch, and have advantage on Stealth checks. You cannot attack or cast spells in this form. Once used, you cannot use this ability again until you finish a long rest."

[[derivations.blood_abilities]]
name = "Death Touch"
rank = "Major"
description = "Your touch deals 4d6 necrotic damage. On a critical hit or if this damage reduces a creature to 0 hit points, you regain hit points equal to half the necrotic damage dealt."

[[derivations.blood_abilities]]
name = "Wither Touch"
rank = "Great"
description = "Your touch can age creatures. A touched creature must make a Constitution saving throw or age 3d10 years. Creatures aged past their natural lifespan die. You also do not age while you have this ability."

[[derivations.blood_abilities]]
name = "Charm Aura"
rank = "Great"
description = "Creatures within 30 feet that can see you must make a Wisdom saving throw at the start of their turn or be charmed by you until the start of their next turn. A creature that succeeds is immune for 24 hours."

# =============================================================================
# BLOODTHEFT
# =============================================================================
# The most feared way to increase bloodline power.
# =============================================================================

[bloodtheft]
description = """
Bloodtheft is the act of slaying a blooded scion and absorbing their divine
essence. This dark act is the primary way bloodlines strengthen - and the
reason blooded scions fear assassination.
"""

[bloodtheft.mechanics]
method = """
To commit bloodtheft, you must:
1. Deal the killing blow to a blooded scion
2. Use a bladed weapon forged of tighmaevril (bloodsilver) OR
3. Use any bladed weapon while within melee range at the moment of death
"""

[bloodtheft.effects]
success = """
When you commit bloodtheft:
1. Roll 1d100 and compare to the victim's Bloodline Score
   - Roll under: Gain points equal to (victim's score - your roll)
   - Roll over: Gain 1 point (you grasped only a fragment)
2. If the victim had blood abilities you don't have, roll percentile for each:
   - 50% or less: You gain that blood ability
3. Your bloodline derivation may shift toward the victim's if they had
   stronger blood of a different derivation
"""

[bloodtheft.tighmaevril]
description = """
Tighmaevril (bloodsilver) is a rare metal that can conduct divine essence.
A tighmaevril blade guarantees successful bloodtheft on a killing blow,
even at range. Such weapons are priceless artifacts - perhaps a dozen
exist in all Cerilia.
"""
game_effect = "Tighmaevril weapons automatically trigger bloodtheft mechanics on a killing blow against a blooded scion, regardless of range"

[bloodtheft.feat_implementation]
name = "Blooded Slayer"
prerequisite = "Have committed bloodtheft at least once"
description = """
You have learned to harvest divine essence efficiently.
- When you commit bloodtheft, you gain an additional 1d10 bloodline points
- You have advantage on the roll to steal blood abilities
- You can sense when a creature you've damaged is close to death (below 10 HP)
"""

# =============================================================================
# USURPATION
# =============================================================================
# Taking a domain through force or treachery.
# =============================================================================

[usurpation]
description = """
Usurpation is the act of claiming another regent's domain through conquest or
assassination. Unlike bloodtheft, usurpation concerns domain control rather
than personal bloodline power.
"""

[usurpation.investiture]
description = """
A regent's connection to their domain is formalized through Investiture - a
ceremony that binds the regent to the land. This bond can only be broken by:
1. The regent's death
2. Willing divestiture (giving up the domain)
3. Forced divestiture through a realm spell
4. Successful usurpation
"""

[usurpation.mechanics]
conquest = """
Military Usurpation:
1. Conquer all provinces of the domain (occupy with military force)
2. Control the capital for at least one domain turn (3 months)
3. Perform Investiture ceremony in the capital
4. Make a Charisma check (DC = former regent's Bloodline modifier + 10)
   - Success: Domain transfers to you
   - Failure: Domain becomes contested (civil unrest, loyalty issues)
"""

assassination = """
Assassination Usurpation:
1. Kill the current regent (ideally via bloodtheft)
2. Be the designated heir OR be the strongest blooded claimant
3. Perform Investiture ceremony within one domain turn
4. If contested, make opposed Charisma checks with other claimants
"""

[usurpation.resistance]
description = """
A domain can resist usurpation:
- Loyalty checks for each holding
- Law holdings oppose or support based on alignment
- Temple holdings may refuse to recognize new regent
- Guild holdings may withdraw economic support
"""

# =============================================================================
# BLOODLINE AND REGENCY
# =============================================================================
# How bloodline interacts with domain rulership.
# =============================================================================

[bloodline_regency]
description = """
Only blooded scions can collect regency - the mystical currency of rulership.
Your bloodline strength determines how much regency you can collect and hold.
"""

[bloodline_regency.collection]
base_formula = "Regency per turn = Domain level + Bloodline modifier"
bloodline_modifier_table = [
    { strength = "Tainted (1-10)", modifier = -2 },
    { strength = "Minor (11-20)", modifier = 0 },
    { strength = "Major (21-35)", modifier = "+1" },
    { strength = "Great (36-55)", modifier = "+2" },
    { strength = "True (56-75)", modifier = "+3" },
    { strength = "Divine (76+)", modifier = "+4" }
]

[bloodline_regency.maximum]
description = "Maximum regency you can hold equals your Bloodline Score"
overflow = "Regency over your maximum is lost at the end of each domain turn"

# =============================================================================
# BLOOD ABILITY ACQUISITION
# =============================================================================

[blood_ability_acquisition]
description = """
Blood abilities can be gained through several means beyond character creation.
"""

[blood_ability_acquisition.methods]
bloodtheft = "As described above - chance to steal victim's abilities"
natural_awakening = "At certain bloodline thresholds, new abilities may manifest"
divine_intervention = "Gods may grant abilities to favored scions"
realm_magic = "Certain realm spells can grant or transfer blood abilities"

[blood_ability_acquisition.awakening_thresholds]
description = "When your bloodline score crosses these thresholds, you gain one new blood ability"
thresholds = [20, 35, 50, 65, 80]
ability_rank = "The ability gained is appropriate to your bloodline strength at the new threshold"

# =============================================================================
# BLOODLINE LOSS AND DEGRADATION
# =============================================================================

[bloodline_loss]
description = """
Bloodlines can weaken or be lost entirely through various means.
"""

[bloodline_loss.methods]
bloodtheft_victim = "Being killed via bloodtheft (obviously ends your bloodline)"
divestiture = "Willingly giving up your bloodline (rare ritual)"
dilution = "Each generation without consolidation loses 1d6 bloodline points"
corruption = "For Azrai scions, transformation into awnsheghlien destroys humanity"
realm_magic = "Certain spells can suppress or drain bloodlines"

[bloodline_loss.dilution]
description = """
If two blooded scions have a child, the child's bloodline is:
- Average of parents' scores + 1d10
- Takes derivation from the stronger parent (or DM choice if equal)

If one parent is unblooded:
- Child has 50% chance of being blooded
- If blooded, score is parent's score / 2 + 1d10
"""
