the power of storms.
"""
alignment_tendency = "Chaotic Neutral"
domains = ["Tempest", "Water", "Travel"]
common_among = ["Coastal rulers", "Island kingdoms", "Naval powers"]

[[derivations.blood_abilities]]
name = "Water Breathing"
rank = "Minor"
description = "You can breathe underwater and have a swimming speed equal to your walking speed."

[[derivations.blood_abilities]]
name = "Resistance (Cold)"
rank = "Minor"
description = "You have resistance to cold damage."

[[derivations.blood_abilities]]
name = "Sea Song"
rank = "Major"
