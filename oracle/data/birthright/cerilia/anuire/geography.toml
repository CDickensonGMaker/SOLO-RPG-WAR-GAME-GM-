# =============================================================================
# ANUIRE GEOGRAPHY - The Heartland of the Old Empire
# =============================================================================
# Geographic data for travel, trade, and adventure in Anuire
# =============================================================================

# =============================================================================
# REGIONAL DESCRIPTIONS
# =============================================================================

[regions]

[regions.heartlands]
name = "The Imperial Heartlands"
realms = ["Avanil", "Boeruine", "Alamie", "Tuornen"]
description = """The central plains of Anuire, once the beating heart of the Empire.
Rich farmland fed the Imperial armies, and the great roads still connect the
ancient cities. Now divided among competing powers, each claiming the empty
Iron Throne."""
climate = "temperate"
terrain_dominant = "plains"
dangers = ["bandits", "political_intrigue", "mercenary_bands"]
opportunities = ["trade", "political_maneuvering", "ancient_ruins"]

[regions.southern_coast]
name = "The Southern Coast"
realms = ["Diemed", "Medoere", "Roesone", "Ilien"]
description = """The warm southern shores of Anuire, facing the Straits of Aerele.
Trade flows through the ports here, and the Spider's influence creeps from the
Spiderfell. Pirates and merchants vie for control of the sea lanes."""
climate = "mediterranean"
terrain_dominant = "coastal_plains"
dangers = ["pirates", "spider_minions", "sea_monsters"]
opportunities = ["naval_trade", "temple_politics", "monster_hunting"]

[regions.western_reaches]
name = "The Western Reaches"
realms = ["Taeghas", "Brosengae", "Rheulgard"]
description = """Wild forests and untamed lands mark the western frontier.
The Erebannien forest holds ancient elven secrets, and the land itself
pulses with magical potential. Fewer settlements, more wilderness."""
climate = "temperate_wet"
terrain_dominant = "forest"
dangers = ["wild_beasts", "fey_creatures", "lost_explorers"]
opportunities = ["source_magic", "elven_contact", "frontier_settlement"]

[regions.northern_marches]
name = "The Northern Marches"
realms = ["Talinie", "Thurazor", "Cariele"]
description = """Cold winds blow from the north, bringing Rjurik traders and
occasional raiders. The land grows harsher here, and the people are hardy.
Trade with the northern realms brings prosperity to those who can survive."""
climate = "cold_temperate"
terrain_dominant = "hills"
dangers = ["rjurik_raiders", "harsh_winters", "goblin_tribes"]
opportunities = ["northern_trade", "mercenary_work", "mining"]

[regions.gorgon_front]
name = "The Gorgon's Front"
realms = ["Mhoried", "Markazor", "Kiergard"]
description = """The eternal battlefield against the Gorgon. Generation after
generation of defenders have held the line here. The land is scarred by
centuries of warfare, and the threat of invasion is ever-present."""
climate = "continental"
terrain_dominant = "hills_mountains"
dangers = ["gorgon_forces", "undead", "corrupted_land", "awnshegh_agents"]
opportunities = ["military_glory", "ancient_battlefields", "heroic_quests"]

# =============================================================================
# TRAVEL ROUTES AND TIMES
# =============================================================================

[travel]

# Travel time in days, assuming normal conditions
# Modifiers: mounted = 0.6x, forced_march = 0.75x, caravan = 1.5x, army = 2x

[[travel.routes]]
from = "Anuire City"
to = "Endier"
days = 3
road_quality = "imperial"
description = "The Old Imperial Road, still maintained. Heaviest traffic in Anuire."
dangers = ["bandits_low", "merchant_rivalry"]
landmarks = ["Milestone Stones", "Imperial Waystation"]

[[travel.routes]]
from = "Anuire City"
to = "Boeruine"
days = 5
road_quality = "imperial"
description = "Northern Imperial Road, patrolled by Boeruine forces."
