# =============================================================================
# LANDMARKS AND WAYPOINTS
# =============================================================================

[landmarks]

[[landmarks.site]]
name = "The Iron Throne"
location = "Anuire City"
type = "political"
description = """The empty throne of the Anuirean Empire. Whoever sits here
rules all Anuire - in theory. Many have tried, all have failed."""
significance = "The ultimate prize in Anuirean politics"

[[landmarks.site]]
name = "Mount Deismaar"
location = "Coastal, visible from many provinces"
type = "religious"
description = """Site of the battle where the old gods died and the bloodlines
were created. Holy ground to all Anuireans."""
significance = "Most sacred site in Cerilia"

[[landmarks.site]]
name = "The Stonecrown Mountains"
location = "Northern Anuire"
type = "geographic"
description = "Great mountain range marking Anuire's northern boundary."
significance = "Natural barrier, rich in minerals and dangers"

[[landmarks.site]]
name = "The Erebannien"
location = "Western Anuire"
type = "mystical"
description = "Ancient elven forest, one of the last in Anuire."
significance = "Source of magic, elven contact, and mystery"

[[landmarks.site]]
name = "Imperial Waystations"
location = "Along major roads"
type = "infrastructure"
description = """Crumbling remnants of the Empire's road system. Some still
function as inns, others are ruins."""
significance = "Safe havens and adventure sites along roads"
