value = "high"
description = "The main artery of Anuirean commerce. Who controls the Imperial Way controls the economy."

[[trade.routes]]
name = "The Maesil Run"
endpoints = ["Shieldhaven", "Endier", "Mhoried provinces"]
goods_flow = ["weapons", "armor", "supplies", "refugees"]
controllers = ["Mheillie Bireon", "Endier Guilds"]
value = "moderate"
description = "Supplies the eternal war against the Gorgon. Always busy, always profitable."

[[trade.routes]]
name = "The Southern Circuit"
endpoints = ["Aerele", "Caercas", "Braeme", "Ilien"]
