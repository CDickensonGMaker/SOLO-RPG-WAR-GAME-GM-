controllers = ["Various", "Khinasi merchants"]
value = "very_high"
description = "The most valuable trade route, connecting Anuire to the Khinasi east."

# =============================================================================
# DANGEROUS AREAS
# =============================================================================

[danger_zones]

[[danger_zones.area]]
name = "The Spiderfell"
type = "awnshegh_domain"
threat_level = "extreme"
description = """The nightmare forest ruled by the Spider, an awnshegh of
terrifying power. Giant spiders infest every shadow, and the Spider's agents
lurk everywhere. No one enters voluntarily."""
creatures = ["giant_spiders", "spider_swarms", "web_golems", "spider_cultists"]
adventure_hooks = [
    "Rescue a captive from the Spider's web",
    "Recover an artifact lost in the forest",
    "Destroy a spider breeding ground",
    "Infiltrate the Spider's spy network"
]

[[danger_zones.area]]
name = "The Gorgon's Crown"
type = "awnshegh_domain"
threat_level = "extreme"
description = """The mountain fortress of the Gorgon, greatest of the awnsheghlien.
His armies of goblins, orogs, and worse threaten all Anuire. The land itself
has been corrupted by his presence."""
creatures = ["goblins", "orogs", "undead", "corrupted_beasts", "stone_guardians"]
adventure_hooks = [
    "Scout the Gorgon's defenses",
    "Rescue prisoners from the slave pits",
    "Destroy a supply caravan",
    "Find the Gorgon's weakness"
]

[[danger_zones.area]]
name = "The Erebannien"
type = "ancient_forest"
threat_level = "high"
description = """Ancient elven forest, now wild and dangerous. The elves have
retreated deep within, and fey creatures roam the paths. Time moves strangely
here, and many who enter are never seen again."""
creatures = ["fey_creatures", "wild_elves", "forest_spirits", "ancient_beasts"]
adventure_hooks = [
    "Seek audience with the elven court",
    "Recover a lost artifact",
    "Rescue someone lost to the fey",
    "Learn ancient magic"
]

[[danger_zones.area]]
name = "The Five Peaks"
type = "monster_territory"
threat_level = "high"
description = """Mountain range infested with giants, dragons, and worse.
Rich in minerals but nearly impossible to mine. Ancient dwarven ruins
hide untold treasures."""
creatures = ["giants", "dragons", "wyverns", "trolls"]
adventure_hooks = [
    "Slay a marauding dragon",
    "Explore dwarven ruins",
    "Establish a mining outpost",
    "Recover giant-held prisoners"
]

[[danger_zones.area]]
name = "The Chimaeron"
type = "awnshegh_domain"
threat_level = "very_high"
description = """Realm of the Chimera, a beast-headed awnshegh who rules
through terror. The population lives in constant fear, and monsters roam
freely. The land is lawless and brutal."""
creatures = ["chimera_spawn", "beast_men", "corrupted_animals", "bandits"]
adventure_hooks = [
    "Assassinate the Chimera",
    "Rescue refugees",
    "Establish resistance contact",
    "Map safe passages"
]

[[danger_zones.area]]
name = "Anuire City Undercity"
type = "urban_dungeon"
threat_level = "moderate"
description = """Beneath the ancient capital lies a vast network of catacombs,
old sewers, and forgotten chambers. Thieves, cultists, and darker things
make their homes in the depths."""
creatures = ["thieves", "cultists", "undead", "oozes", "vermin"]
adventure_hooks = [
    "Track a thieves' guild",
    "Explore imperial catacombs",
    "Destroy a cult cell",
    "Recover lost imperial treasures"
]

# =============================================================================
# BORDER REGIONS
# =============================================================================

[borders]

[[borders.region]]
name = "The Mhoried-Gorgon Border"
realms = ["Mhoried", "Gorgon's Crown"]
type = "active_warzone"
description = """Perpetual conflict zone. Fortifications line both sides,
and raids are constant. Heroes can make their name here, or die forgotten."""
current_status = "tense_standoff"
recent_events = [
    "Major raid repelled last season",
    "New fortification under construction",
    "Refugees flooding south"
]

[[borders.region]]
name = "The Roesone-Spiderfell Border"
realms = ["Roesone", "Spiderfell"]
type = "contested"
description = """The Spider's influence seeps into Roesone's frontier provinces.
Baroness Roesone fights a shadow war against infiltration and corruption."""
current_status = "cold_war"
recent_events = [
    "Spider cultists discovered in Abbatuor",
    "Increased spider creature sightings",
    "Trade route attacks"
]

[[borders.region]]
name = "The Avanil-Boeruine Frontier"
realms = ["Avanil", "Boeruine"]
type = "political_tension"
description = """Two great powers stare across a tense border. Both claim the
Iron Throne, and war seems inevitable. Spies and agents work constantly."""
current_status = "armed_peace"
recent_events = [
    "Diplomatic incident last month",
    "Military exercises near border",
    "Trade disputes escalating"
]

[[borders.region]]
name = "The Ghoere Expansion Zone"
realms = ["Ghoere", "Mhoried", "Roesone", "Elinie"]
type = "aggressive_expansion"
description = """Baron Tael pushes outward on all fronts. His neighbors watch
nervously as his armies grow. Conquest is only a matter of time."""
current_status = "imminent_conflict"
recent_events = [
    "Troops massing on borders",
    "Ultimatums delivered",
    "Refugees fleeing potential targets"
]

[[borders.region]]
name = "The Northern Trade Border"
realms = ["Talinie", "Rjurik Highlands"]
type = "trade_frontier"
description = """Where Anuirean civilization meets Rjurik tradition. Trade
flows, but so do occasional raids. Cultural clash is constant."""
current_status = "profitable_tension"
recent_events = [
    "Major trade fair upcoming",
    "Rjurik clan dispute affecting trade",
    "Pirate activity in northern waters"
]

