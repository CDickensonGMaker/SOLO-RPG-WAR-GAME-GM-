# =============================================================================
# TRADE ROUTES
# =============================================================================

[trade]

[[trade.routes]]
name = "The Imperial Way"
endpoints = ["Anuire City", "Endier", "Boeruine"]
goods_flow = ["luxury_goods", "weapons", "textiles", "grain"]
