# -----------------------------------------------------------------------------
# AVANIL - The Imperial Heartland
# -----------------------------------------------------------------------------

[[regents]]
name = "Darien Avan"
title = "Prince of Avanil"
domain = "Avanil"
domain_type = "landed"
regent_type = "noble"
bloodline_derivation = "anduiras"
bloodline_strength = "great"
blood_abilities = ["Divine Aura", "Battlewise", "Courage", "Detect Lie"]

[regents.personality]
traits = ["ambitious", "charismatic", "calculating", "patient", "proud"]
goals = ["Claim the Iron Throne", "Unite Anuire under Avan banner", "Destroy Boeruine", "Restore the Empire's glory"]
fears = ["Assassination by rivals", "His bloodline proving insufficient", "Being seen as illegitimate", "Boeruine succeeding first"]
secrets = ["Has secretly negotiated with the Gorgon's agents", "Keeps a network of assassins he publicly denounces", "Doubts whether he truly wants the burden of empire"]
values = ["Imperial legacy", "Bloodline purity", "Noble honor", "Strategic patience"]

[regents.disposition]
default = "neutral"
to_player_factors = [
    { condition = "Player is landed regent in Anuire", modifier = -1, reason = "Potential rival to the throne" },
    { condition = "Player opposes Boeruine", modifier = 2, reason = "Enemy of my enemy" },
    { condition = "Player has strong Anduiras bloodline", modifier = -1, reason = "Threat to claim" },
    { condition = "Player supports Avan claim", modifier = 3, reason = "Loyal supporter" },
    { condition = "Player is temple regent of Haelyn", modifier = 1, reason = "Potential legitimizer" },
    { condition = "Player is guild regent", modifier = 0, reason = "Useful but common" },
    { condition = "Player has no bloodline", modifier = 1, reason = "Cannot threaten claim" }
]

[regents.relationships]
allies = ["Brosengae (vassal)", "Taeghas (allied)", "Western Imperial Temple"]
rivals = ["Archduke Boeruine", "Baron Tael of Ghoere", "Diemed"]
enemies = ["The Gorgon", "The Spider"]
vassals = ["Brosengae"]
liege = "none"

[regents.military]
army_strength = "very_strong"
elite_units = ["Avan Imperial Guard", "Knights of the Celestial Blade", "Avanil Pikemen"]
navy_strength = "moderate"
doctrine = "elite"
aggression = "patient"
preferred_tactics = ["diplomatic isolation", "economic pressure", "surgical strikes", "coalition building"]

[regents.resources]
wealth = "very_high"
regency_income = "very_high"
trade_importance = "high"
special_resources = ["Imperial Treasury remnants", "Ancient Anuirean artifacts", "Extensive spy network"]

[regents.oracle_hooks]
adventure_seeds = [
    "Avan needs a diplomatic mission to a hostile court - discretion required",
    "Avan's spy network has gone silent in enemy territory",
    "A pretender claims to be Avan's legitimate heir from a secret marriage",
    "Avan seeks an ancient artifact that could legitimize his claim",
    "Someone is assassinating Avan's agents - find the killer",
    "Avan wants to secretly negotiate with a surprising party",
    "An old enemy of House Avan returns seeking revenge"
]
intrigue_questions = [
    "Is Avan planning a move against a neighbor this season?",
    "Does Avan know about the player's recent actions?",
    "Will Avan honor a treaty if circumstances change?",
    "Has Avan discovered a rival's weakness?",
    "Is Avan's patience finally running out?",
    "Does Avan have a spy in a particular court?"
]
domain_events = [
    "Avan hosts a grand tournament to display might",
    "Avan announces a new claim or grievance",
    "Avan's court receives foreign dignitaries",
    "Avan moves troops to the border - show of force or prelude to war?"
]

