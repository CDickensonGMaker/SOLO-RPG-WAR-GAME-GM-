# Battle Brothers - Grimdark Future
# Genetically enhanced super-soldiers in power armor
# One Page Rules - Free Wargaming System

[faction]
name = "Battle Brothers"
description = "Genetically enhanced super-soldiers clad in power armor, the elite defenders of humanity"
playstyle = "Elite, durable, versatile"
difficulty = "beginner"
strengths = [
    "High quality troops (3+ across the board)",
    "Excellent armor saves (4+ standard)",
    "Flexible loadout options",
    "Strong morale (Fearless common)",
    "Good mix of shooting and melee"
]
weaknesses = [
    "Low model count",
    "Expensive units limit board control",
    "Vulnerable to massed AP weapons",
    "Limited horde-clearing options"
]
tactics = """
Battle Brothers excel at focused strikes and holding key positions. Use transports to
deliver assault units while fire support pins enemies. Your quality advantage means you
win most one-on-one fights, so avoid getting overwhelmed by superior numbers. Focus fire
to eliminate threats before they can mass against you. Veterans and characters punch well
above their weight - use them to crack tough nuts.
"""

