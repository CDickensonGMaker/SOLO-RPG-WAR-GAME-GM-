# Havoc Brothers - Grimdark Future
# Corrupted super-soldiers serving dark powers
# One Page Rules - Free Wargaming System

[faction]
name = "Havoc Brothers"
description = "Corrupted super-soldiers who have turned against humanity to serve dark powers"
playstyle = "Aggressive, elite, melee-focused with mutations"
difficulty = "intermediate"
strengths = [
    "Quality 3+ elite troops",
    "Excellent melee combat",
    "Powerful daemon engines",
    "Mutations and gifts",
    "Psychic support"
]
weaknesses = [
    "Expensive units",
    "Limited ranged options compared to Battle Brothers",
    "Random mutation effects",
    "Fewer vehicle options"
]
tactics = """
Havoc Brothers combine elite stats with aggressive playstyle. Your troops match Battle
Brothers in quality but favor melee. Use Daemon Princes and Lords to buff units. Daemon
Engines like Defilers provide heavy support while Possessed and Berzerkers tear through
enemies. Sorcerers provide psychic support. Push forward aggressively - your advantages
are in close combat. Accept that mutations can swing either way.
"""

