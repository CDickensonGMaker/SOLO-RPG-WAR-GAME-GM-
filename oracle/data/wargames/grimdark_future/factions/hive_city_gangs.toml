# Hive City Gangs - Grimdark Future
# Imperial Guard equivalents - masses of regular humans with tanks
# One Page Rules - Free Wargaming System

[faction]
name = "Hive City Gangs"
description = "Massive armies of regular humans backed by heavy armor and artillery"
playstyle = "Horde, combined arms, attrition"
difficulty = "intermediate"
strengths = [
    "Cheap troops enable massive armies",
    "Excellent tanks and artillery",
    "Orders system for flexibility",
    "Strong combined arms tactics",
    "Reliable leadership structure"
]
weaknesses = [
    "Individual models are weak",
    "Poor armor on infantry",
    "Morale can collapse quickly",
    "Quality 4+ limits accuracy"
]
tactics = """
Hive City Gangs win through overwhelming numbers and devastating firepower. Screen your
valuable tanks and artillery with expendable infantry. Use Officers to issue Orders that
dramatically improve unit effectiveness. Layer defenses - conscripts in front, veterans
behind, tanks and artillery supporting. Never fight fair - always have numerical or
firepower advantage. Accept casualties to achieve objectives.
"""

