# Robot Legions - Grimdark Future
# Ancient machine warriors rising from eons of slumber
# One Page Rules - Free Wargaming System

[faction]
name = "Robot Legions"
description = "Ancient machine warriors awakening to reclaim their galaxy"
playstyle = "Durable, slow, regenerating, elite"
difficulty = "intermediate"
strengths = [
    "Excellent defense across all units",
    "Regeneration heals wounds",
    "Fearless machines ignore morale",
    "Powerful ranged weapons",
    "Resurrection protocols return models"
]
weaknesses = [
    "Slow movement speed",
    "Expensive units",
    "Limited melee capability on most units",
    "Poor against massed attacks"
]
tactics = """
Robot Legions win through attrition. Your units don't stay dead - leverage Regeneration
and Resurrection Protocols to outlast enemies. Move deliberately toward objectives,
using your superior firepower to degrade enemy forces. Avoid getting charged - most
robots are poor in melee. Use Destroyers and Wraiths to threaten flanks while your
phalanx advances implacably. Focus fire to remove entire units before Regeneration
becomes irrelevant.
"""

