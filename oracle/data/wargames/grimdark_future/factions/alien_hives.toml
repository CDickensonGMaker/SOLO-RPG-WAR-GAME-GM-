# Alien Hives - Grimdark Future
# Endless swarms of bio-engineered monstrosities
# One Page Rules - Free Wargaming System

[faction]
name = "Alien Hives"
description = "Endless swarms of bio-engineered monstrosities consuming all in their path"
playstyle = "Horde, melee-focused, synapse network"
difficulty = "advanced"
strengths = [
    "Massive model counts",
    "Devastating melee combat",
    "Monsters provide synergy buffs",
    "Adaptation to any threat",
    "Regenerating monstrous creatures"
]
weaknesses = [
    "Limited ranged options",
    "Synapse dependency for morale",
    "Expensive monsters",
    "Vulnerable to template weapons"
]
tactics = """
Alien Hives overwhelm through numbers and evolution. Synapse creatures keep swarms in
line - losing them causes morale cascades. Lead with disposable gaunts to absorb fire,
then deliver Warriors and monsters into melee. Use Genestealers and Lictors for ambush
strikes. Monsters like Carnifexes and Hive Tyrants are force multipliers - protect them
while they buff nearby swarms. Overwhelm isolated units, avoid getting shot to pieces
in the open.
"""

# =============================================================================
