# =============================================================================

[[units]]
name = "Hive Tyrant"
type = "monster"
category = "hq"
points = 185
models = "1"
base_size = "60mm"
tactical_role = "monster_commander"
threat_level = "extreme"
priority_target = true
preferred_targets = ["infantry", "characters", "vehicles"]
avoid_targets = ["massed_anti_tank"]
weaknesses = ["focused_fire", "expensive"]
synergies = ["Synapse for morale", "Psychic powers", "Melee devastation"]
special_rules = ["Hero", "Fearless", "Tough(6)", "Synapse", "Psychic(2)"]
keywords = ["Monster", "Character", "Alien", "Synapse"]
notes = "Army centerpiece. Synapse keeps nearby units in line. Psychic(2) for multiple powers. Devastating in melee."

[units.stats]
quality = "3+"
defense = "3+"
tough = 6
movement = "8\""

[[units.weapons]]
name = "Bio-Cannon"
range = "18\""
shots = "6"
ap = "2"

[[units.weapons]]
name = "Massive Scything Talons"
range = "Melee"
shots = "6"
ap = "3"
special = ["Deadly(3)"]

[[units.upgrades]]
name = "Wings"
points = 25
effect = "Gains Flying, movement becomes 10\""

[[units.upgrades]]
name = "Lash Whip and Bonesword"
