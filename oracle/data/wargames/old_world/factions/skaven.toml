# =============================================================================
# FACTION SPECIAL RULES
# =============================================================================

[[faction_rules]]
name = "Strength in Numbers"
description = "Skaven units add their current rank bonus to their Leadership for Break tests (max +3)"

[[faction_rules]]
name = "Scurry Away!"
description = "Skaven characters can choose to flee from a challenge without penalty. They move to rear rank but suffer no honour loss"

[[faction_rules]]
name = "Verminous Valour"
description = "If a Skaven character in a unit would suffer an unsaved wound, they may allocate it to a rank-and-file model in the same unit on a 4+"

[[faction_rules]]
name = "Expendable"
description = "Skavenslave units do not cause Panic in other Skaven units. Other Skaven units may shoot into combats involving Skavenslaves"

[[faction_rules]]
name = "Life is Cheap"
description = "Warlords may order artillery to fire into combats involving Clanrats or Slaves. Roll to hit normally, then randomize hits between units"

[[faction_rules]]
name = "Warpstone Tokens"
description = "Grey Seers may consume Warpstone tokens. Each token adds +1 to casting roll but on a roll of 1 the Seer suffers a wound"

# =============================================================================
# FACTION MAGIC ITEMS
# =============================================================================

[[faction_items]]
name = "Fellblade"
type = "magic_weapon"
points = 100
description = "+1 Attack. For each hit, roll to wound. For each wound, roll another hit. Repeat until no wounds. Bearer takes D3 wounds (no saves) at end of combat"
restrictions = ["Skaven characters only"]

[[faction_items]]
name = "Warpforged Blade"
type = "magic_weapon"
