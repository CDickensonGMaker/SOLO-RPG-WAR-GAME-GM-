# Warhammer: The Old World - Skaven
# The Under-Empire of the ratmen, yes-yes!

[faction]
name = "Skaven"
description = "The Skaven are a race of chaos-tainted ratmen dwelling in a vast Under-Empire beneath the world. They combine overwhelming numbers with deadly warpstone technology and treacherous schemes"
playstyle = "Horde army with unreliable but devastating technology. Cheap troops with powerful special units"
strengths = ["Overwhelming numbers", "Devastating weapons", "Cheap units", "Assassins and weapon teams", "Magic"]
weaknesses = ["Cowardly", "Unreliable technology", "Low Leadership", "Units flee easily"]
lore_notes = "The Skaven worship the Great Horned Rat, a chaos god of pestilence and decay. They are divided into Great Clans that constantly scheme against each other"

