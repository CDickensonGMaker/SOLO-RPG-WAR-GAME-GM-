# =============================================================================
# FACTION SPECIAL RULES
# =============================================================================

[[faction_rules]]
name = "Undead"
description = "Immune to Psychology. Never flee. Cannot march outside of incantations. Unstable - if lose combat, take wounds equal to combat resolution difference (no saves)"

[[faction_rules]]
name = "Nehekhara Warriors"
description = "Units with this rule can be affected by the Righteous Smiting incantation for +1 Attack"

[[faction_rules]]
name = "My Will Be Done"
description = "Tomb King or Prince grants his WS to the unit he joins"

[[faction_rules]]
name = "The Curse"
description = "When a Tomb King or Prince is slain, the model that killed them takes D6 S5 hits"

[[faction_rules]]
name = "Hierophant"
description = "One Liche Priest must be the Hierophant. If slain, all Undead units immediately take D6 wounds per unit (no saves)"

[[faction_rules]]
name = "Animated Constructs"
description = "Constructs have a 5+ armor save and are affected by the Righteous Smiting incantation"

[[faction_rules]]
name = "Entombed Beneath the Sands"
description = "Unit deploys underground. From Turn 2 onwards, roll D6 in Movement phase: on 3+, unit emerges anywhere 1\" from terrain/enemy"

[[faction_rules]]
name = "Incantations"
description = "Lore of Nehekhara spells grant extra movement, extra attacks, and healing to Tomb Kings units"

