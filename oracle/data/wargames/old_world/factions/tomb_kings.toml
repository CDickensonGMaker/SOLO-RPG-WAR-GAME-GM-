# Warhammer: The Old World - Tomb Kings
# The Undying legions of Nehekhara, ancient kings risen to reclaim their glory

[faction]
name = "Tomb Kings"
description = "The ancient kings of Nehekhara who were mummified in death, now risen with their skeletal legions. Unlike Vampire Counts, Tomb Kings have constructs, chariots, and powerful incantations"
playstyle = "Combined arms undead with constructs, chariots, and archery. More mobile than Vampire Counts"
strengths = ["Immune to Psychology", "Construct monsters", "Mass chariots", "Incantation magic", "Multiple attacks through Nehekara"]
weaknesses = ["Cannot heal above starting models", "Crumble when Hierophant dies", "No march normally", "Relies on magic for extra attacks"]
lore_notes = "Nehekhara was the greatest human civilization until Nagash cursed the land. Now the Tomb Kings seek to restore their empire and punish those who disturb their tombs"

