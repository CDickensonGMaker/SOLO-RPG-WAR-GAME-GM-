# Warhammer: The Old World - Lizardmen
# The Servants of the Old Ones, guardians of the Great Plan

[faction]
name = "Lizardmen"
description = "The ancient servants of the Old Ones, created to fight Chaos. The Slann are the most powerful wizards, Saurus are born warriors, and Skinks are cunning skirmishers"
playstyle = "Combined arms with powerful magic, elite infantry, and devastating dinosaur monsters"
strengths = ["Most powerful wizards", "Very tough Saurus", "Powerful monsters", "Cold Blooded Leadership", "Predatory Fighter"]
weaknesses = ["Slow infantry", "Expensive", "Reliant on magic and monsters", "Limited ranged options"]
lore_notes = "The Lizardmen were created by the Old Ones to serve the Great Plan. The Slann Mage-Priests interpret the Plan while Saurus wage eternal war against Chaos"

