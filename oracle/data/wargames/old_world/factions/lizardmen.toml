# =============================================================================
# FACTION SPECIAL RULES
# =============================================================================

[[faction_rules]]
name = "Cold Blooded"
description = "May roll 3D6 for Leadership tests and discard the highest. Re-roll failed Panic tests"

[[faction_rules]]
name = "Predatory Fighter"
description = "For each 6 to hit in close combat, the model gains an additional attack (max 1 per model). These bonus attacks cannot generate further attacks"

[[faction_rules]]
name = "Scaly Skin"
description = "Natural armor save (varies by unit: Saurus 5+, Cold One riders 4+, Stegadon 3+, etc.)"

[[faction_rules]]
name = "Aquatic"
description = "Unit can move through water terrain as open ground. Treats rivers as open terrain"

[[faction_rules]]
name = "Disciplines of the Old Ones"
description = "Slann may take special abilities such as: Focused Rumination (re-roll one die), Higher State of Consciousness (Ethereal), The Becalming Cogitation (+1 to dispel)"

[[faction_rules]]
name = "Blessed Spawnings"
description = "Units may take Sacred Spawning upgrades granting additional abilities (Sotek, Tepok, Tlazcotl, etc.)"

