# Warhammer: The Old World - Wood Elves
# Guardians of Athel Loren, swift and deadly forest spirits

[faction]
name = "Wood Elves"
description = "The Asrai of Athel Loren are masters of guerilla warfare, striking from the shadows of their enchanted forest. They combine devastating archery with swift charges and forest spirits"
playstyle = "Fast, fragile glass cannon. Hit and run tactics with exceptional archery"
strengths = ["Best archers in the game", "Very mobile", "Forest Spirits", "Devastating ambushes", "Always Strikes First"]
weaknesses = ["Extremely fragile (T3, light armor)", "Low model count", "No anvil units", "Expensive"]
lore_notes = "The Wood Elves separated from their High Elf kin to dwell in Athel Loren. They exist in symbiosis with the forest spirits, defending the forest from all intruders"

