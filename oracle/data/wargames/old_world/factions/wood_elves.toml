# =============================================================================
# FACTION SPECIAL RULES
# =============================================================================

[[faction_rules]]
name = "Always Strikes First"
description = "Wood Elves strike at Initiative 10 in close combat. If their actual Initiative is 10+, they re-roll missed attacks"

[[faction_rules]]
name = "Forest Strider"
description = "Wood Elves treat all forests as open terrain. No dangerous terrain tests in forests"

[[faction_rules]]
name = "Forest Spirit"
description = "5+ ward save. Immune to Psychology. Flammable. Magical Attacks. Count as Causes Fear"

[[faction_rules]]
name = "Flammable"
description = "Double wounds from Flaming Attacks. Re-roll successful ward saves against Flaming Attacks"

[[faction_rules]]
name = "Shadow Dances"
description = "At the start of each combat, Wardancers choose a dance: +1 Attack, +1 to hit, Killing Blow, or 3+ ward save"

[[faction_rules]]
name = "Tree Singing"
description = "Can move forests D6\" in the Movement phase"

