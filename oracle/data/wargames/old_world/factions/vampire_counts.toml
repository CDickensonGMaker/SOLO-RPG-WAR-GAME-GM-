# =============================================================================
# FACTION SPECIAL RULES
# =============================================================================

[[faction_rules]]
name = "Undead"
description = "Immune to Psychology, Fear, Terror, Panic. Never flee. Cannot march unless within 12\" of General. Unstable - if lose combat, take wounds equal to combat resolution difference (no saves)"

[[faction_rules]]
name = "The General Must Be Vampiric"
description = "The army General must be a Vampire character"

[[faction_rules]]
name = "Vampiric"
description = "Can march within 12\" of General. The Hunger - recover 1 wound when causing unsaved wounds in close combat"

[[faction_rules]]
name = "Crumble"
description = "If the Vampiric General is slain, all Undead units take an immediate Leadership test. If failed, they take wounds equal to the amount failed by (no saves)"

[[faction_rules]]
name = "Invocation of Nehek"
description = "Signature spell of Lore of Vampires. Heals D6+caster level wounds to Undead units within range. Can resurrect dead models"

[[faction_rules]]
name = "Spectral Steeds"
description = "Black Knights' mounts are Ethereal. Unit ignores dangerous terrain tests"

# =============================================================================
# BLOODLINE POWERS
# =============================================================================

[[faction_items]]
name = "Red Fury"
type = "bloodline"
points = 50
description = "For each unsaved wound caused, immediately make another Attack. These bonus attacks can generate more attacks"
restrictions = ["Vampire characters only"]

[[faction_items]]
name = "Quickblood"
type = "bloodline"
points = 30
description = "Always Strikes First"
restrictions = ["Vampire characters only"]

[[faction_items]]
name = "Flying Horror"
type = "bloodline"
points = 30
description = "Vampire has Fly"
restrictions = ["Vampire characters only", "Cannot be mounted"]

[[faction_items]]
name = "Beguile"
type = "bloodline"
points = 25
description = "One enemy model in base contact must pass Leadership test at start of combat or is WS1 and cannot attack the Vampire"
restrictions = ["Vampire characters only"]

[[faction_items]]
name = "Aura of Dark Majesty"
type = "bloodline"
points = 25
description = "Enemies within 6\" are -1 Leadership"
restrictions = ["Vampire characters only"]

# =============================================================================
# FACTION MAGIC ITEMS
# =============================================================================

[[faction_items]]
name = "Nightshroud"
type = "magic_armor"
points = 50
description = "Heavy armor. Enemies in base contact have Always Strikes Last. Cannot be combined with shield"
restrictions = ["Vampire Counts characters only"]

[[faction_items]]
name = "Skabscrath"
type = "magic_weapon"
points = 35
description = "Flail. On any turn the bearer charges, all unsaved wounds are multiplied to D3 wounds"
restrictions = ["Vampire Counts characters only"]

[[faction_items]]
name = "The Cursed Book"
type = "arcane"
points = 60
description = "One use. All enemy wizards within 12\" must roll a D6. On 1-3, they forget one random spell"
restrictions = ["Vampire Counts Wizards only"]

[[faction_items]]
name = "Staff of Damnation"
type = "arcane"
points = 40
description = "Bound spell (Power Level 3). All friendly Undead units within 6\" can immediately make a 4\" move"
restrictions = ["Vampire Counts Wizards only"]

[[faction_items]]
name = "Banner of the Barrows"
type = "banner"
points = 50
description = "Grave Guard and Black Knights within 6\" gain +1 to hit in close combat"
restrictions = ["Wight King or unit standard bearer only"]
