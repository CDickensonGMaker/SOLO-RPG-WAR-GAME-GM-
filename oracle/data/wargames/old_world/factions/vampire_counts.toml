# Warhammer: The Old World - Vampire Counts
# The Undead legions of the night, led by immortal lords

[faction]
name = "Vampire Counts"
description = "The Undead legions of Sylvania and beyond, raised by the dark magic of Vampires. Endless hordes of zombies, skeletons, and terrifying creatures serve their immortal masters"
playstyle = "Attrition army with resurrection, Fear-causing units, and powerful characters"
strengths = ["Immune to Psychology", "Raise and heal units", "Powerful characters", "Fear/Terror", "No morale issues"]
weaknesses = ["Crumble when general dies", "Need Invocation constantly", "Vulnerable to magic phase denial", "No shooting"]
lore_notes = "Vampires were created when Nagash's elixir of immortality was stolen. Different bloodlines have unique characteristics. They raise armies from the dead to conquer the living"

