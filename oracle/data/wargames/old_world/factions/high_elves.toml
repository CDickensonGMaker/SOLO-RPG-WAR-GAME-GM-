# =============================================================================
# FACTION SPECIAL RULES
# =============================================================================

[[faction_rules]]
name = "Speed of Asuryan (Always Strikes First)"
description = "All High Elves have Always Strikes First. They strike at Initiative 10 in close combat. If their actual Initiative is 10 or higher, they re-roll failed to-hit rolls"

[[faction_rules]]
name = "Martial Prowess"
description = "High Elf units with spears fight in an additional rank (4 total instead of 3)"

[[faction_rules]]
name = "Valour of Ages"
description = "High Elf characters may re-roll failed Break tests"

[[faction_rules]]
name = "Lileath's Blessing"
description = "High Elf wizards gain +1 to cast and dispel attempts when using High Magic"

[[faction_rules]]
name = "High Magic"
description = "High Elves have access to High Magic - a versatile lore with offensive and defensive spells, including Drain Magic which removes all Remains in Play spells"

