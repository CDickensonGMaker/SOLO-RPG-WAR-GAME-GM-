# Warhammer: The Old World - High Elves
# The ancient Asur, masters of magic and martial prowess

[faction]
name = "High Elves"
description = "The High Elves of Ulthuan are an ancient and noble race, masters of magic and consummate warriors. They fight with speed, grace, and devastating precision"
playstyle = "Elite, low-model count army with exceptional magic and Always Strikes First"
strengths = ["Always Strikes First", "Best magic users", "Elite troops", "Dragon mounts", "Excellent archers"]
weaknesses = ["Expensive points cost", "Low model count", "Fragile (T3)", "Every loss hurts"]
lore_notes = "Ulthuan is an island continent ruled by the Phoenix King. High Elves are the eldest of the Elven kindreds, fighting an eternal war against Chaos"

