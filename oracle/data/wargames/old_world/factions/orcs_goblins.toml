# =============================================================================
# FACTION SPECIAL RULES
# =============================================================================

[[faction_rules]]
name = "Animosity"
description = "At the start of each Movement phase, units with Animosity must roll D6. On a 1, roll on Animosity table (may squabble, charge nearest enemy, or stand around arguing)"

[[faction_rules]]
name = "'Ere We Go!"
description = "Greenskins can re-roll charge distance dice once per charge"

[[faction_rules]]
name = "Choppa"
description = "Orcs fighting with choppas gain +1 Strength on the turn they charge"

[[faction_rules]]
name = "Size Matters"
description = "Orc Warbosses and Big Bosses can Quell Animosity in friendly Greenskin units within 6 inches"

[[faction_rules]]
name = "Backstabba"
description = "Goblins fighting enemies in the flank or rear gain +1 to hit"

[[faction_rules]]
name = "Da Big/Little Waaagh!"
description = "Orc and Goblin specific lores of magic that become more powerful when cast near large Greenskin units"

