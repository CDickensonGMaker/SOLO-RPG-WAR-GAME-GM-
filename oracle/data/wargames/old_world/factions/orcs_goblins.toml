# Warhammer: The Old World - Orcs and Goblins
# Da Greenskinz! WAAAGH!

[faction]
name = "Orcs & Goblins"
description = "A brutal horde of greenskins driven by the urge to fight. Orcs are brutal warriors while Goblins are cunning and treacherous. Together they form an unpredictable but devastating force"
playstyle = "Horde army with unpredictable Animosity. Cheap units with powerful monsters"
strengths = ["Cheap troops", "Powerful monsters", "Devastating charges", "Giant Waaagh! units"]
weaknesses = ["Animosity", "Low Leadership", "Unreliable", "Poor armor saves"]
lore_notes = "Greenskins reproduce by spores, emerging fully grown from the ground. They live only to fight, following brutal Warbosses in endless WAAAGH!"

