# Warhammer: The Old World - Warriors of Chaos
# The chosen of the Dark Gods, the ultimate warriors

[faction]
name = "Warriors of Chaos"
description = "The mortal followers of the Chaos Gods, transformed by their dark blessings into the ultimate warriors. Every Warrior is an elite combatant wrapped in daemonic armor"
playstyle = "Elite army of extremely powerful warriors. Small, expensive units that crush opposition in combat"
strengths = ["Best infantry in the game", "Excellent armor", "Powerful characters", "Chaos Marks", "Devastating charges"]
weaknesses = ["Very expensive points cost", "Few models", "Limited shooting", "No war machines", "Vulnerable to magic and ranged"]
lore_notes = "Warriors of Chaos come from the frozen north, marked by the four Dark Gods: Khorne (blood), Tzeentch (magic), Nurgle (plague), and Slaanesh (pleasure)"

