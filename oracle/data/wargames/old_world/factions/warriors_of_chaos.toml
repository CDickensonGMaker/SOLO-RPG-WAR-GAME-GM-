# =============================================================================
# MARKS OF CHAOS
# =============================================================================

[[faction_rules]]
name = "Mark of Khorne"
description = "Unit gains Frenzy and Magic Resistance (1). Cannot be taken by Wizards"
points = "+2-3 pts/model"

[[faction_rules]]
name = "Mark of Tzeentch"
description = "Unit gains +1 to ward saves (or 6+ if none). Wizards may re-roll one casting die"
points = "+2-3 pts/model"

[[faction_rules]]
name = "Mark of Nurgle"
description = "Enemy models have -1 to hit the unit in close combat"
points = "+2-3 pts/model"

[[faction_rules]]
name = "Mark of Slaanesh"
description = "Unit is Immune to Psychology. Always Strikes First in first round of combat"
points = "+1-2 pts/model"

# =============================================================================
# FACTION SPECIAL RULES
# =============================================================================

[[faction_rules]]
name = "Eye of the Gods"
description = "When a character kills an enemy character or monster in a challenge, roll on the Eye of the Gods table. Results range from Spawn transformation to Daemonhood"

[[faction_rules]]
name = "Chaos Armor"
description = "4+ armor save that cannot be combined with other armor (except shields)"

[[faction_rules]]
name = "Favour of the Gods"
description = "Chosen units roll on the Eye of the Gods table at the start of the battle"

[[faction_rules]]
name = "Will of Chaos"
description = "Chaos Warriors within 12\" of their General may use his Leadership. Battle Standard grants re-roll of Eye of the Gods rolls"

# =============================================================================
# FACTION MAGIC ITEMS
# =============================================================================

[[faction_items]]
name = "Hellfire Sword"
type = "magic_weapon"
points = 75
description = "Flaming Attacks. For each wound caused, roll D6: on 2+, target takes an additional wound (no saves). On 1, bearer takes a wound (no saves)"
restrictions = ["Chaos characters only"]

