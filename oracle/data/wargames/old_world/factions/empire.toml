# Warhammer: The Old World - The Empire
# The greatest nation of mankind, defended by faith, steel, and gunpowder

[faction]
name = "The Empire"
description = "The greatest nation of mankind, defended by faith, steel, and gunpowder. The Empire combines disciplined state troops, powerful artillery, elite knightly orders, and battle wizards into a formidable combined arms force"
playstyle = "Combined arms with artillery, cavalry, and infantry working in concert"
strengths = ["Versatile army composition", "Excellent shooting and artillery", "Access to all Lores of Magic", "Powerful cavalry", "Steam tanks"]
weaknesses = ["Average individual troop quality", "Requires combined arms tactics", "No single dominant unit type", "Relies on synergy between units"]
lore_notes = "Founded by Sigmar Heldenhammer, the Empire is a confederation of provinces ruled by Elector Counts, united under the Emperor"

