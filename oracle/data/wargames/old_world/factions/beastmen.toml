# Warhammer: The Old World - Beastmen
# The Children of Chaos, the beasts that walk as men

[faction]
name = "Beastmen"
description = "The twisted offspring of Chaos, beasts that walk as men. They infest the wild places of the world, emerging to despoil civilization in the name of the Dark Gods"
playstyle = "Aggressive ambush army. Fast, hard-hitting units that strike from the shadows"
strengths = ["Ambush deployment", "Fast infantry", "Hard-hitting charges", "Primal Fury", "Minotaurs and monsters"]
weaknesses = ["Low Leadership", "Poor armor", "Limited ranged options", "Fragile against sustained combat"]
lore_notes = "Beastmen are Chaos-twisted creatures born when Chaos energy warps humans or animals. They worship the Dark Gods and seek to tear down the works of civilization"

