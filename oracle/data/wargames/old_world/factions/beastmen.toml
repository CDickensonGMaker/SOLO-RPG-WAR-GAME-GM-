# =============================================================================
# FACTION SPECIAL RULES
# =============================================================================

[[faction_rules]]
name = "Primal Fury"
description = "At the start of each Close Combat phase, units with Primal Fury take a Leadership test. If passed, the unit gains Hatred for that phase. If passed by more than the Leadership value needed, also gains +1 Attack"

[[faction_rules]]
name = "Beastman Ambush"
description = "Up to half the army's units (by number, not points) can be held in Ambush. From Turn 2 onwards, roll D6 for each ambushing unit: on 3+, it arrives from any table edge"

[[faction_rules]]
name = "Bloodgreed"
description = "For each unsaved wound caused in close combat, the model must take a Leadership test. If failed, it gains Frenzy for the rest of the game"

[[faction_rules]]
name = "Despoilers"
description = "Bestigors may re-roll failed Primal Fury tests"

[[faction_rules]]
name = "Mark of Chaos"
description = "Like Warriors of Chaos, Beastman characters may take Marks of Chaos"

[[faction_rules]]
name = "Drunken"
description = "Centigors must test for Stupidity unless within 12\" of a Beastman character"

