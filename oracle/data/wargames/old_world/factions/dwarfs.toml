# Warhammer: The Old World - Dwarfs
# Ancient mountain folk with grudges older than human memory

[faction]
name = "Dwarfs"
description = "The Dwarfs are an ancient and proud race who dwell in mountain strongholds. Master craftsmen and warriors, they maintain the Book of Grudges recording every wrong done to their kind"
playstyle = "Defensive gunline with stubborn infantry and powerful artillery. Grind enemies down"
strengths = ["Excellent shooting and artillery", "Very tough infantry", "Runic magic items", "Immune to Psychology on Lords/Heroes", "High Leadership"]
weaknesses = ["Slow movement (M3)", "No cavalry", "No wizards", "Limited mobility", "Vulnerable to fast armies"]
lore_notes = "The Karaz Ankor (Dwarf empire) once spanned the World's Edge Mountains. Now reduced, Dwarfs fight to reclaim lost holds and settle ancient grudges"

