# =============================================================================
# FACTION SPECIAL RULES
# =============================================================================

[[faction_rules]]
name = "Ancestral Grudge"
description = "Dwarfs have Hatred against Orcs and Goblins. Characters may purchase additional grudges against specific factions"

[[faction_rules]]
name = "Resolute"
description = "Dwarfs may not pursue or overrun more than D6\" regardless of other factors"

[[faction_rules]]
name = "Relentless"
description = "Dwarfs do not suffer penalties for moving and shooting with crossbows and handguns (but still cannot march and shoot)"

[[faction_rules]]
name = "Shieldwall"
description = "Units with shields in base contact with rank bonus of +1 or more gain +1 to armor saves against attacks to the front"

[[faction_rules]]
name = "Runesmith/Runelord"
description = "Grants Magic Resistance (1) to unit. May attempt to dispel one spell per turn as if it were a Level 2/3 wizard. Can craft Runic items"

[[faction_rules]]
name = "Slayer"
description = "Slayers have Ward Save (4+) against wounds caused by monsters or characters. Cannot wear armor"

[[faction_rules]]
name = "Deathwish"
description = "Slayers are Unbreakable. Must always pursue. Must always issue and accept challenges"

