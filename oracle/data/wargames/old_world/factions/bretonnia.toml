# =============================================================================
# FACTION SPECIAL RULES
# =============================================================================

[[faction_rules]]
name = "Blessing of the Lady"
description = "At deployment, declare if your army prays. If it does, all units with this rule gain a 6+ ward save (5+ vs Strength 5+ attacks), but enemy gets +1 to first turn roll"

[[faction_rules]]
name = "Lance Formation"
description = "Knight units fight in lance formation. A character in the front rank fights with +2 Strength (not just +1) when charging. The unit may adopt wedge formation for bonuses"

[[faction_rules]]
name = "The Knight's Vow"
description = "Knights may never flee as a charge reaction if they would flee through peasants. Knights and characters with this rule must issue and accept challenges"

[[faction_rules]]
name = "The Questing Vow"
description = "As Knight's Vow, plus may not use lances and are Immune to Psychology"

[[faction_rules]]
name = "The Grail Vow"
description = "As Questing Vow, plus Magic Resistance (2)"

[[faction_rules]]
name = "Peasant's Duty"
description = "Peasant units use the General's Leadership only if within 6 inches. If all Knights flee, peasants must test for Panic"

[[faction_rules]]
name = "Impetuous"
description = "Knights Errant must declare a charge against the nearest visible enemy if able to do so. Re-roll failed Panic tests"

# =============================================================================
# VIRTUES (Character Upgrades)
# =============================================================================

[[faction_items]]
name = "Virtue of the Ideal"
type = "virtue"
points = 50
description = "+1 Weapon Skill, +1 Initiative, +1 Attack for each character you kill in a challenge"
restrictions = ["Bretonnian Lords and Paladins only"]

[[faction_items]]
name = "Virtue of Heroism"
type = "virtue"
points = 45
description = "Always wound monsters and characters on 2+ in close combat. Heroic Killing Blow against such targets"
restrictions = ["Bretonnian Lords and Paladins only"]

[[faction_items]]
