# Warhammer: The Old World - Bretonnia
# The chivalric realm of knights and the Lady of the Lake

[faction]
name = "Bretonnia"
description = "A feudal kingdom of knights sworn to the Lady of the Lake. Bretonnian armies are built around devastating cavalry charges and the blessing of their goddess"
playstyle = "Heavy cavalry focus with peasant support. Devastating lance formations"
strengths = ["Best cavalry in the game", "Blessing of the Lady (ward saves)", "Multiple lances per army", "Devastating Charge"]
weaknesses = ["Weak infantry", "Limited shooting", "No war machines", "Reliant on the charge"]
lore_notes = "Bretonnia is a land of noble knights and downtrodden peasants, where chivalric ideals mask feudal oppression. Knights seek the Grail to become immortal Grail Knights"

