# Trench Crusade - Heretic Legion
# The armies of Hell - demons, corrupted soldiers, and unholy war machines

name = "Heretic Legion"
allegiance = "Fallen"
description = "The main fighting force of Hell on Earth. Corrupted soldiers fight alongside demons and witches, bringing damnation to the faithful. Straightforward but devastatingly effective."
playstyle = "Honest and straightforward - few tricks but plays the game very well. Independent units requiring minimal synergies. Excellent for beginners."
strengths = ["Strong independent units", "Artillery Witch support", "War Wolf assault beasts", "Beginner friendly"]
weaknesses = ["Limited tricks", "Predictable", "Holy weapons"]

[faction_rules]
name = "Servants of Hell"
description = "Heretic Legion units operate independently with minimal need for synergies. Each unit is effective on its own."

