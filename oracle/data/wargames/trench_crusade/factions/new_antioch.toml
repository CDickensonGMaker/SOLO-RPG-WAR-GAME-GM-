# Trench Crusade - Principality of New Antioch
# Human soldiers of the faithful armed with industrial-age weaponry

name = "Principality of New Antioch"
allegiance = "Faithful"
description = "The last Crusader state, New Antioch fields armies of mortal soldiers bolstered by faith and firepower. Though individually weak, their coordination and arsenal make them deadly."
playstyle = "Combined arms with Fireteams - squishy but efficient. Squeeze every bit of value from your vast arsenal of weapons."
strengths = ["Fireteam coordination", "Weapon variety", "Blood Bath at 3 markers", "Flexibility"]
weaknesses = ["Fragile individual models", "Dependent on synergies", "Low base stats"]

[faction_rules]
name = "Fireteams"
description = "Two units can activate together as a Fireteam. Blood Bath triggers at 3 markers instead of 6 when attacking together."

