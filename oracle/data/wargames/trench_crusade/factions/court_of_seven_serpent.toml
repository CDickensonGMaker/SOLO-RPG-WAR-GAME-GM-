# Trench Crusade - Court of the Seven-Headed Serpent
# Elite demons wielding Goetic magic and commanding Sin-aspects

name = "Court of the Seven-Headed Serpent"
allegiance = "Fallen"
description = "The aristocracy of Hell itself. These greater demons command Goetic spells and bring the Seven Deadly Sins made manifest to the battlefield. Elite, expensive, and devastatingly powerful."
playstyle = "Small elite warband with powerful Goetic spells. Each Sin variant offers unique abilities. Quality over quantity - every model is a significant threat."
strengths = ["Powerful Goetic spells", "Elite stats across the board", "Sin-variant specializations", "Terrifying presence"]
weaknesses = ["Very expensive", "Low model count", "Vulnerable to holy weapons", "Reliant on spellcasting"]

[faction_rules]
name = "Goetic Hierarchy"
description = "Court units can cast Goetic Spells. Higher-ranked demons have access to more powerful magic. Sin variants gain unique abilities based on their aspect."

