# Trench Crusade - Trench Pilgrims
# Fanatical faithful who seek martyrdom in the name of God

name = "Trench Pilgrims"
allegiance = "Faithful"
description = "Common folk transformed by holy visions, the Trench Pilgrims march into the meat grinder of war seeking glorious martyrdom. Their faith makes them nearly impossible to break."
playstyle = "Melee-focused berserkers who can dish out incredible damage while taking a beating. Immune to fear and able to resurrect fallen warriors."
strengths = ["Devastating melee", "Fear immunity", "Martyrdom resurrection", "High durability"]
weaknesses = ["Limited ranged options", "Slow advance", "Reliant on reaching combat"]

[faction_rules]
name = "Martyrs of the Faith"
description = "Trench Pilgrims are immune to Fear abilities. Slain Martyr Penitents may be resurrected on a successful roll."

