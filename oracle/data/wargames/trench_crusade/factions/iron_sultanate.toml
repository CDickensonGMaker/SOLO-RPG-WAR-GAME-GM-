# Trench Crusade - Iron Sultanate
# Alchemists and artificers who create life from bronze and flame

name = "Iron Sultanate"
allegiance = "Faithful"
description = "Masters of alchemy and artifice, the Iron Sultanate creates artificial warriors and wields strange alchemical ammunition. Their constructs march alongside mortal soldiers."
playstyle = "Versatile faction excelling at all ranges, especially mid-to-long range firepower with alchemical ammunition. Fast artificial bruisers like the Lion of Jahbir provide melee punch."
strengths = ["Range flexibility", "Alchemical ammunition", "Artificial constructs", "Strong shooting"]
weaknesses = ["Expensive units", "Construct reliance", "Vulnerability to anti-armor"]

[faction_rules]
name = "Alchemical Artifice"
description = "The Iron Sultanate can field artificial life - constructs like the Lion of Jahbir and Brazen Bull. Alchemical ammunition provides special effects."

