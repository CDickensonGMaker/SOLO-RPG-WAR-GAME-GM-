# Trench Crusade - Cult of the Black Grail
# Vampiric knights who spread infection and corruption

name = "Cult of the Black Grail"
allegiance = "Fallen"
description = "Once noble knights who drank from a cursed grail, these vampiric warriors spread corruption through infection. They march in towering stilts through no-man's land, spreading plague."
playstyle = "Aggressive melee with unique Infection Marker mechanics. Infect enemies to weaken them, then finish them off with your elite Grail Knights."
strengths = ["Infection Markers weaken enemies", "Durable Grail Knights", "Stilt Walkers ignore terrain", "Vampiric regeneration"]
weaknesses = ["Vulnerable to holy weapons", "Expensive elite units", "Few ranged options"]

[faction_rules]
name = "The Spreading Corruption"
description = "Cult units can inflict Infection Markers on enemies. Infected models suffer penalties to rolls. At 3+ markers, they must test or become Corrupted."

# =============================================================================
# CHARACTERS / LEADERS
# =============================================================================

[[units]]
name = "Grail Knight"
type = "infantry"
category = "HQ"
points = 80
models = "1"
tactical_role = "elite_assault"
threat_level = "very_high"
preferred_targets = ["characters", "elite_infantry"]
weaknesses = ["holy_weapons", "massed_fire", "fire"]
special_rules = ["Leader", "Vampiric", "Infection", "Regeneration", "Fearless"]
keywords = ["Infantry", "Character", "Vampire", "Fallen", "Knight"]

[units.stats]
Movement = 6
Ranged = "5+"
Melee = "2+"
Defense = "3+"
Wounds = 3

