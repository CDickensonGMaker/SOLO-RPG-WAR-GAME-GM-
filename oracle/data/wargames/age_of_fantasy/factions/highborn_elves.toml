# Highborn Elves - Age of Fantasy
# Ancient and noble elven warriors with powerful magic
# One Page Rules - Free Wargaming System

[faction]
name = "Highborn Elves"
description = "Ancient and noble elven warriors wielding powerful magic and superior craftsmanship"
playstyle = "Elite, mobile, magical"
difficulty = "intermediate"
strengths = [
    "High quality troops (3+ common)",
    "Excellent archers",
    "Powerful magic",
    "Fast and mobile",
    "Elite cavalry and monsters"
]
weaknesses = [
    "Expensive units",
    "Low model count",
    "Fragile when caught",
    "Dependent on careful positioning"
]
tactics = """
Highborn Elves win through precision and mobility. Your troops are elite but expensive,
so every model counts. Use superior range and magic to weaken enemies before engaging.
Cavalry and Dragon Princes deliver devastating charges. Phoenix Guard and Swordmasters
anchor the line. Always Strike First gives you the edge in combat. Avoid getting bogged
down in attrition - you cannot afford to trade equally.
"""

