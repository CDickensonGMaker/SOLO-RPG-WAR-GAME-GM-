[[units]]
name = "High Prince"
type = "infantry"
category = "hq"
points = 100
models = "1"
base_size = "25mm"
tactical_role = "combat_commander"
threat_level = "very_high"
priority_target = true
preferred_targets = ["infantry", "characters"]
avoid_targets = ["monsters"]
weaknesses = ["assassination", "focus_fire"]
synergies = ["Boosts nearby units", "Combat monster"]
special_rules = ["Hero", "Fearless", "Tough(3)"]
keywords = ["Infantry", "Character", "Elf"]
notes = "Combat lord. Attach to elite units for maximum effect. Can ride various mounts."

[units.stats]
quality = "3+"
defense = "4+"
tough = 3
movement = "6\""

[[units.weapons]]
name = "Great Weapon"
