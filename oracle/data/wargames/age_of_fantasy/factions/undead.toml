description = "Friendly Undead unit within 12\" may immediately move up to 6\" or charge"

[[units.spells]]
name = "Gaze of Nagash"
level = 2
description = "Target enemy unit within 24\" takes 2D6 hits with AP(2)"

[[units.upgrades]]
