# Undead - Age of Fantasy
# Legions of the dead led by powerful necromancers
# One Page Rules - Free Wargaming System

[faction]
name = "Undead"
description = "Legions of the risen dead led by powerful necromancers and vampire lords"
playstyle = "Horde, attrition, fearless"
difficulty = "intermediate"
strengths = [
    "Fearless troops ignore morale",
    "Summon and regenerate units",
    "Large numbers of cheap troops",
    "Powerful characters",
    "Monsters and heavy cavalry"
]
weaknesses = [
    "Low quality troops",
    "Crumble when general dies",
    "Weak armor on hordes",
    "Reliant on magic"
]
tactics = """
Undead win through overwhelming numbers and attrition. Your troops are weak individually
but fearless and renewable. Necromancers keep raising fallen troops while Vampire Lords
dominate in combat. Screen with Skeletons and Zombies, deliver killing blows with Grave
Guard and Blood Knights. Protect your general at all costs - if they die, your army
crumbles. Magic is essential - Necromancy keeps your army refreshed.
"""

