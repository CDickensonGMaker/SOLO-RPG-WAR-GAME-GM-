[[units]]
name = "Vampire Lord"
type = "infantry"
category = "hq"
points = 200
models = "1"
base_size = "25mm"
tactical_role = "combat_lord"
threat_level = "extreme"
priority_target = true
preferred_targets = ["everything"]
avoid_targets = ["nothing"]
weaknesses = ["focused_magic", "assassination"]
synergies = ["Combat monster", "Magic support", "Regeneration"]
special_rules = ["Hero", "Fearless", "Tough(4)", "Wizard(2)", "Regeneration"]
keywords = ["Infantry", "Character", "Undead", "Vampire"]
notes = "Combat and magic monster. Regeneration keeps him fighting. General of army."

[units.stats]
quality = "3+"
defense = "4+"
tough = 4
movement = "6\""

[[units.weapons]]
name = "Cursed Blade"
range = "Melee"
shots = "6"
ap = "2"
special = ["Deadly(3)"]

[[units.spells]]
name = "Invocation of Nehek"
level = 1
description = "Friendly Undead unit within 18\" recovers D3 wounds or D3 slain models"

[[units.spells]]
