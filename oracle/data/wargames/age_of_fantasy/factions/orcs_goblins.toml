# =============================================================================
# ANIMOSITY TABLE
# =============================================================================

[animosity]
description = "At the start of each activation, roll D6 for units with Animosity"

[[animosity.results]]
roll = "1"
effect = "Squabble"
description = "Unit fights itself. Each model takes a hit at AP(0). Cannot act this turn."

[[animosity.results]]
roll = "2-5"
effect = "Normal"
description = "Unit acts normally"

[[animosity.results]]
roll = "6"
effect = "WAAAGH!"
description = "Unit may immediately make a free charge move toward nearest enemy"

