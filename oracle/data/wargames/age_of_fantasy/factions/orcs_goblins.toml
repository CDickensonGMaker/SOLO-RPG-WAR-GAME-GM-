# Orcs and Goblins - Age of Fantasy
# Savage greenskin hordes united by the WAAAGH!
# One Page Rules - Free Wargaming System

[faction]
name = "Orcs and Goblins"
description = "Savage greenskin hordes united by strength and the endless WAAAGH!"
playstyle = "Aggressive horde, chaotic, fun"
difficulty = "beginner"
strengths = [
    "Cheap troops for masses",
    "Strong melee combat",
    "Powerful monsters",
    "Fun random elements",
    "Animosity adds character"
]
weaknesses = [
    "Poor shooting (Quality 5+)",
    "Animosity can backfire",
    "Limited magic",
    "Poor armor on goblins"
]
tactics = """
Orcs and Goblins win through overwhelming aggression. Your troops are cheap and numerous -
use hordes to swamp enemies. Orcs provide the hitting power, Goblins provide numbers.
Use Warbosses to lead from the front. Trolls and Giants add monster punch. Animosity can
cause your units to fight each other, but also provides bonus charges. Accept the chaos
and ride the WAAAGH!
"""

