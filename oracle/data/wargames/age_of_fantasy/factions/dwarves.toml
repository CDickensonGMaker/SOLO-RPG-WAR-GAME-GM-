# =============================================================================

[[units]]
name = "Dwarf Lord"
type = "infantry"
category = "hq"
points = 100
models = "1"
base_size = "25mm"
tactical_role = "combat_commander"
threat_level = "very_high"
priority_target = true
preferred_targets = ["infantry", "monsters"]
avoid_targets = ["nothing"]
weaknesses = ["isolation", "magic"]
synergies = ["Inspiration to nearby units", "Combat anchor"]
special_rules = ["Hero", "Fearless", "Tough(4)", "Slow"]
keywords = ["Infantry", "Character", "Dwarf"]
notes = "Tough(4) and excellent armor makes him nearly unkillable. Lead from the front."

[units.stats]
quality = "3+"
defense = "3+"
tough = 4
movement = "4\""

[[units.weapons]]
name = "Great Hammer"
range = "Melee"
shots = "5"
ap = "3"
special = ["Deadly(3)"]

[[units.upgrades]]
