# Dwarves - Age of Fantasy
# Stubborn mountain warriors with superior craftsmanship
# One Page Rules - Free Wargaming System

[faction]
name = "Dwarves"
description = "Stubborn mountain warriors renowned for superior craftsmanship and unbreakable resolve"
playstyle = "Defensive, durable, artillery-focused"
difficulty = "beginner"
strengths = [
    "Excellent armor (Defense 4+ baseline)",
    "Superior artillery and war machines",
    "Fearless and Stubborn troops",
    "Rune magic for flexibility",
    "Very durable infantry"
]
weaknesses = [
    "Slow movement (4\" baseline)",
    "Limited cavalry options",
    "Poor magic offense",
    "Expensive units"
]
tactics = """
Dwarves win through firepower and attrition. Your troops are slow but incredibly durable.
Set up strong gunlines with overlapping fields of fire. Use war machines to devastate enemies
as they approach. Ironbreakers and Hammerers anchor the line while Thunderers and artillery
thin the enemy. Accept that you cannot maneuver - make them come to you and punish them for it.
Rune magic provides flexibility for various situations.
"""

# =============================================================================
