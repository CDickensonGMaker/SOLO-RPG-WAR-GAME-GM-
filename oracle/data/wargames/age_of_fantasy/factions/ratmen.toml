# Ratmen - Age of Fantasy
# Scheming vermin with mad science and endless numbers
# One Page Rules - Free Wargaming System

[faction]
name = "Ratmen"
description = "Scheming vermin combining endless numbers with mad science and dark sorcery"
playstyle = "Horde, shooting, unreliable but powerful"
difficulty = "advanced"
strengths = [
    "Massive numbers of cheap troops",
    "Devastating war machines",
    "Powerful but risky weapons",
    "Strong magic",
    "Assassination specialists"
]
weaknesses = [
    "Poor individual quality",
    "Cowardly - bad morale",
    "Unreliable technology",
    "Expensive specialists"
]
tactics = """
Ratmen win through overwhelming numbers and devastating technology. Clanrats and Slaves
are expendable - use them to screen your valuable weapons teams and war machines. Warpfire
throwers and ratling guns devastate infantry. Plague Monks and Stormvermin provide melee
punch. Grey Seers rain magical destruction. Accept losses - you have infinite rats. The
key is protecting your damage dealers until they can unleash.
"""

