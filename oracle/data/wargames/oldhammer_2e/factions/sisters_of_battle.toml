# =============================================================================
# ACTS OF FAITH
# =============================================================================

[[acts_of_faith]]
name = "Spirit of the Martyr"
description = "When a model is slain, roll a D6. On a 5+, the model may make a single attack or shoot before being removed"
point_cost = 0

[[acts_of_faith]]
name = "The Passion"
description = "Unit may pile in and fight again at the end of the Fight phase"
point_cost = 1

[[acts_of_faith]]
name = "Hand of the Emperor"
description = "Add 1 to the unit's Strength characteristic until the end of the turn"
point_cost = 1

[[acts_of_faith]]
name = "Light of the Emperor"
description = "Unit automatically passes Morale and Pinning tests until the end of the turn"
point_cost = 1

[[acts_of_faith]]
name = "Divine Guidance"
description = "Unit's weapons wound on a 6 regardless of target's Toughness, and ignore armor saves"
point_cost = 2
