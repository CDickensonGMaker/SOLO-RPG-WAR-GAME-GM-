# Warhammer 40,000 2nd Edition - Sisters of Battle
# The Adepta Sororitas - Daughters of the Emperor

name = "Sisters of Battle"
codex = "Codex: Sisters of Battle (1997)"
description = "The militant arm of the Ecclesiarchy, fanatically devoted warrior-nuns wielding holy fire"
playstyle = "Elite infantry with powerful flamers, meltas, and faith-based abilities"
strengths = ["Acts of Faith", "Excellent special weapons", "High Leadership", "Flamers and Meltas", "Stubborn devotion"]
weaknesses = ["No psykers", "Limited heavy armor", "Expensive infantry"]

[faction_rules]
name = "Acts of Faith"
description = "Sisters may perform miraculous Acts of Faith, powered by their unwavering devotion to the Emperor"

