# Warhammer 40,000 2nd Edition - Orks
# Da Green Tide - WAAAGH!

name = "Orks"
codex = "Codex: Orks (1994)"
description = "Green-skinned fungal warriors who live for war and believe the color red makes things go faster"
playstyle = "Overwhelming numbers, close combat focus, unreliable but devastating shooting"
strengths = ["Massive numbers", "Strong in close combat", "Mob Rule", "Cheap units", "Hilarious randomness"]
weaknesses = ["Poor Ballistic Skill", "Unreliable equipment", "Low Leadership in small groups"]

[faction_rules]
name = "Mob Rule"
description = "Ork units use their number of models for Leadership tests instead of their actual Leadership"

