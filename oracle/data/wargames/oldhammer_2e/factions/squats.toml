# Warhammer 40,000 2nd Edition - Squats
# The Leagues of Votann (Classic Squats) - The Forgotten Abhuman Kin

name = "Squats"
codex = "White Dwarf Articles / 2nd Edition Squat Army List"
description = "Short, sturdy abhumans from high-gravity mining worlds, masters of technology and grudge-keeping"
playstyle = "Durable infantry with excellent vehicles, strong shooting, and engineering expertise"
strengths = ["High Toughness", "Excellent technology", "Strong guild organization", "Hatred of Orks", "Superior engineering"]
weaknesses = ["Slow movement", "Low numbers", "Short range preferences"]

[faction_rules]
name = "The Book of Grudges"
description = "Squats never forget a slight. +1 to hit against enemies who have wronged the Hold"

