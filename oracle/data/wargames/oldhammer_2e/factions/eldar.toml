# Warhammer 40,000 2nd Edition - Eldar
# The Aeldari - Ancient Masters of War

name = "Eldar"
codex = "Codex: Eldar (1994)"
description = "Ancient, psychically gifted aliens fighting to preserve their dying race through tactical excellence"
playstyle = "Specialist units with extreme mobility and devastating alpha strikes"
strengths = ["High Initiative", "Excellent mobility", "Powerful psykers", "Specialist Aspect Warriors"]
weaknesses = ["Fragile units", "Expensive points costs", "Relies on synergy"]

[faction_rules]
name = "Path of the Warrior"
description = "Eldar follow Paths of specialization, making each Aspect Warrior supreme in their chosen role"

