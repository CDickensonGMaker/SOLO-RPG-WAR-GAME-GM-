# Warhammer 40,000 2nd Edition - Chaos Space Marines
# The Traitor Legions - Slaves to Darkness

name = "Chaos Space Marines"
codex = "Codex: Chaos (1996)"
description = "Once-noble Space Marines corrupted by the Ruinous Powers, now twisted champions of Chaos"
playstyle = "Corrupted elite infantry with daemonic support and powerful characters"
strengths = ["Marine stats", "Powerful characters", "Daemon support", "Marks of Chaos", "Veterans of the Long War"]
weaknesses = ["Internal rivalry", "Expensive with upgrades", "No Chapter Tactics equivalent"]

[faction_rules]
name = "Marks of Chaos"
description = "Chaos units can be dedicated to one of the four Chaos Gods, gaining unique abilities"

