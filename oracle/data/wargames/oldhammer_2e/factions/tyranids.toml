# Warhammer 40,000 2nd Edition - Tyranids
# The Great Devourer - Hive Fleet Behemoth

name = "Tyranids"
codex = "Codex: Tyranids (1995)"
description = "Extragalactic swarms of bio-engineered monstrosities driven by the Hive Mind to consume all biomass"
playstyle = "Overwhelming numbers with monstrous creatures, synapse-dependent swarms"
strengths = ["Massive numbers", "Powerful monsters", "Regeneration", "Adaptation", "Synapse immunity to morale"]
weaknesses = ["Synapse dependence", "Limited shooting", "Instinctive Behavior without Synapse"]

[faction_rules]
name = "Synapse"
description = "Units within 12 inches of a Synapse creature are immune to morale effects. Without Synapse, lesser creatures revert to instinctive behavior"

