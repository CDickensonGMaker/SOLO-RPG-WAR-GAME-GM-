# Warhammer 40,000 2nd Edition - Space Marines
# The Adeptus Astartes - The Emperor's Finest

name = "Space Marines"
codex = "Codex: Space Marines (1993)"
description = "Genetically enhanced super-soldiers clad in power armor, the Space Marines are humanity's greatest defenders"
playstyle = "Elite combined arms with excellent stats across the board"
strengths = ["High stats across the board", "Excellent armor saves", "Versatile units", "And They Shall Know No Fear"]
weaknesses = ["Expensive points cost", "Low model count", "Limited numbers"]

[faction_rules]
name = "And They Shall Know No Fear"
description = "Space Marines automatically rally and cannot be destroyed by fall back moves"

