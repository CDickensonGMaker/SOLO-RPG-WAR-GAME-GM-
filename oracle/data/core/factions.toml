# Factions - Faction interactions, politics, and organizational dynamics
# Setting-agnostic faction elements for any genre
# Weight: higher = more common (1-3 typical range)

[faction_attitudes]
# How a faction views the characters or other factions
entries = [
  # Hostile Range
  { text = "Openly hostile - attacks on sight", weight = 1 },
  { text = "Hostile - active opposition and sabotage", weight = 1 },
  { text = "Antagonistic - works against you behind scenes", weight = 2 },
  { text = "Unfriendly - refuses cooperation, warns others", weight = 2 },
  { text = "Suspicious - grudging minimal dealings", weight = 2 },
  { text = "Wary - cautious and guarded interactions", weight = 2 },

  # Neutral Range
  { text = "Neutral - pure business, no personal investment", weight = 3 },
  { text = "Indifferent - ignores you unless forced to engage", weight = 3 },
  { text = "Pragmatic - judges each interaction on its merits", weight = 2 },
  { text = "Watchful - observing to determine stance", weight = 2 },
  { text = "Cautiously open - willing to talk but uncommitted", weight = 2 },

  # Friendly Range
  { text = "Favorable - willing to help within reason", weight = 2 },
  { text = "Friendly - active goodwill and support", weight = 2 },
  { text = "Supportive - provides resources and aid", weight = 1 },
  { text = "Allied - trusted partners, shared goals", weight = 1 },
  { text = "Devoted - complete loyalty and commitment", weight = 1 },

  # Complex Attitudes
  { text = "Complicated - mix of friendly and hostile feelings", weight = 2 },
