# =============================================================================
# REACTIONS.TOML - Universal NPC/Enemy Reaction Tables
# =============================================================================
# How characters respond to player actions, presence, and stimuli.
# Weights determine relative frequency (higher = more common).
# =============================================================================

# -----------------------------------------------------------------------------
# HOSTILE REACTIONS - When NPCs are actively antagonistic
# -----------------------------------------------------------------------------
[hostile_reactions]
entries = [
  # Immediate aggression
  { text = "Attacks immediately without hesitation", weight = 3 },
  { text = "Lunges forward with a guttural war cry", weight = 2 },
  { text = "Opens fire without warning", weight = 2 },
  { text = "Charges recklessly, weapon raised", weight = 2 },
  { text = "Hurls the nearest object as a weapon", weight = 1 },

  # Tactical responses
  { text = "Calls for reinforcements", weight = 2 },
  { text = "Attempts to flank and surround", weight = 2 },
  { text = "Retreats to better defensive position", weight = 2 },
  { text = "Takes cover and returns fire", weight = 2 },
  { text = "Signals allies with a coded gesture", weight = 1 },
  { text = "Splits from group to create crossfire", weight = 1 },
  { text = "Falls back to choke point", weight = 1 },
  { text = "Attempts to cut off escape routes", weight = 1 },
  { text = "Moves to protect something valuable", weight = 1 },
  { text = "Creates a distraction while others maneuver", weight = 1 },

  # Deceptive tactics
  { text = "Feigns surrender, plans ambush", weight = 1 },
  { text = "Pretends to flee, leads into trap", weight = 1 },
  { text = "Fakes injury to draw you closer", weight = 1 },
  { text = "Offers parley while allies circle around", weight = 1 },
  { text = "Throws down weapon, reaches for hidden one", weight = 1 },

  # Intimidation
  { text = "Bellows threats and obscenities", weight = 2 },
  { text = "Makes a gruesome display of violence", weight = 1 },
  { text = "Describes in detail what will happen to you", weight = 1 },
  { text = "Laughs with unnerving confidence", weight = 1 },
  { text = "Slowly and deliberately prepares weapon", weight = 1 },

  # Desperation
  { text = "Grabs a hostage or shield", weight = 1 },
  { text = "Triggers environmental hazard", weight = 1 },
  { text = "Destroys something valuable rather than lose it", weight = 1 },
  { text = "Attempts mutual destruction", weight = 1 },
  { text = "Fights with animal ferocity", weight = 1 },
]

# -----------------------------------------------------------------------------
# NEUTRAL REACTIONS - Wary but not committed to conflict
# -----------------------------------------------------------------------------
[neutral_reactions]
entries = [
  # Cautious observation
  { text = "Watches warily, hand resting on weapon", weight = 3 },
  { text = "Maintains distance, eyes tracking your movements", weight = 2 },
  { text = "Continues their task but keeps you in peripheral vision", weight = 2 },
  { text = "Acknowledges your presence with a curt nod", weight = 2 },
  { text = "Stops what they're doing and stares", weight = 2 },
  { text = "Shifts position to keep back to wall", weight = 1 },
  { text = "Glances toward exits and escape routes", weight = 1 },
  { text = "Exchanges meaningful look with companions", weight = 1 },

  # Verbal engagement
  { text = "Demands identification and purpose", weight = 2 },
  { text = "Asks pointed questions about your business", weight = 2 },
  { text = "Offers information for a price", weight = 1 },
  { text = "Responds in monosyllables", weight = 2 },
  { text = "Speaks only when directly addressed", weight = 2 },
  { text = "Gives deliberately vague answers", weight = 1 },
  { text = "Redirects conversation to assess your intentions", weight = 1 },
  { text = "Claims to know nothing about anything", weight = 2 },

  # Dismissive behavior
  { text = "Ignores you pointedly", weight = 2 },
  { text = "Waves you away with irritation", weight = 1 },
  { text = "Returns to their work without acknowledgment", weight = 2 },
  { text = "Mutters something under their breath", weight = 1 },
  { text = "Pretends not to understand your language", weight = 1 },
  { text = "Points elsewhere and says 'not my concern'", weight = 1 },

  # Guarded assistance
  { text = "Provides minimal help to get rid of you", weight = 2 },
  { text = "Answers questions but volunteers nothing", weight = 2 },
  { text = "Gives directions that are technically correct", weight = 1 },
  { text = "Offers basic hospitality, nothing more", weight = 1 },
  { text = "Trades fairly but without warmth", weight = 1 },
  { text = "Helps only after establishing you're not a threat", weight = 1 },

  # Self-preservation
  { text = "Backs away slowly while maintaining eye contact", weight = 1 },
  { text = "Positions obstacles between you", weight = 1 },
  { text = "Signals subtly for others to be alert", weight = 1 },
  { text = "Keeps hands visible while watching yours", weight = 1 },
  { text = "Mentions that they are expected somewhere soon", weight = 1 },
]

