# ==============================================================================
# MIXED RUMORS - Partial truths (35+ entries)
# ==============================================================================

[mixed_rumors]
entries = [
  # Outdated Information
  { text = "The information is true, but outdated by weeks", weight = 2 },
  { text = "The route was safe when the traveler used it", weight = 1 },
  { text = "The prices were accurate before the shortage", weight = 1 },
  { text = "The leader supported that position before they changed it", weight = 1 },
  { text = "The resource was there but has since been claimed", weight = 1 },
  { text = "The building was intact before the recent damage", weight = 1 },
  { text = "The person was there but has since moved on", weight = 1 },
  { text = "The opportunity existed but the window has closed", weight = 1 },
  { text = "The danger was real but has since been addressed", weight = 1 },
  { text = "The alliance held until very recently", weight = 1 },

  # Partial Accuracy
  { text = "The details are wrong, but the core is accurate", weight = 2 },
  { text = "The location is correct but the timing is off", weight = 1 },
  { text = "The person exists but their role is different", weight = 1 },
  { text = "The threat is real but exaggerated", weight = 1 },
  { text = "The reward exists but terms are different", weight = 1 },
  { text = "The secret is true but the implications are misunderstood", weight = 1 },
  { text = "The event happened but the cause is misattributed", weight = 1 },
  { text = "The organization exists but their goals differ from rumors", weight = 1 },
  { text = "The item is real but its powers are overstated", weight = 1 },
  { text = "The conflict occurred but the outcome was different", weight = 1 },

  # Context-Dependent
  { text = "True for now, but about to change", weight = 2 },
  { text = "Accurate for some, but not for outsiders", weight = 1 },
  { text = "Valid in this region but not elsewhere", weight = 1 },
  { text = "True in spirit but wrong in specifics", weight = 1 },
  { text = "Correct about what, wrong about who", weight = 1 },
  { text = "The law exists but is not enforced", weight = 1 },
  { text = "The danger is real but only under certain conditions", weight = 1 },
  { text = "The path works but requires specific knowledge", weight = 1 },
  { text = "The method succeeds but not reliably", weight = 1 },
  { text = "The contact is trustworthy but not available", weight = 1 },

  # Deliberate Half-Truths
  { text = "The easy part is true, the hard part omitted", weight = 1 },
  { text = "The benefit is real, the cost is hidden", weight = 1 },
  { text = "The entrance is where they say, the exit is not mentioned", weight = 1 },
  { text = "The treasure exists, so do its guardians", weight = 1 },
  { text = "The welcome is genuine, the motives are not", weight = 1 },
  { text = "The job is as described, the employer is not", weight = 1 },
  { text = "The medicine works, the side effects are severe", weight = 1 },
  { text = "The story is true, the source has an agenda", weight = 1 },
]

