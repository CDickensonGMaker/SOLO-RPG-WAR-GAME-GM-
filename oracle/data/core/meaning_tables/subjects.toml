# ============================================================================
# MEANING TABLE: SUBJECTS
# ============================================================================
# 100 subject nouns for oracle interpretation. Combine with an Action to
# create surprising, specific complications and elaborations.
#
# Usage: Roll or pick an Action + Subject pair, then interpret in context.
# Example: "Reveals + The Secret" -> "The merchant reveals your father's journal"
#
# Categories help weight rolls toward relevant subjects.
# ============================================================================

[meta]
title = "Subject Meaning Table"
description = "Nouns for oracle interpretation - what is affected?"
version = "1.0.0"

