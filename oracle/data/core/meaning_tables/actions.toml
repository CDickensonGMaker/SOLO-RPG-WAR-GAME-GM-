# ============================================================================
# MEANING TABLE: ACTIONS
# ============================================================================
# 100 action verbs for oracle interpretation. Combine with a Subject to
# create surprising, specific complications and elaborations.
#
# Usage: Roll or pick an Action + Subject pair, then interpret in context.
# Example: "Reveals + The Secret" -> "The merchant reveals your father's journal"
#
# Categories help weight rolls toward relevant actions.
# ============================================================================

[meta]
title = "Action Meaning Table"
description = "Verbs for oracle interpretation - what is happening?"
version = "1.0.0"

