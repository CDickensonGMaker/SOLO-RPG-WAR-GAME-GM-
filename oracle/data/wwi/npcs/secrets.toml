# WWI Secrets
# What they carry that no one can know

[war_crimes]
description = "The things done that can never be spoken"
entries = [
    { secret = "Shot prisoners during a trench raid", context = "No time, no room, orders unclear, did it anyway" },
    { secret = "Bayoneted wounded enemy soldiers", context = "They were suffering, or dangerous, or both" },
    { secret = "Executed a coward pour encourager les autres", context = "The firing squad, the blindfold, his face" },
    { secret = "Witnessed an officer murdered by his own men", context = "Said nothing, the bastard deserved it" },
    { secret = "Looted gold teeth from corpses", context = "Dead men don't need gold, living men do" },
    { secret = "Used forbidden expanding bullets", context = "Modified the rounds, made them worse" },
    { secret = "Shot a surrendering enemy", context = "Couldn't trust it, couldn't risk it" },
    { secret = "Killed wounded men to save morphine", context = "They were going to die anyway" }
]

[cowardice]
description = "Failures of courage that haunt"
entries = [
    { secret = "Self-inflicted wound to escape the line", context = "Shot himself in the foot, claimed sniper" },
    { secret = "Hid in a shell crater during an advance", context = "Lay among the dead until it was over" },
    { secret = "Let another man die to save himself", context = "Could have pulled him into cover, didn't" },
    { secret = "Ran during a gas attack, abandoning comrades", context = "Panic, pure animal panic" },
    { secret = "Feigned shell shock to escape duty", context = "The tremors are real now" },
    { secret = "Deliberately got captured", context = "Prisoner camps are safer than the trenches" },
    { secret = "Paid a surgeon to declare him unfit", context = "Family money bought survival" },
    { secret = "Deserted and was caught, identity changed", context = "Serving under a dead man's name" }
]

[fraternization]
description = "Humanity that crosses the lines"
entries = [
    { secret = "Played football with Germans at Christmas", context = "Traded cigarettes, showed photographs of sweethearts" },
    { secret = "Has ongoing arrangement with enemy snipers", context = "Live and let live, we don't shoot at dawn, neither do they" },
    { secret = "Warned enemy soldiers of impending raid", context = "Threw a note, couldn't bear more killing" },
    { secret = "Buried enemy dead with respect", context = "Said words over them, same as our boys" },
    { secret = "Shared food with starving prisoner", context = "He was just a boy, like my brother" },
    { secret = "Fell in love with enemy nurse while wounded", context = "She treated him with kindness" },
    { secret = "Corresponds with enemy through neutral channels", context = "A German poet, they share verses" }
]

[incompetence]
description = "Failures that cost lives"
entries = [
    { secret = "His navigation error sent men into friendly fire", context = "Twenty dead because he misread the map" },
    { secret = "Gave wrong coordinates for artillery support", context = "Shells fell on our own trench" },
    { secret = "Knew the offensive would fail, said nothing", context = "Couldn't contradict the colonel, watched them die" },
    { secret = "Lost the messenger pigeon carrying vital intelligence", context = "Attack went ahead without the warning" },
    { secret = "Signed off on faulty equipment that killed men", context = "Gas masks that didn't seal properly" },
    { secret = "Failed to report enemy tunneling sounds", context = "Thought he was imagining it, then the mine exploded" },
    { secret = "Approved the attack plan that was suicide", context = "Wanted promotion, spent other men's lives" }
]

[personal]
description = "Private shames and hidden truths"
entries = [
    { secret = "Loves another man in the unit", context = "Can never speak it, punishable by death or prison" },
    { secret = "Contracted venereal disease from a prostitute", context = "Hides symptoms, fears discovery" },
    { secret = "Has a wife and family no one knows about", context = "Also has another in this country" },
    { secret = "Lied about his age to enlist, is just fifteen", context = "Wanted adventure, found hell" },
    { secret = "Is actually of enemy nationality, hiding identity", context = "German-American, changed his name" },
    { secret = "Noble birth, hiding from family shame", context = "Enlisted as private to escape scandal" },
    { secret = "Was a criminal before the war", context = "Enlisted to escape prison sentence" },
    { secret = "Addicted to morphine from old wound", context = "Steals from medical supplies" },
    { secret = "Cannot read or write", context = "Others write his letters, keep his shame" },
    { secret = "Plans to desert at first opportunity", context = "Has money hidden, route planned" }
]

[witnessed]
description = "Things seen that can never be unseen or spoken"
entries = [
    { secret = "Saw an officer shoot his own wounded subaltern", context = "Mercy, murder, or convenience?" },
    { secret = "Knows the true casualty figures, not the lies printed", context = "Helped cook the books" },
    { secret = "Witnessed burial of men still alive", context = "Couldn't dig fast enough, the barrage was coming" },
    { secret = "Saw medical experiments on shell shock patients", context = "Electric shocks, torture called treatment" },
    { secret = "Knows about the mutiny that was covered up", context = "Whole battalion refused orders, executions followed" },
    { secret = "Witnessed a colonel drunk during an attack", context = "Men died while he couldn't stand" },
    { secret = "Saw the intelligence that was ignored before the disaster", context = "They knew and attacked anyway" },
    { secret = "Found his brother's body, unidentifiable, recognized a ring", context = "Listed as missing, knows the truth" }
]

[betrayal]
description = "Treacheries small and large"
entries = [
    { secret = "Informed on a comrade to military police", context = "Saved himself, doomed another" },
    { secret = "Stole from a dead officer's effects", context = "His family never got the letters" },
    { secret = "Sabotaged equipment of a man he hated", context = "His rifle jammed when he needed it most" },
    { secret = "Writes censored reports about unit morale", context = "Men punished based on his words" },
    { secret = "Sold military supplies on the black market", context = "What the men needed, he sold" },
    { secret = "Gave false testimony at court martial", context = "An innocent man was shot at dawn" }
]
