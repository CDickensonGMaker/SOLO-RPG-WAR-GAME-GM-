# Cyberpunk Districts
# The geography of Night City and its neighborhoods

[districts]
# Major districts and their character
entries = [
  # Watson
  { text = "Watson - immigrant melting pot, once corp territory now gang-controlled, cheap housing and cheaper lives", weight = 2 },
  { text = "Kabuki - market district, knockoff everything, street food and stolen goods, Tyger Claw adjacent", weight = 2 },
  { text = "Little China - dense residential, megabuildings stacked on megabuildings, community in the chaos", weight = 2 },
  { text = "Northside Industrial - Maelstrom territory, abandoned factories turned chrome temples, dangerous after dark", weight = 2 },
  { text = "Watson waterfront - smuggling central, container ships and contraband, every gang wants the docks", weight = 2 },

  # Westbrook
  { text = "Westbrook - corpo playground, where executives spend their blood money, glitter hiding the rot", weight = 2 },
  { text = "Japantown - Tyger Claw empire, neon and tradition, tourists and yakuza side by side", weight = 2 },
  { text = "Charter Hill - old money mansions, private security armies, walls keep the poor out", weight = 1 },
  { text = "North Oak - billionaire enclave, corpo CEOs, politicians, the people who own the city", weight = 1 },

  # Heywood
  { text = "Heywood - Valentino heartland, Latino culture preserved in chrome and gold, honor and violence", weight = 2 },
  { text = "The Glen - business district meets gang territory, corpo offices with Valentino protection", weight = 2 },
  { text = "Vista del Rey - middle class dreams, gated communities, pretending everything's fine", weight = 2 },
  { text = "Wellsprings - working class residential, Valentino presence keeps it stable, relatively safe", weight = 2 },

  # Pacifica
  { text = "Pacifica - abandoned resort district, Voodoo Boys territory, Combat Zone adjacent, do not enter", weight = 2 },
  { text = "Coastview - tourist traps turned death traps, empty hotels full of squatters and danger", weight = 2 },
  { text = "West Wind Estate - massive housing project, thousands forgotten by the city, community by necessity", weight = 2 },
  { text = "Pacifica beaches - beautiful coastline, polluted water, bodies wash up regularly", weight = 1 },

  # Santo Domingo
  { text = "Santo Domingo - industrial backbone, power plants and factories, working class survival", weight = 2 },
  { text = "Arroyo - 6th Street heartland, veteran community, patriotic and armed to the teeth", weight = 2 },
  { text = "Rancho Coronado - power infrastructure, cooling towers and substations, essential and ignored", weight = 2 },

  # City Center
  { text = "City Center - corporate heart of Night City, megacorp HQs, money and power concentrated", weight = 2 },
  { text = "Corpo Plaza - Arasaka Tower shadow, executive lunch spots, armed security everywhere", weight = 2 },
  { text = "Downtown - business district, mid-level corps, restaurants and bars for suits", weight = 2 },

  # Badlands
  { text = "Badlands - wasteland surrounding Night City, nomad territory, freedom and danger in equal measure", weight = 2 },
  { text = "Biotechnica farms - protein farms stretching forever, synthetic food production, migrant workers", weight = 1 },
  { text = "Solar fields - endless power generation, guarded perimeter, energy for the city", weight = 1 },
  { text = "Nomad camps - temporary settlements, family gatherings, trade and tradition", weight = 2 },
]

