  { text = "Neighborhood dispute - locals want you to solve a problem", weight = 2 },
  { text = "Community protection - locals need defense, can't pay much", weight = 2 },
  { text = "Street kid recruitment - young person wants into the life", weight = 2 },
  { text = "Witness situation - you saw something, someone knows", weight = 2 },
  { text = "Reputation challenge - someone claiming you can't do what you say", weight = 2 },
  { text = "Favor request - someone who helped you needs help now", weight = 2 },
  { text = "Cultural misunderstanding - crossed lines you didn't see", weight = 2 },
  { text = "Memorial service - paying respects, networking, old wounds", weight = 1 },
  { text = "Street court - community judging a dispute, your input requested", weight = 1 },
  { text = "Block party politics - community event with underlying tensions", weight = 1 },
]
