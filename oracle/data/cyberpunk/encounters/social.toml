  { text = "Crew member defection - someone's been turned, loyalties shifting", weight = 2 },
  { text = "Informant exposure - your inside source has been made", weight = 2 },
  { text = "Setup revelation - the job was always a trap, options limited", weight = 2 },
  { text = "Client betrayal - employer eliminating loose ends", weight = 2 },
  { text = "Inside job - theft from within, suspicion on everyone", weight = 2 },
  { text = "False friend - long-term contact revealed as corporate plant", weight = 1 },
  { text = "Sold out - someone traded your location for their safety", weight = 2 },
  { text = "Evidence planted - you're being framed by a trusted contact", weight = 1 },
  { text = "Crew split - ideological differences turning violent", weight = 1 },
  { text = "Lover's betrayal - personal relationship weaponized", weight = 1 },

  # Corporate encounters
  { text = "Corporate interview - executive considering hiring you off-books", weight = 2 },
  { text = "Whistleblower contact - corporate employee wants to talk", weight = 2 },
  { text = "Legal threat - corporate lawyers with cease and desist", weight = 2 },
  { text = "Acquisition offer - corp wants to buy your operation", weight = 1 },
  { text = "Embedded journalist - media asking questions about corporate jobs", weight = 2 },
  { text = "Corporate defector - exec fleeing, needs help, has information", weight = 1 },
  { text = "PR management - corp offering money to change your story", weight = 2 },
  { text = "Contract negotiation - corporate job offer, reading the fine print", weight = 2 },
  { text = "Non-disclosure enforcement - corp reminding you what you signed", weight = 2 },
  { text = "Industrial espionage pitch - competitor wants you to switch sides", weight = 1 },

  # Personal encounters
  { text = "Family emergency - relative in trouble, obligations calling", weight = 2 },
  { text = "Old debt collection - past favor being called in", weight = 2 },
  { text = "Romance complication - relationship interfering with work", weight = 2 },
  { text = "Mentor return - figure from the past with advice or demands", weight = 1 },
  { text = "Student seeking guidance - someone wants to learn from you", weight = 1 },
  { text = "Rival confrontation - personal enemy forcing a reckoning", weight = 2 },
  { text = "Reunion encounter - someone from before the life found you", weight = 1 },
  { text = "Child in danger - innocent caught up in your world", weight = 1 },
  { text = "Health crisis - your body failing, decisions required", weight = 1 },
  { text = "Identity crisis - someone claiming to be you, or you're the copy", weight = 1 },

