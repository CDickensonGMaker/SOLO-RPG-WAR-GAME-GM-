# Cyberpunk Social Encounters
# Negotiations, betrayals, and human complications

[encounters]
entries = [
  # Fixer and job encounters
  { text = "Fixer meet - new job offer, suspicious details", weight = 3 },
  { text = "Payment dispute - client claiming non-completion, refusing payment", weight = 2 },
  { text = "Contract renegotiation - scope changed, compensation demands", weight = 2 },
  { text = "Double booking - same fixer assigned same job to rival crew", weight = 2 },
  { text = "Intermediary meeting - never meet the real client", weight = 2 },
  { text = "Job interview - potential employer testing your capabilities", weight = 2 },
  { text = "Reputation check - past deeds catching up, questions being asked", weight = 2 },
  { text = "Reference call - someone checking if you're trustworthy", weight = 2 },
  { text = "Fixer blackmail - your contact leveraging past jobs", weight = 1 },
  { text = "New fixer introduction - expanding network, establishing trust", weight = 2 },

  # Deal encounters
  { text = "Arms deal - illegal weapons changing hands, tension high", weight = 2 },
  { text = "Data sale - information being traded, verification needed", weight = 2 },
  { text = "Protection arrangement - paying for safety, negotiating terms", weight = 2 },
  { text = "Fence negotiation - selling hot goods, arguing value", weight = 2 },
  { text = "Smuggling contract - cargo needs moving, customs needs avoiding", weight = 2 },
  { text = "Intel exchange - trading secrets, verifying authenticity", weight = 2 },
  { text = "Medical debt collection - ripperdoc wants payment or parts", weight = 2 },
  { text = "Loan shark confrontation - interest compounding, patience ending", weight = 2 },
  { text = "Hostage negotiation - someone has value, someone wants them", weight = 1 },
  { text = "Territory treaty - gangs discussing boundaries, outsider involvement", weight = 1 },

