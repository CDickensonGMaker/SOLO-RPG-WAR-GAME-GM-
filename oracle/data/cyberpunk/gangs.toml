[gang_activities]
# What gangs do
entries = [
  # Criminal Enterprise
  { text = "Protection racket - pay or burn, regular collections, violence for non-payment", weight = 3 },
  { text = "Drug distribution - synthetic highs, designer chems, street corner dealers", weight = 3 },
  { text = "Weapons trafficking - guns for anyone, stolen military hardware, no questions", weight = 2 },
  { text = "Cyberware theft - scav operations, harvest chrome from victims, sell to ripperdocs", weight = 2 },
  { text = "Vehicle boosting - steal cars, chop shops, export operation", weight = 2 },
  { text = "Human trafficking - joytoys against their will, labor slaves, organ farms", weight = 1 },
  { text = "Kidnapping for ransom - corporate executives, rich kids, anyone with money", weight = 2 },
  { text = "Underground gambling - fighting rings, card games, sports betting", weight = 2 },
  { text = "Smuggling operations - goods across borders, people past checkpoints", weight = 2 },
  { text = "Identity theft - fake SINs, clean records, new lives for sale", weight = 2 },

  # Violence
  { text = "Drive-by shooting - message sending, territory marking, rival elimination", weight = 2 },
  { text = "Gang war offensive - coordinated attack, seize territory, show of force", weight = 2 },
  { text = "Assassination contract - taking wetwork jobs, eliminating problems for pay", weight = 2 },
  { text = "Retaliation strike - they hit us, we hit back harder, escalation cycle", weight = 2 },
  { text = "Initiation violence - new members proving themselves through blood", weight = 2 },
  { text = "Street justice - handling problems internally, bodies disappear", weight = 2 },
  { text = "Intimidation campaign - threatening witnesses, scaring competitors", weight = 2 },
  { text = "Turf defense - holding the line, repelling invaders, dying for the colors", weight = 2 },

  # Community
  { text = "Neighborhood watch - protecting their people from outside threats", weight = 2 },
  { text = "Community kitchen - feeding the hungry, buying loyalty with food", weight = 1 },
  { text = "Youth recruitment - getting kids young, raising the next generation", weight = 2 },
  { text = "Medical services - gang ripperdoc, treating members free, loyalty medicine", weight = 1 },
  { text = "Justice arbitration - settling disputes, community court, gang law", weight = 1 },
  { text = "Holiday celebrations - festivals, parades, showing the flag", weight = 1 },
  { text = "Education programs - training the young, skills for survival", weight = 1 },
  { text = "Elder care - taking care of retired members, loyalty until death", weight = 1 },
]

[gang_ranks]
# Hierarchy within gangs
entries = [
  { text = "Boss - absolute authority, life and death power, answers to no one", weight = 1 },
  { text = "Underboss - second in command, runs daily operations, heir apparent", weight = 1 },
  { text = "Lieutenant - territory commander, manages crews, reports to leadership", weight = 2 },
  { text = "Enforcer - violence specialist, handles problems, feared by all", weight = 2 },
  { text = "Soldier - full member, proven loyalty, gets a cut of everything", weight = 3 },
  { text = "Runner - errand runner, moving product, proving themselves", weight = 2 },
  { text = "Prospect - trial member, doing dirty work, hoping to be made", weight = 2 },
  { text = "Associate - outside contractor, works with gang, not of gang", weight = 2 },
  { text = "Corner boy - lowest level, watching territory, first line of defense", weight = 2 },
  { text = "OG - retired veteran, adviser status, respected elder", weight = 1 },
]

