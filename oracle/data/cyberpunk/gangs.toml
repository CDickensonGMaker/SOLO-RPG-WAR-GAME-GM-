  { text = "Combat Zone perimeter - multiple gangs fighting, no-mans-land, corpses in the streets", weight = 2 },
  { text = "Megabuilding neutral floors - gang truces, shared territory, violence forbidden here", weight = 1 },
  { text = "Underground markets - gang-run bazaars, everything available, prices set by firepower", weight = 2 },
