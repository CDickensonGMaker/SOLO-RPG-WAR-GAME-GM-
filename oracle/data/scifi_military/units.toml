  { text = "Main Battle Tank Squadron - steel beasts crewed by three, destroyers of everything", weight = 1 },
  { text = "Heavy Tank Company - superheavies that crack foundations, overkill incarnate", weight = 1 },
  { text = "Light Cavalry Squadron - fast attack vehicles, hit and fade", weight = 1 },
  { text = "Walker Platoon - bipedal assault platforms, infantry support that terrifies both sides", weight = 1 },
  { text = "Assault Gun Battery - mobile artillery in tank chassis, direct fire devastation", weight = 1 },
  { text = "Self-Propelled Artillery - mobile guns that relocate before counter-battery finds them", weight = 1 },

  # Air/Void
  { text = "Dropship Squadron - the taxi drivers nobody thanks until extraction goes hot", weight = 1 },
  { text = "Gunship Wing - flying fire support, angels of death on rotor blades", weight = 2 },
  { text = "Close Air Support Flight - ground attack aircraft, danger close is their specialty", weight = 1 },
  { text = "Fighter Squadron - void superiority pilots, knights of the black", weight = 1 },
  { text = "Bomber Wing - strategic delivery systems, they make planets burn", weight = 1 },
  { text = "Aerospace Defense Battery - protecting the sky, shooting down anything that enters", weight = 1 },

  # Support
  { text = "Field Hospital Company - surgical teams under fire, saving lives amid the dying", weight = 1 },
  { text = "Logistics Battalion - supply chain that keeps the war machine fed", weight = 1 },
  { text = "Military Police Platoon - discipline enforcers, everyone hates them until needed", weight = 1 },
  { text = "Signals Company - communications specialists, keeping everyone connected", weight = 1 },
  { text = "Intelligence Section - spooks and analysts, they know things that would terrify you", weight = 1 },
