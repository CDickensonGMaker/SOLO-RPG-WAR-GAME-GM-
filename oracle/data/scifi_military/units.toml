  { text = "Drop Shock Infantry - orbital insertion specialists, 40% casualty rate considered acceptable", weight = 2 },
  { text = "Powered Armor Marines - walking tanks, each suit costs more than a corvette", weight = 2 },
  { text = "Storm Troopers - elite deep strike units, always first in last out", weight = 1 },
  { text = "Void Commandos - zero-G combat specialists, breach and clear in vacuum", weight = 1 },
  { text = "Pathfinders - advance recon elite, go where no one else can", weight = 1 },
