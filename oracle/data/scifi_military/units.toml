  { text = "Mechanized Infantry - mounted in IFVs, dismount under fire and like it", weight = 1 },
  { text = "Light Infantry - leg infantry for rough terrain, humping everything on their backs", weight = 1 },
  { text = "Garrison Troops - PDF quality, barely trained but warm bodies with guns", weight = 1 },
  { text = "Penal Legion - convicts with explosive collars, first into the breach or last to breathe", weight = 2 },
  { text = "Conscript Battalions - pressed into service, three months training if lucky", weight = 1 },
  { text = "Veterans Company - survivors of three campaigns minimum, unkillable or lucky", weight = 1 },
  { text = "Rifle Regiment - basic line troops, the backbone nobody appreciates until they're gone", weight = 1 },
  { text = "Urban Assault Platoon - hab-block specialists, every room is a potential grave", weight = 1 },

  # Specialized Infantry
  { text = "Xeno-Hunters - bug specialists, they've seen things that would break normal grunts", weight = 2 },
  { text = "Hostile Environment Company - death world veterans, they find normal gravity luxurious", weight = 1 },
  { text = "Chemical Warfare Platoon - flamer and gas specialists, Geneva convention what?", weight = 1 },
  { text = "Scout-Sniper Section - one shot one kill from two klicks, ghosts with rifles", weight = 1 },
  { text = "Demolitions Platoon - if it stands, they can drop it, if it doesn't they can crater it", weight = 1 },
  { text = "Anti-Armor Section - tank hunters with shoulder-fired death, brave or crazy", weight = 1 },
  { text = "Mortar Section - indirect fire specialists, they never see who they kill", weight = 1 },
  { text = "Combat Engineers - they build it break it or blow it up depending on orders", weight = 1 },

