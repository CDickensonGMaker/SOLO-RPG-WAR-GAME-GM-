[unit_traditions]
entries = [
  # Pre-Battle
  { text = "Paint death mask on face before combat, wash it off with enemy blood or not at all", weight = 2 },
  { text = "Last man to the dropship buys drinks for entire squad after mission", weight = 1 },
  { text = "Sergeant recites names of unit dead before every engagement", weight = 1 },
  { text = "Share a ritual drink from the unit's ancestral flask, passed down through generations", weight = 1 },
  { text = "Chaplain blesses weapons individually, each by name and service history", weight = 1 },
  { text = "Exchange personal effects with battle buddy, ensure return to families if one falls", weight = 2 },
  { text = "Unit sings traditional war hymn before drop, voices echo through the bay", weight = 1 },
  { text = "Officer eats last, from the same pot as the lowest private", weight = 1 },

  # Combat Traditions
  { text = "First kill of engagement belongs to the newest member, blooding the rookie", weight = 1 },
  { text = "Never leave a weapon behind, bring back iron even if you can't bring back the bearer", weight = 2 },
  { text = "Unit banner goes forward first, falls last, carried by the bravest or most cursed", weight = 1 },
  { text = "Officer leads from front in assault, from rear in defense, visible to all", weight = 1 },
  { text = "Grenades are named and the name is shouted when thrown", weight = 1 },
  { text = "Wounded who can still fight stay in the line, only unconscious leave", weight = 1 },
  { text = "Enemy officers are priority targets, decapitate the snake first", weight = 1 },
  { text = "No prisoners taken, no prisoners given, both sides know the score", weight = 2 },

  # Post-Battle
  { text = "Collect dog tags from fallen, entire squad present for the gathering", weight = 1 },
  { text = "Toast to the dead before drinking, their names spoken aloud", weight = 1 },
  { text = "Burn fallen comrades' personal effects if no family, keep nothing", weight = 1 },
  { text = "Mark kill tallies on armor in enemy blood, wash off is cowardice", weight = 1 },
  { text = "Write letters to families of fallen personally, no form letters", weight = 2 },
  { text = "Salvage one piece from each fallen enemy's gear as trophy", weight = 1 },
  { text = "Silence for sixty seconds after securing objective, respect the cost", weight = 1 },
  { text = "Youngest survivor reports the action to command, learning to speak of death", weight = 1 },

  # Unit Culture
  { text = "New members not addressed by name until first combat, they're 'fresh meat' until then", weight = 1 },
  { text = "Officers promoted from within the unit only, outsiders never fully trusted", weight = 1 },
  { text = "Unit maintains shrine to fallen, candles lit for each name", weight = 1 },
  { text = "Gear is passed down when soldier falls, their spirit rides with equipment", weight = 1 },
  { text = "Unit has its own language, slang incomprehensible to outsiders", weight = 1 },
  { text = "Tattoo ritual marks major campaigns, body becomes battle record", weight = 1 },
  { text = "Mock courts martial for minor infractions, punishments creative not cruel", weight = 1 },
  { text = "Annual remembrance day where no fighting occurs if possible", weight = 1 },

  # Superstitions
  { text = "Never speak of home before a drop, tempting fate", weight = 1 },
  { text = "First round from new ammo box goes into the dirt, appeasing the machine spirit", weight = 1 },
  { text = "Specific seat in dropship for soldier who's about to die, everyone knows which one", weight = 2 },
  { text = "Touch the unit's lucky charm before combat, anyone who forgets is watched nervously", weight = 1 },
  { text = "Never say the number of days until rotation, counting down invites death", weight = 1 },
  { text = "Remove helmet only when truly safe, keep face hidden from death", weight = 1 },
  { text = "Write final letter before every mission, burn it if you survive", weight = 1 },
  { text = "If someone says 'this should be easy' everyone else prepares for disaster", weight = 1 }
]
