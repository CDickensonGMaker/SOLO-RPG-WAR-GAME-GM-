  { text = "The Immortals - unit with impossibly low casualty rate, luck or skill or both", weight = 1 },
  { text = "The Old Guard - veterans who've served together since the beginning", weight = 1 },
  { text = "Iron Wolves - aggressive pursuit specialists, they never let prey escape", weight = 1 },
  { text = "Death's Head Company - skull insignia earned through massacre", weight = 1 },
  { text = "The Bloodhounds - tracking specialists, they find what you're hiding", weight = 1 },
  { text = "Widowmakers - highest kill count in the regiment, proud of it", weight = 1 },
  { text = "The Last Wall - defensive specialists, never broken never retreated", weight = 1 },
  { text = "Storm Crows - harbingers of destruction, where they go death follows", weight = 1 },

