# Sci-Fi Military Social Encounters
# Political intrigue, command decisions, and interpersonal conflicts

[encounters]
entries = [
  # Command Politics
  { text = "Orders come down that will result in unnecessary casualties", weight = 1 },
  { text = "Two officers give contradictory orders, each claiming authority", weight = 1 },
  { text = "Commissar arrives to investigate morale problems in the unit", weight = 1 },
  { text = "Request for reinforcements denied without explanation", weight = 1 },
  { text = "Soldier witnessed command committing war crime, seeks advice", weight = 1 },
  { text = "Noble officer demands preferential treatment endangering mission", weight = 1 },
