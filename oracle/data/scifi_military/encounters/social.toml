  { text = "Religious leader demands soldiers respect local holy site in combat zone", weight = 1 },
  { text = "Local government official offers bribe for favorable treatment", weight = 1 },
  { text = "Press correspondent wants to embed with unit, command has concerns", weight = 1 },

  # Enemy Relations
  { text = "Enemy officer requests temporary ceasefire to collect dead", weight = 1 },
  { text = "Captured enemy soldier offers information for humane treatment", weight = 1 },
  { text = "Enemy defector arrives with valuable intelligence", weight = 1 },
