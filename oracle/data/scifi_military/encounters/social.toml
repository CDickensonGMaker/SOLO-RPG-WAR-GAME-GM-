  { text = "Medical supplies enough for either wounded soldiers or sick civilians", weight = 1 },
  { text = "Tactical position can only be held by sacrificing part of the unit", weight = 1 },
  { text = "Evidence discovered that could end careers of senior officers", weight = 1 },
  { text = "Soldier discovers family member among enemy dead", weight = 1 },
  { text = "Mission objective conflicts with soldier's deeply held beliefs", weight = 1 },
  { text = "Saving wounded soldier will compromise time-critical mission", weight = 1 },
  { text = "Intelligence asset's extraction will expose civilian informants", weight = 1 },
  { text = "Superior officer's breakdown must be concealed from command", weight = 1 },
  { text = "Evidence suggests friendly fire caused recent casualties", weight = 1 },
  { text = "Soldier wants to desert to find missing family, requests help", weight = 1 }
