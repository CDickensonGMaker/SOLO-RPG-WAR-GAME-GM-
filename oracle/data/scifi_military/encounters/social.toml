  { text = "Veteran soldier refuses to follow orders from inexperienced officer", weight = 1 },
  { text = "Fight breaks out between soldiers over scarce resources", weight = 1 },
  { text = "Soldier confesses they cannot continue, breaking point reached", weight = 1 },
  { text = "Romance between soldiers threatens unit cohesion", weight = 1 },
  { text = "Soldier suspects another of cowardice during last engagement", weight = 1 },
