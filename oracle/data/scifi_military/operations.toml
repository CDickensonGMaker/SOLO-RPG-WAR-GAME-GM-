  { text = "Our guide is leading us into an ambush, or at least a very suspicious route", weight = 1 },
  { text = "Maps are outdated, terrain doesn't match", weight = 1 },
  { text = "The target we came for is already dead, mission is pointless", weight = 1 },
  { text = "Enemy knew we were coming, this is a trap", weight = 2 },
