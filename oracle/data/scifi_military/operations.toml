  { text = "Command is micromanaging from orbit, conflicting orders", weight = 1 },
  { text = "Press embedded with unit just got hit, political nightmare incoming", weight = 1 },
  { text = "Prisoner we took is too valuable to move but too dangerous to keep", weight = 1 },

  # Xenos Specific
  { text = "Bug tunnel opens under our position, contacts inside perimeter", weight = 2 },
  { text = "Xenos behavior doesn't match known patterns, something new", weight = 1 },
  { text = "Soldier showing signs of parasitic infection", weight = 1 },
  { text = "Hive mind is adapting to our tactics in real-time", weight = 1 },
