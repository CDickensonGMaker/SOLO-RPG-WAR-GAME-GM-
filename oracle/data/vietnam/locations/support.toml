    { id = "graves_registration", name = "Graves Registration Point", desc = "Identifying remains. Personal effects processed. The final paperwork. Letters that destroy families." },
    { id = "out_processing", name = "Out-Processing Center", desc = "DEROS reached, going home. Medical check, records review, freedom bird assignment. The last hours in-country." },
