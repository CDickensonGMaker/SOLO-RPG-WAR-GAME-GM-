# Doctor Who NPC Secrets
# Hidden truths that shape the universe

[alien_nature]
description = "They're not what they appear to be"

[[alien_nature.entries]]
name = "Zygon Duplicate"
description = "Has been a Zygon replacement for months, maybe years. The original is in a pod somewhere - or dead. They're starting to forget which memories are real."

[[alien_nature.entries]]
name = "Auton Replica"
description = "Plastic given form and purpose by the Nestene Consciousness. Activation phrase waiting in their mind. When it's spoken, their hand will become a weapon."

[[alien_nature.entries]]
name = "Silence Puppet"
description = "The Silence have been giving them orders for years. They do terrible things and forget immediately. Sometimes they wake up with blood on their hands."

[[alien_nature.entries]]
name = "Time Lord In Hiding"
description = "Used a chameleon arch to become human. The fob watch is hidden somewhere, holding their true identity. They don't know why they can never throw it away."

[[alien_nature.entries]]
name = "Slitheen In Skin Suit"
description = "The real person died months ago. Now there's just a Raxacoricofallapatorian in a compression suit, playing a role. The gas exchange gives them terrible flatulence."

[[alien_nature.entries]]
name = "Partial Cyberman Conversion"
description = "The conversion was interrupted. They're mostly human, but parts of them are wrong. Cold. Metal. They hear the Cybermen whispering upgrade."

[[alien_nature.entries]]
name = "Carrionite Host"
description = "Words have power in their mouth. Speak the right phrase and reality bends. They've been using this for small things. The temptation grows."

[[alien_nature.entries]]
name = "Dream Lord Fragment"
description = "A piece of psychic darkness lives in their mind. It shows them their deepest fears and worst possibilities. It sounds like someone they trust."

[temporal_knowledge]
description = "They know things about time they shouldn't"

[[temporal_knowledge.entries]]
name = "Fixed Point Awareness"
description = "Knows exactly when they die. Has seen it. A fixed point in time that cannot be changed. Every day is borrowed time."

[[temporal_knowledge.entries]]
name = "Time Loop Memory"
description = "Has lived this day before. Hundreds of times. Thousands. Remembers every iteration. No one else knows they're all trapped."

[[temporal_knowledge.entries]]
name = "Parallel Timeline Memories"
description = "Remembers a world that no longer exists. A timeline erased. The people they loved never existed. But they remember every detail."

[[temporal_knowledge.entries]]
name = "Future Knowledge"
description = "Has seen the future - their own, their loved ones', the world's. Cannot speak of it. The temptation to change things wars with the knowledge of consequences."

[[temporal_knowledge.entries]]
name = "Paradox Survivor"
description = "Should have been erased from existence when their timeline collapsed. Somehow they persisted. They don't cast a shadow in certain lights."

[[temporal_knowledge.entries]]
name = "Time Agent Past"
description = "Former Time Agent with missing memories. Two years of their life were taken. What did they do? What did the Agency make them do?"

[[temporal_knowledge.entries]]
name = "Blinovitch Marker"
description = "Has touched their past self. The discharge should have been fatal. Instead, they're displaced - slightly out of sync with reality."

[torchwood_involvement]
description = "Connections to the secret organization"

[[torchwood_involvement.entries]]
name = "Former Torchwood Agent"
description = "Left the organization. Or thinks they left. Torchwood doesn't let go. The retcon in their system is wearing off. Memories are returning."

[[torchwood_involvement.entries]]
name = "Torchwood Subject"
description = "Was experimented on at Torchwood One. Before the fall. The things they did in that tower left marks - visible and invisible."

[[torchwood_involvement.entries]]
name = "Rift-Touched"
description = "Fell through the Cardiff Rift, came back changed. Time moves strangely around them. They know things they shouldn't. They dream of other worlds."

[[torchwood_involvement.entries]]
name = "Deep Cover Operative"
description = "Torchwood Three placed them here years ago. Sleeper agent. Waiting for activation. Normal life is just cover, but they've grown to love it."

[[torchwood_involvement.entries]]
name = "Family of the Taken"
description = "Someone they loved was retconned by Torchwood. Memories wiped. They've been quietly investigating, getting closer to truths that will destroy them."

[dalek_encounters]
description = "Marked by the Daleks"

[[dalek_encounters.entries]]
name = "Dalek Survivor"
description = "Was in the concentration camps during the Dalek invasion of Earth. The screams never stop in their nightmares. Exterminate echoes in their mind."

[[dalek_encounters.entries]]
name = "Dalek Nanocloud Infected"
description = "Dalek nanotech swims in their blood. It's slowly converting them. They feel the hate growing, the love fading. They fight it every moment."

[[dalek_encounters.entries]]
name = "Roboman Escaped"
description = "Was converted to a Roboman, then freed. The conditioning isn't entirely gone. They still feel the urge to obey, to report, to betray."

[[dalek_encounters.entries]]
name = "Dalek Factor Carrier"
description = "Carries the Dalek Factor in their DNA. Passed down through generations. It makes them ruthless, logical, cold. They don't understand compassion."

[[dalek_encounters.entries]]
name = "Time War Witness"
description = "Somehow saw the Time War. The impossible conflict at the end of time. What they witnessed broke something fundamental in their mind."

[cyberman_history]
description = "The metal men have touched them"

[[cyberman_history.entries]]
name = "Conversion Interrupted"
description = "Was halfway through Cyberman conversion when rescued. The emotional inhibitor was never activated. They feel everything, including the parts that are no longer human."

[[cyberman_history.entries]]
name = "Cybermat Implant"
description = "A Cybermat burrowed into them once. It was removed, but it left something behind. They hear the Cybermen's commands sometimes, in their dreams."

[[cyberman_history.entries]]
name = "Family Converted"
description = "Watched their family walk into a Cybus Industries conversion unit. Heard the screams become silence. Saw them walk out as Cybermen. Was not recognized."

[[cyberman_history.entries]]
name = "Cyber-Technology Dependency"
description = "Their life depends on salvaged Cyberman technology. A pacemaker, a neural interface. It keeps them alive. It's also changing how they think."

[other_secrets]
description = "Various hidden truths"

[[other_secrets.entries]]
name = "Remembers the Silence"
description = "Developed a technique to remember the Silence. Photographs, recordings, constant notes. Knows how deep the infection goes. No one believes them."

[[other_secrets.entries]]
name = "Saxon Supporter"
description = "Voted for Harold Saxon. Believed in him. Cheered when he became Prime Minister. The shame is unbearable. The tapping rhythm still echoes."

[[other_secrets.entries]]
name = "Weeping Angel Marked"
description = "Was touched by a Weeping Angel but not displaced. Instead, something else happened. They can feel the Angels watching them. Always watching."

[[other_secrets.entries]]
name = "UNIT Family Legacy"
description = "Grandfather was at UNIT during the classic era. Left detailed journals. The truth about the Doctor, about aliens, passed down in secret."

[[other_secrets.entries]]
name = "Remembers Being Unwritten"
description = "The crack in time erased them once. They were brought back, but they remember the nothing. The complete emptiness of having never existed."

[[other_secrets.entries]]
name = "Testimony Foundation Contact"
description = "Was approached at the moment of death, consciousness copied. Now they know their memories will persist forever. Changes how they live."

[[other_secrets.entries]]
name = "Bad Wolf Connection"
description = "The words 'Bad Wolf' have followed them their entire life. Graffiti, license plates, random documents. They don't know what it means."

[[other_secrets.entries]]
name = "The Doctor's Companion (Former)"
description = "Traveled with the Doctor once, long ago. A different face, a different era. Sworn to secrecy. The adventures haunt and define them."

[[other_secrets.entries]]
name = "Faction Paradox Marked"
description = "Made a deal with Faction Paradox. Their timeline is no longer entirely their own. Paradox protects them. Paradox will collect."

[[other_secrets.entries]]
name = "Hybrid Ancestry"
description = "Part human, part something else. The alien genetics skipped generations but manifested now. Abilities are emerging. So is attention from interested parties."

[[other_secrets.entries]]
name = "Resurrection Glove Survivor"
description = "Was dead. The resurrection glove brought them back. They shouldn't be here. Death is catching up. The darkness is waiting."

[[other_secrets.entries]]
name = "Dream Crabs Survived"
description = "Was fed upon by Dream Crabs. Escaped the dream. But sometimes they're not sure. Is this reality? The snow still feels wrong."

[[other_secrets.entries]]
name = "Immortality Curse"
description = "Cannot die. Has tried. Wakes up every time. This is not a gift. They've lived too long, lost too much. Death would be mercy."

[[other_secrets.entries]]
name = "Shakri Data Core"
description = "Accidentally linked to a Shakri cube. Downloaded vast amounts of information about humanity's extinction. Knows too much about too many ways they could all die."
