# Stargate SG-1 Character Secrets
# Hidden truths and concealed information fitting the Stargate universe

[infiltration_secrets]
description = "Secrets involving hidden identities and infiltration"
secrets = [
    { name = "Hidden Goa'uld Symbiote", description = "Carries a Goa'uld within, either knowingly as a spy or unknowingly implanted. Every word could be the parasite speaking." },
    { name = "Tok'ra Operative", description = "Actually a Tok'ra agent deep undercover. Their mission requires deceiving even allies." },
    { name = "NID Asset", description = "Reports to the NID, passing information about SGC operations. Believes they're serving a greater good." },
    { name = "Trust Sleeper Agent", description = "Programmed by the Trust, activated by specific triggers. May not even know their own true allegiance." },
    { name = "Ashrak in Disguise", description = "A Goa'uld assassin wearing a human face. Patient, waiting for the perfect moment to strike." },
    { name = "Replicator-Human Infiltrator", description = "Not human at all - a human-form Replicator gathering intelligence. Perfect mimicry hiding cold calculation." },
    { name = "Clone Replacement", description = "The original died years ago. This is an Asgard clone, or worse, a Goa'uld creation." },
    { name = "Converted Prior", description = "Was transformed by the Ori and supposedly cured. But Origin's whispers never fully stop." },
    { name = "Compromised by Za'tarc Programming", description = "Unknowingly programmed to assassinate. A walking weapon waiting for the trigger." },
    { name = "Lucian Alliance Contact", description = "Maintains secret connections to the criminal syndicate. Profit or blackmail keeps them cooperative." },
]

[knowledge_secrets]
description = "Secrets involving hidden knowledge"
secrets = [
    { name = "Downloaded Ancient Repository", description = "Has Ancient knowledge buried in their subconscious. It's killing them slowly, but the answers it contains..." },
    { name = "Knows Gate Address to Atlantis", description = "Possesses the coordinates to the lost city. Has told no one, unsure if humanity is ready." },
    { name = "Discovered Ascension Method", description = "Knows how to ascend but hasn't done it. Fear or duty keeps them physical." },
    { name = "Has Goa'uld Genetic Memory", description = "Former host who retained the symbiote's memories. Knows System Lord secrets no human should." },
    { name = "Knows Location of Ancient Weapon", description = "Has coordinates to a devastating Ancient device. The temptation to use it grows." },
    { name = "Witnessed Ori Invasion Plans", description = "Glimpsed the full scope of the Ori's intentions. The scale of the coming war haunts their sleep." },
    { name = "Remembers Future Timeline", description = "Has lived through events that haven't happened yet. Changing the future could make things worse." },
    { name = "Knows Asgard Were Dying", description = "Was told the Asgard's terrible secret before anyone else. The galaxy's protectors are doomed." },
    { name = "Has Map to Furling Homeworld", description = "Possesses the only known route to the mysterious fourth race. Has never revealed it." },
    { name = "Deciphered Destiny's Mission", description = "Understands what the Ancient seed ship was truly meant to find. The implications are terrifying." },
]

[personal_secrets]
description = "Personal secrets and hidden histories"
secrets = [
    { name = "Killed Their Own Team", description = "Made a choice that resulted in their team's death. Officially, it was unavoidable. The truth is darker." },
    { name = "Former Host, Never Reported", description = "Was briefly possessed by a Goa'uld and killed it themselves. Told no one, fearing the consequences." },
    { name = "Sarcophagus Addiction", description = "Still craves the golden light. Sneaks access to Goa'uld technology to feel alive again." },
    { name = "Child on Another World", description = "Has a child they've never acknowledged, living among an alien culture. Watches from afar through the gate." },
    { name = "Made Deal with a Goa'uld", description = "Traded information or service for something they desperately needed. The debt may come due." },
    { name = "Caused an Extinction", description = "Their actions destroyed an entire civilization. It was classified, but they remember every face." },
    { name = "Romantic Relationship with Alien", description = "Loves someone from another world. The relationship is impossible but continues anyway." },
    { name = "Has Forbidden Technology", description = "Kept a piece of alien technology that should have been turned in. Uses it in secret." },
    { name = "Falsified Mission Reports", description = "Has been lying in official records to protect someone or something. The deception compounds daily." },
    { name = "Mercy Killed a Teammate", description = "Ended a suffering colleague's life when rescue was impossible. Haunted by the necessity." },
]

[conspiracy_secrets]
description = "Secrets involving larger conspiracies"
secrets = [
    { name = "Knows About the Second Gate", description = "Aware Earth has more than one stargate. The implications of this redundancy trouble them." },
    { name = "Witnessed Kinsey's True Allegiance", description = "Saw proof that powerful politicians serve alien masters. Can't prove it without dying." },
    { name = "Knows Alpha Site's Real Location", description = "Has memorized the address that isn't in any database. The last refuge if Earth falls." },
    { name = "Part of Rogue Program", description = "Participates in an unauthorized off-world operation. Good intentions paving a dangerous road." },
    { name = "Has Evidence of IOA Corruption", description = "Possesses proof that international oversight has been compromised. Revealing it would cause chaos." },
    { name = "Knows What Really Happened at P3X-403", description = "The official story is a lie. What actually occurred there must never become public." },
    { name = "Aware of Alternate Timeline Incursion", description = "Knows that history has been changed, possibly multiple times. Current reality may not be original." },
    { name = "Discovered Antarctic Outpost Plans", description = "Found evidence the Ancients intended something far larger than a weapons platform." },
]

[species_secrets]
description = "Secrets related to alien nature or transformation"
secrets = [
    { name = "Partially Ascended", description = "Exists partly in a higher plane. Can perceive things others cannot, but is bound by rules they barely understand." },
    { name = "Carries Replicator Nanites", description = "Was infected and supposedly cured. But something still moves in their blood, waiting." },
    { name = "Jaffa Without Symbiote", description = "Lost their symbiote but survived through unknown means. Should be dead. The mystery consumes them." },
    { name = "Touched by an Ancient", description = "Had direct contact with an Ascended being. Changed in ways that haven't fully manifested." },
    { name = "Harcesis Knowledge", description = "Is or has contact with a Harcesis - a human born with Goa'uld genetic memory. Hunted by System Lords." },
    { name = "Iratus Bug Survivor", description = "Was fed upon and somehow survived. Carries genetic markers that shouldn't exist." },
    { name = "Actually an Android", description = "A mechanical duplicate so perfect they may not know themselves. Harlan's creation, or something older." },
    { name = "Naquadah in Blood", description = "Carries traces of naquadah in their system, possibly from Goa'uld contact. Can sense technology others cannot." },
    { name = "Ancient Gene Carrier", description = "Has the genetic markers to activate Ancient technology. Has hidden this ability to avoid being used." },
    { name = "Ori-Touched", description = "Had direct contact with Ori power. Something of their fire remains, a warmth that isn't quite natural." },
    { name = "Quantum Mirror Traveler", description = "Came from an alternate reality and replaced their counterpart. The differences are subtle but meaningful." },
    { name = "Wraith Enzyme Dependent", description = "Was given the enzyme that enhances human capability. Withdrawal would be agony. The supply is running low." },
]
