  { text = "The statue in the square - you recognize the face, but the name on the plaque is someone who died young in your history, here they lived to triumph", weight = 2 },
  { text = "The history textbook - casually mentions events that never happened, wars with different outcomes, heroes you never heard of", weight = 2 },
