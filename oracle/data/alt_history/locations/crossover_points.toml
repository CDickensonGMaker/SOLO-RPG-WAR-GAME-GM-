entries = [
  { text = "Radio signals from other timelines - tune to certain frequencies near crossing points and hear broadcasts that never existed", weight = 1 },
  { text = "Temporal déjà vu - experiencing memories of events that haven't happened yet because your other self already lived them", weight = 2 },
  { text = "Reflection displacement - mirrors at crossing points sometimes show your alternate self instead", weight = 1 },
  { text = "Object substitution - leave an item at a crossing point, sometimes find a different version of it when you return", weight = 1 },
  { text = "Conversation bleed - hear people speaking nearby in languages that don't exist in this timeline", weight = 1 },
  { text = "Newspaper from tomorrow - at certain points, print media from other timelines manifests briefly", weight = 1 },
  { text = "Shadow misalignment - near crossing points, shadows sometimes fall in directions that match other timelines' sun positions", weight = 1 },
