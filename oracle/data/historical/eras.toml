# Historical Eras - Period-Specific Setting Hooks
# 65+ entries across 5 major historical eras
# Each entry establishes tone, stakes, and period authenticity

[eras]

# Ancient Rome (27 BC - 476 AD)
ancient_rome = [
  { text = "The Forum buzzes with senators plotting Caesar's downfall - whispers carry death sentences", weight = 2 },
  { text = "Gladiators await the games in the hypogeum beneath the Colosseum, the roar of crowds above", weight = 2 },
  { text = "The Praetorian Guard grows restless - emperors are made and unmade at their whim", weight = 1 },
  { text = "Legions on the Rhine receive word of a new emperor - will they swear allegiance or declare their own?", weight = 1 },
  { text = "The grain ships from Egypt are late - Rome's mob grows hungry and dangerous", weight = 2 },
  { text = "Christians hide in the catacombs while informers hunt them for Nero's spectacles", weight = 1 },
  { text = "A triumph winds through Rome - the conquered general walks in chains before the victor's chariot", weight = 1 },
  { text = "The Senate debates while the real power brokers meet in private baths and gardens", weight = 2 },
  { text = "Vestal Virgins guard the sacred flame - to let it die means burial alive", weight = 1 },
  { text = "Provincial governors squeeze their territories dry before their term ends", weight = 2 },
  { text = "Poisoners ply their trade among the patrician families - inheritance is a bloody business", weight = 1 },
  { text = "The limes grows thin - barbarian tribes probe for weakness along the frontier", weight = 2 },
  { text = "A new cult from the East gains adherents - the old gods seem distant and cold", weight = 2 },
]

