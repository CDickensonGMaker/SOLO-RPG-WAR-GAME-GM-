  { text = "Peace negotiations where both sides posture and delay", weight = 1 },
  { text = "A diplomatic incident threatens to expand the conflict", weight = 1 },
  { text = "Exchange of prisoners involves complex negotiations", weight = 2 },
  { text = "A neutral power is being courted by both sides", weight = 1 },
  { text = "Treaty terms must be interpreted in a contentious situation", weight = 2 },
  { text = "A foreign observer's report could influence opinion abroad", weight = 1 },
  { text = "Safe passage for a diplomat through hostile territory", weight = 2 },
  { text = "An ultimatum is delivered with a deadline", weight = 1 },

