  { text = "Local leaders resist imperial demands through passive resistance", weight = 2 },
  { text = "Settlers and administration clash over frontier policy", weight = 2 },
  { text = "A governor's corruption is exposed but powerful friends protect him", weight = 1 },
  { text = "Indigenous allies demand better terms for their cooperation", weight = 2 },
  { text = "Trade monopoly is challenged by smugglers and free traders", weight = 2 },
