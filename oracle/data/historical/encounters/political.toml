  { text = "An audience with royalty requires navigating complex protocol", weight = 1 },
  { text = "A marriage negotiation that would shift the balance of power", weight = 1 },
  { text = "Discovery of a plot against the throne or government", weight = 1 },
  { text = "Competing for a royal appointment or commission", weight = 2 },
  { text = "A disgraced noble seeks restoration through desperate means", weight = 1 },
  { text = "Inheritance dispute threatens to tear a family apart", weight = 2 },
  { text = "A regent's decisions are questioned by those loyal to the absent ruler", weight = 1 },
  { text = "Secret negotiations for a separate peace", weight = 1 },

