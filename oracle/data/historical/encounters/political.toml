  { text = "Secret meeting of conspirators planning to overthrow the government", weight = 1 },
  { text = "An informer has infiltrated the revolutionary cell", weight = 1 },
  { text = "Printing and distributing forbidden literature", weight = 2 },
  { text = "A public demonstration that could turn into a riot", weight = 2 },
  { text = "Revolutionary tribunal passes judgment on enemies of the people", weight = 1 },
  { text = "Underground railroad helping the persecuted escape", weight = 1 },
  { text = "Debate within the movement over tactics and goals", weight = 2 },
  { text = "Former allies now on opposite sides of a political divide", weight = 2 },

  # War and Occupation
  { text = "Occupation authorities demand collaboration from local leaders", weight = 1 },
  { text = "Question of whether to resist or accommodate the conquerors", weight = 1 },
  { text = "Trials of collaborators after liberation raise difficult questions", weight = 1 },
  { text = "Competing resistance factions fight each other as much as the enemy", weight = 1 }
