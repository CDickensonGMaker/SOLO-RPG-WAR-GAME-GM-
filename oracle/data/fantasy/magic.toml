  { text = "the mishap taints the local water supply with magic", weight = 1 },
  { text = "plants in the area become carnivorous and hungry", weight = 1 },
  { text = "animals in range gain human intelligence temporarily, and grievances", weight = 1 },
  { text = "the location becomes a thin place between worlds permanently", weight = 1 },
