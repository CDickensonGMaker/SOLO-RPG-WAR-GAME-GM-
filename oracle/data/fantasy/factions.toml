# Fantasy Factions
# Organizations, cults, guilds, and power groups with depth and atmosphere

[factions]
entries = [
  # Arcane Cabals
  { text = "The Ashen Circle - pyromancers seeking to awaken a primordial fire elemental, marked by burn scars they consider sacred", weight = 2 },
  { text = "The Pale Collegium - necromancers who believe death is merely a door, their pallid skin betraying their experiments on themselves", weight = 1 },
  { text = "The Weeping Eye - diviners driven mad by glimpses of the future, each member missing their left eye which they sacrificed for sight beyond sight", weight = 1 },
  { text = "The Bound Accord - warlocks united by their patrons' ancient treaty, bearing matching silver chains fused to their flesh", weight = 1 },
  { text = "The Calcified Order - transmuters obsessed with permanence, their flesh slowly turning to living stone", weight = 1 },
  { text = "The Hollow Quorum - illusionists who have forgotten their true faces, existing now as masks they cannot remove", weight = 1 },
  { text = "The Crimson Formula - blood mages pursuing forbidden mathematics written in vital essence", weight = 1 },
  { text = "The Twilight Symposium - shadow-binders who meet only in places where light has never touched", weight = 1 },

  # Religious Orders
  { text = "The Verdant Court - fey-touched druids who have abandoned humanity, their bodies slowly becoming bark and vine", weight = 2 },
  { text = "The Last Ember - monks preserving a dying god's final spark, their monastery built around an eternal flame that grows dimmer each century", weight = 1 },
  { text = "The Penitent Choir - flagellants who sing hymns of suffering, their backs a tapestry of ritualistic scars", weight = 1 },
  { text = "The Ossuary Keepers - priests who tend bone-gardens and speak to the honored dead, their temples built of skulls", weight = 1 },
  { text = "The Drowned Congregation - worshippers of a god that sleeps beneath the sea, marked by gills that appeared after their baptism by drowning", weight = 1 },
  { text = "The Pyre Witnesses - clerics who commune with their god through fire-gazing, their eyes clouded white from staring into flames", weight = 1 },
  { text = "The Shepherd's Silence - pacifist monks who have cut out their own tongues rather than speak violence into the world", weight = 1 },
  { text = "The Veil Mourners - priestesses who tend the dying, wearing funerary masks of those they've guided to death", weight = 1 },
  { text = "The Wound That Walks - heretical sect believing their god was injured and bleeds still, collecting sacred blood from holy sites", weight = 1 },

  # Knightly Orders
  { text = "The Order of the Broken Crown - knights sworn to a dead kingdom, still fighting a war that ended two centuries ago", weight = 2 },
  { text = "The Dusk Wardens - paladins tasked with hunting the undead, their armor blackened by holy fire to blend with shadows", weight = 2 },
  { text = "The Oath-Bound - warriors who literally cannot break their word, having drunk from a cursed chalice that kills oathbreakers", weight = 1 },
  { text = "The Scarlet Compact - knights who surrendered their names to serve, known only by the red masks they wear", weight = 1 },
  { text = "The Last Wall - an order of shield-bearers protecting a sealed gateway, none knowing what lies beyond", weight = 1 },
  { text = "The Thorn Knights - protectors of the wild places, their armor grown from living brambles", weight = 1 },
  { text = "The Order of Salt and Iron - witch-hunters whose blades taste silver and whose eyes see through glamours", weight = 1 },
  { text = "The Grief Knights - warriors who take up the quests of the fallen, never removing the helms of those they've avenged", weight = 1 },

  # Criminal Organizations
  { text = "The Whisper Market - information brokers who have weaponized secrets, dealing exclusively in blackmail and truth", weight = 2 },
  { text = "The Pale Hand - assassins who kill only with poison, their fingertips permanently stained white from their deadly craft", weight = 1 },
  { text = "The Debt Collectors - enforcers who extract payment in flesh, bone, and years of life", weight = 1 },
  { text = "The Night Gardeners - body-disposal specialists who feed the dead to carnivorous plants they cultivate", weight = 1 },
  { text = "The Empty Throne - criminal syndicate ruled by a chair no one sits in, orders appearing written in blood each dawn", weight = 1 },
  { text = "The Smiling Company - slavers who remove their victims' capacity for sadness through dark magic", weight = 1 },
  { text = "The Red Tide - pirates who worship something in the deep, their ships marked by barnacles that grow in patterns", weight = 1 },
  { text = "The Hollow Crown - pretenders to nobility who forge bloodlines and manufacture heirs through murder", weight = 1 },

  # Merchant Guilds
  { text = "The Flesh Factors - traders in exotic meats, exotic enough that questions are discouraged", weight = 1 },
  { text = "The Rust Covenant - dwarven smiths who craft only weapons, and only for gold measured in blood spilled", weight = 1 },
  { text = "The Preservers' Guild - embalmers and coffin-makers whose services include ensuring the dead stay dead", weight = 1 },
  { text = "The Cartographers of the Impossible - mapmakers who chart locations that shouldn't exist", weight = 1 },
  { text = "The Glass Singers - elven artisans whose works contain captured emotions, literally bottled feelings", weight = 1 },
  { text = "The Bone Merchants - traders in relics, whether holy or profane, authenticity sometimes included", weight = 1 },

  # Monster Hunters
  { text = "The Wyrm's Bane - dragonslayers who drink the blood of their kills, gaining power and losing humanity", weight = 1 },
  { text = "The Silver Circuit - werewolf hunters bound by lycanthrope code, becoming what they hunt to hunt it better", weight = 1 },
  { text = "The Stake and Flame - vampire hunters whose bodies are living weapons against the undead through painful rituals", weight = 1 },
  { text = "The Void Wardens - aberration hunters who have looked into the Far Realm and emerged... different", weight = 1 },
  { text = "The Beast Speakers - those who negotiate with monsters, brokers of peace between civilization and fang", weight = 1 },

  # Secret Societies
  { text = "The Inheritance - nobles united by common descent from something inhuman, breeding to concentrate the bloodline", weight = 1 },
  { text = "The Unwritten - scribes who erase inconvenient history, their library containing only blank books that once held truths", weight = 1 },
  { text = "The Second Skin - skinchangers in positions of power, having worn their victims' faces for so long they've forgotten their own", weight = 1 },
  { text = "The Clock-Keepers - those who manipulate time's flow, paying the price in accelerated aging when their magic fails", weight = 1 },
  { text = "The Nameless - revolutionaries who have erased themselves from memory and record to strike at tyrants unseen", weight = 1 },
  { text = "The Dreaming Council - mages who rule an empire in the dream realm, their physical bodies in eternal slumber", weight = 1 },
  { text = "The Mourning Star - fallen celestials and their mortal servants working toward a second rebellion in heaven", weight = 1 },

  # Monstrous Factions
  { text = "The Flayed Chorus - undead who have achieved a terrible collective consciousness, speaking in unison", weight = 1 },
  { text = "The Brood Mothers - hags who have formed a grand coven spanning the land, each village unknowingly harboring one", weight = 1 },
  { text = "The Stone Speakers - medusa diplomats who petrify willing subjects as a form of immortality-preservation", weight = 1 },
  { text = "The Hungry Court - ghouls who maintain civilization underground, their etiquette impeccable despite their diet", weight = 1 },
  { text = "The Tide Callers - sahaugin who worship something older than their usual gods, marked by wrong-colored scales", weight = 1 },
]

[faction_goals]
entries = [
  # Power-Seeking
  { text = "seeks to place their chosen monarch on the throne through marriage, murder, or mandate", weight = 2 },
  { text = "gathers components for a ritual that will elevate their leader to godhood", weight = 1 },
  { text = "works to collapse the barrier between planes to let their patron through", weight = 1 },
  { text = "hunts for the tomb of an ancient archmage to claim their accumulated knowledge", weight = 1 },
  { text = "breeds creatures in secret, building an army for a war only they know is coming", weight = 1 },
  { text = "seeks the shattered pieces of a weapon that killed a god", weight = 1 },

  # Preservation
  { text = "guards a seal that must never be broken, fighting those who seek to open it", weight = 2 },
  { text = "preserves knowledge the world has forgotten, waiting for the worthy to seek it", weight = 1 },
  { text = "protects a bloodline destined for greatness from assassins and corruption", weight = 1 },
  { text = "maintains a truce between ancient enemies, knowing war would destroy both", weight = 1 },
  { text = "keeps watch over a sleeping entity, knowing someday it must wake", weight = 1 },

  # Destruction
  { text = "seeks to burn the old order so something better can grow from ashes", weight = 1 },
  { text = "hunts the last of a magical bloodline to end a prophecy before it can begin", weight = 1 },
  { text = "works to collapse the economy, believing civilization itself is the enemy", weight = 1 },
  { text = "aims to poison the world tree and unmake creation", weight = 1 },
  { text = "gathers artifacts of power to destroy them, whatever the cost", weight = 1 },

  # Liberation
  { text = "fights to free their people from generational servitude to dark powers", weight = 1 },
  { text = "works to break the chains binding a god who once protected their people", weight = 1 },
  { text = "seeks to lift a curse placed on their bloodline seven generations past", weight = 1 },
  { text = "labors to open a portal to let trapped souls finally pass on", weight = 1 },
  { text = "struggles to awaken the masses from magical complacency imposed by rulers", weight = 1 },

  # Revenge
  { text = "plots the downfall of the house that betrayed them centuries ago", weight = 1 },
  { text = "seeks to humiliate a rival faction that stole credit for their greatest work", weight = 1 },
  { text = "hunts the descendants of those who wronged their founder", weight = 1 },
  { text = "works to curse the land that exiled them, salting fields and souring wells", weight = 1 },
  { text = "aims to resurrect their murdered leader so they might finish their work", weight = 1 },

  # Knowledge
  { text = "excavates forbidden sites to learn what really happened in the age before", weight = 1 },
  { text = "collects the dreams of the dying, believing memories contain magical power", weight = 1 },
  { text = "seeks the name of a nameless god erased from all records", weight = 1 },
  { text = "maps the connections between ley lines to predict where magic will surge next", weight = 1 },
  { text = "catalogs every curse and blessing, building toward a grand unified theory of magic", weight = 1 },
]

[faction_conflicts]
entries = [
  # Ideological
  { text = "two factions interpret the same prophecy to mean opposite things", weight = 2 },
  { text = "both claim legitimate succession from the same legendary founder", weight = 1 },
  { text = "one believes in using monsters as weapons while the other hunts them to extinction", weight = 1 },
  { text = "they share goals but one will sacrifice innocents while the other refuses", weight = 1 },
  { text = "a theological schism has turned debate into shadow war", weight = 1 },

  # Territorial
  { text = "both seek control of a nexus of magical power", weight = 2 },
  { text = "their patron deities command them to claim the same holy site", weight = 1 },
  { text = "the same crypt contains relics sacred to both factions", weight = 1 },
  { text = "a border town pays protection to both, and neither will share", weight = 1 },
  { text = "the same rare resource is needed for both their great works", weight = 1 },

  # Personal
  { text = "the faction leaders were once lovers, now bitter enemies", weight = 1 },
  { text = "a betrayal by a member who switched sides poisoned all trust", weight = 1 },
  { text = "one leader killed the other's family and neither can move past it", weight = 1 },
  { text = "a failed apprentice seeks to prove themselves by destroying their former masters", weight = 1 },
  { text = "what began as academic rivalry escalated through insult and sabotage to war", weight = 1 },

  # Resource Competition
  { text = "both factions need the same rare magical component to complete their rituals", weight = 1 },
  { text = "they compete for recruits from the same shrinking pool of talent", weight = 1 },
  { text = "the same wealthy patron funds both, playing them against each other", weight = 1 },
  { text = "both seek the same ancient artifact, last seen in a dragon's hoard", weight = 1 },
  { text = "their rival smuggling operations keep intercepting each other's shipments", weight = 1 },

  # Historical
  { text = "an atrocity committed generations ago has never been forgiven", weight = 1 },
  { text = "one faction's founder murdered the other's in the organization's early days", weight = 1 },
  { text = "a peace treaty broken under controversial circumstances ended a century of cooperation", weight = 1 },
  { text = "they backed opposite sides in a war, and the winners haven't forgiven", weight = 1 },
  { text = "one absorbed the other by force; survivors became insurgents", weight = 1 },

  # Proxy Wars
  { text = "their patron entities are at war in planes beyond mortal ken", weight = 1 },
  { text = "rival nations use them as deniable agents against each other", weight = 1 },
  { text = "they've become pawns in a game between dragons, though neither knows it", weight = 1 },
  { text = "an archfey's amusement depends on their eternal conflict", weight = 1 },
  { text = "their struggle is prophesied, and neither can stop playing their part", weight = 1 },
]

[faction_methods]
entries = [
  # Subtle
  { text = "infiltrates through long-term sleeper agents placed in childhood", weight = 1 },
  { text = "controls through addiction to a substance only they can provide", weight = 1 },
  { text = "spreads influence through seemingly innocent charitable works", weight = 1 },
  { text = "manipulates through prophecies they themselves write and plant", weight = 1 },
  { text = "blackmails through a network of confessionals and spy-priests", weight = 1 },

  # Violent
  { text = "sends marked warnings before eliminating targets publically", weight = 1 },
  { text = "makes examples of those who oppose them in increasingly creative ways", weight = 1 },
  { text = "uses monsters as deniable weapons, unleashing them on enemies", weight = 1 },
  { text = "poisons wells, curses fields, and blights livestock to break communities", weight = 1 },
  { text = "assassinates bloodlines to extinction, hunting children and elderly alike", weight = 1 },

  # Magical
  { text = "binds members with oaths that kill if broken", weight = 1 },
  { text = "erases itself from memory of anyone who leaves or is expelled", weight = 1 },
  { text = "communicates through dreams, never meeting in the flesh", weight = 1 },
  { text = "replaces key figures with perfect magical duplicates under their control", weight = 1 },
  { text = "controls through curse-carved debt that can never be fully repaid", weight = 1 },

  # Political
  { text = "arranges marriages strategically over generations to place heirs in power", weight = 1 },
  { text = "creates crises that only they can solve, making themselves indispensable", weight = 1 },
  { text = "holds debts of nobles, calling them due at crucial moments", weight = 1 },
  { text = "maintains compromising documents on every figure of importance", weight = 1 },
  { text = "funds both sides of conflicts to profit from chaos", weight = 1 },
]
