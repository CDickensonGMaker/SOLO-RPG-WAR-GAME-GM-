# Oldhammer 2E (Warhammer 40,000 2nd Edition) Charts
# All the classic tables that made 2nd Edition so crunchy

[metadata]
name = "Warhammer 40,000 2nd Edition"
edition = "2nd"
year = 1993
notes = "The classic edition with detailed armor modifiers and sustained fire"

# =============================================================================
# BALLISTIC SKILL TO-HIT CHART (Shooting)
# =============================================================================
# BS value -> target number needed on d6
[bs_chart]
1 = 6   # BS1: needs 6 to hit
2 = 5   # BS2: needs 5+
3 = 4   # BS3: needs 4+ (standard trooper)
4 = 3   # BS4: needs 3+ (veteran)
5 = 2   # BS5: needs 2+ (expert)
6 = 2   # BS6: needs 2+ with reroll misses
7 = 2   # BS7: needs 2+ with reroll misses (superhuman)
8 = 2   # BS8: needs 2+ with reroll misses (legendary)

# BS6+ special: if BS > 5, reroll misses on (BS - 5)+
# e.g., BS6 rerolls all misses, BS7 rerolls on 2+, BS8 rerolls on 3+

# =============================================================================
# WEAPON SKILL VS WEAPON SKILL CHART (Melee)
